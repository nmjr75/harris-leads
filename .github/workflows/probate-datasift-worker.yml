name: Probate -> DataSift Worker

# Drains probate_campaign_queue (populated when a VA clicks "Submit to
# SIFTstack" on /probate.html). For each pending row:
#   1. Pull contact_phones / contact_emails for the record
#   2. Build NoticeData (probate-aware: grantor=decedent, owner=PR)
#   3. SKIP enrichment_pipeline (VA already verified + skip-traced)
#   4. Generate DataSift CSV
#   5. Upload to Dropbox at /Harris Leads/Probate/<ts>/
#   6. Upload to DataSift via Playwright (Enrich Property OFF, Skip Trace OFF)
#   7. Slack notification with CSV link
#   8. Mark queue row completed/failed
#
# Decoupled from siftstack-worker.yml — failures here do not affect the
# clerk pipeline. Different secrets shared (Dropbox, DataSift, Slack);
# Supabase is the same project but a different queue table.
#
# Setup (one-time):
#   1. Apply supabase/migrations/014_probate_campaign.sql to the
#      Supabase project (creates the queue table + triggers).
#   2. All secrets used here are reused from siftstack-worker.yml — no
#      new GitHub Secrets needed.

on:
  schedule:
    # Every 5 minutes. Real-world runs take 1-3 min for a 25-record
    # batch (no enrichment_pipeline = much faster than the clerk worker).
    # concurrency:cancel-in-progress=false serializes overlapping triggers.
    # Idle runs (empty queue) exit in under 30 seconds.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Max queue rows to process this run"
        required: false
        default: "25"

permissions:
  contents: read

concurrency:
  group: probate-datasift-worker
  cancel-in-progress: false

jobs:
  worker:
    name: Process probate_campaign_queue
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      # Supabase
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY:  ${{ secrets.SUPABASE_SECRET_KEY }}
      # Worker config
      PROBATE_BATCH_SIZE:   ${{ github.event.inputs.batch_size || '25' }}
      SIFTSTACK_SRC:        ./SiftStack/src
      # DataSift upload (reused from siftstack-worker)
      DATASIFT_EMAIL:       ${{ secrets.DATASIFT_EMAIL }}
      DATASIFT_PASSWORD:    ${{ secrets.DATASIFT_PASSWORD }}
      # Dropbox (reused)
      DROPBOX_ACCESS_TOKEN:  ${{ secrets.DROPBOX_ACCESS_TOKEN }}
      DROPBOX_APP_KEY:       ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET:    ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
      # Slack (reused)
      SLACK_WEBHOOK_URL:    ${{ secrets.SLACK_WEBHOOK_URL }}
      TZ: America/Chicago

    steps:
      - name: Checkout harris-leads
        uses: actions/checkout@v4

      - name: Checkout SiftStack (private)
        uses: actions/checkout@v4
        with:
          repository: nmjr75/SiftStack
          token: ${{ secrets.SIFTSTACK_REPO_PAT }}
          path: SiftStack

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            scraper/requirements.txt
            SiftStack/requirements.txt

      - name: Install SiftStack dependencies
        # Need: SiftStack core (NoticeData, datasift_formatter,
        # datasift_uploader, dropbox_uploader, slack_notifier), supabase-py,
        # Playwright. NO enrichment-pipeline dependencies needed (Smarty,
        # obituary research, entity research) since this worker skips that.
        run: |
          pip install --upgrade pip
          pip install -r SiftStack/requirements.txt
          pip install supabase>=2.10.0

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run probate worker
        run: python scraper/run_probate_datasift_worker.py
