name: SiftMap Property Enricher

# Pulls dashboard contact addresses lacking property data, navigates DataSift's
# SiftMap per-property URL, scrapes the Property Details side panel, and
# upserts enriched fields (year built / sqft / value / equity %, etc.) into
# Supabase. Each address is looked up exactly once and cached forever. The
# dashboard joins on normalized_address to render chips inline.
#
# Quota math: ~20 addresses per run × 12 runs/day = ~240/day = ~7.2K/mo,
# still far under the 100K/mo DataSift account limit. Smaller batches per
# run mean a new HOT lead lands in DataSift enrichment within ~2 hours
# instead of the next-day-at-1am-CT it was before.
#
# When the queue is empty (steady state after backfill catches up), the
# enricher exits in ~30 seconds without burning runner minutes.

on:
  schedule:
    # Every 2 hours. A new HOT lead created at noon gets enriched within
    # at most 2 hours instead of waiting until the next 1 AM CT cycle.
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      per_run_limit:
        description: "Max addresses to enrich this run"
        required: false
        default: "25"

permissions:
  contents: read

concurrency:
  group: siftmap-enricher
  cancel-in-progress: false

jobs:
  enrich:
    name: Enrich pending addresses
    runs-on: ubuntu-22.04
    # Per-address cost in practice (post-Owner/History tab clicks +
    # populate-wait) is ~45-60s. At 100 addresses/run the daily cron
    # finishes in ~85 min worst-case; a 200-300 address backfill needs
    # the full 3-hour budget. GH Actions allows up to 360 min/job on
    # Ubuntu so we have headroom.
    timeout-minutes: 180

    env:
      SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      DATASIFT_EMAIL:      ${{ secrets.DATASIFT_EMAIL }}
      DATASIFT_PASSWORD:   ${{ secrets.DATASIFT_PASSWORD }}
      SIFTMAP_PER_RUN_LIMIT: ${{ github.event.inputs.per_run_limit || '25' }}
      TZ: America/Chicago

    steps:
      - name: Checkout harris-leads
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright>=1.40.0 supabase>=2.10.0 python-dotenv>=1.0.0

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright Chromium (browser binary)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      - name: Install Playwright system deps
        run: python -m playwright install-deps chromium

      - name: Run enricher
        run: python scraper/siftmap_enricher.py
