name: Harris County Foreclosure Scraper

on:
  schedule:
    # Runs at 8:00 AM UTC every day (3 AM CDT / 2 AM CST) — 1 hour after main scraper
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "foreclosure-scrape"
  cancel-in-progress: false

jobs:
  scrape-foreclosures:
    name: Scrape Foreclosure Postings
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scraper/requirements.txt"

      - name: Install system dependencies (OCR)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pdfplumber pytesseract Pillow

      - name: Create output directories
        run: |
          mkdir -p dashboard data

      - name: Run foreclosure scraper
        run: python scraper/fetch_foreclosures.py

      - name: Verify output
        run: |
          echo "=== dashboard/foreclosures.json ==="
          python -c "
          import json, os
          fpath = 'dashboard/foreclosures.json'
          if os.path.exists(fpath):
              with open(fpath) as f:
                  d = json.load(f)
              print(f'Total foreclosure records: {d[\"total\"]}')
              print(f'Fetched at: {d[\"fetched_at\"]}')
          else:
              print('No foreclosures.json found — first run may have had no new postings')
          "

      - name: Commit and push updated foreclosure records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/foreclosures.json data/foreclosure_ids.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update foreclosures $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Pull any changes pushed while scraper was running, then push
          git pull --rebase origin main
          git push

  deploy-pages:
    name: Deploy Dashboard to GitHub Pages
    needs: scrape-foreclosures
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
