name: Harris County Lead Scraper

on:
  schedule:
    # Weekly catch-up: Sundays at 9:00 AM UTC (4 AM CDT / 3 AM CST)
    # Picks up back-posted docs from the previous 10 days
    - cron: "0 9 * * 0"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date YYYY-MM-DD (leave blank to use lookback_days)"
        required: false
        default: ""
      end_date:
        description: "End date YYYY-MM-DD (leave blank = today)"
        required: false
        default: ""
      lookback_days:
        description: "Days to look back (used only if start_date is blank)"
        required: false
        default: "1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape-and-deploy"
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape Harris County Records
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      START_DATE: ${{ github.event.inputs.start_date || '' }}
      END_DATE: ${{ github.event.inputs.end_date || '' }}
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '10' }}
      TZ: America/Chicago

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scraper/requirements.txt"

      - name: Install system dependencies (OCR)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Create output directories
        run: |
          mkdir -p dashboard data

      - name: Run scraper
        run: python scraper/fetch.py
        env:
          START_DATE: ${{ env.START_DATE }}
          END_DATE: ${{ env.END_DATE }}
          LOOKBACK_DAYS: ${{ env.LOOKBACK_DAYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CCLERK_USERNAME: ${{ secrets.CCLERK_USERNAME }}
          CCLERK_PASSWORD: ${{ secrets.CCLERK_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      - name: Verify output
        run: |
          echo "=== dashboard/records.json ==="
          python -c "
          import json
          with open('dashboard/records.json') as f:
            d = json.load(f)
          print(f'Total records: {d[\"total\"]}')
          print(f'With address: {d[\"with_address\"]}')
          print(f'Fetched at: {d[\"fetched_at\"]}')
          "

      - name: Commit and push updated records
        # Supabase is now the source of truth — records.json is local-only.
        # Nothing in dashboard/ needs committing from a scrape run anymore.
        # If we re-introduce a small artifact (e.g. a metrics summary), add
        # it here and explicitly stage just that file.
        run: |
          echo "Skipping git commit — Supabase holds all scraper output now."

  deploy-pages:
    name: Deploy Dashboard to GitHub Pages
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # use the freshly-committed main branch
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
