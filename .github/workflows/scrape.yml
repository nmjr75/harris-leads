name: Harris County Lead Scraper

on:
  schedule:
    # Runs at 7:00 AM UTC every day (2 AM CDT / 1 AM CST)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back (default 7)"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape-and-deploy"
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape Harris County Records
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
      TZ: America/Chicago

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scraper/requirements.txt"

      - name: Install system dependencies (OCR)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Create output directories
        run: |
          mkdir -p dashboard data

      - name: Run scraper
        run: python scraper/fetch.py
        env:
          LOOKBACK_DAYS: ${{ env.LOOKBACK_DAYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CCLERK_USERNAME: ${{ secrets.CCLERK_USERNAME }}
          CCLERK_PASSWORD: ${{ secrets.CCLERK_PASSWORD }}

      - name: Verify output
        run: |
          echo "=== dashboard/records.json ==="
          python -c "
          import json
          with open('dashboard/records.json') as f:
            d = json.load(f)
          print(f'Total records: {d[\"total\"]}')
          print(f'With address: {d[\"with_address\"]}')
          print(f'Fetched at: {d[\"fetched_at\"]}')
          "

      - name: Commit and push updated records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update leads $(TZ=America/Chicago date +'%Y-%m-%d %I:%M %p CT')"
          # Pull any changes pushed while scraper was running, then push
          git pull --rebase origin main
          git push

  deploy-pages:
    name: Deploy Dashboard to GitHub Pages
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # use the freshly-committed main branch
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
