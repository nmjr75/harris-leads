<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads Workspace — Harris County Motivated Sellers</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #23273a;
    --border: #2d3148;
    --text: #e4e6f0;
    --text-muted: #8b8fa3;
    --accent: #7c5cfc;
    --accent-light: #9b82fc;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --blue: #3b82f6;
    --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h1 { font-size: 1.25rem; font-weight: 700; }
  .header h1 span { color: var(--accent-light); }
  .header-meta { font-size: 0.75rem; color: var(--text-muted); text-align: right; }

  /* Stat Cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    padding: 16px 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .stat-card.active { border-color: var(--accent); background: var(--surface2); }
  .stat-card .value {
    font-size: 1.75rem;
    font-weight: 800;
    line-height: 1.1;
    color: var(--accent-light);
  }
  .stat-card .label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .stat-card.total .value { color: var(--text); }
  .stat-card.addr .value  { color: var(--green); }

  /* Score badge on cards */
  .stat-card .pct {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 0.65rem;
    color: var(--text-muted);
  }

  /* Charts row */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 24px 12px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .chart-card h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }
  .bar-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
  }
  .bar-label { width: 120px; text-align: right; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 18px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 6px; font-size: 0.65rem; font-weight: 600; color: #fff; }
  .bar-count { width: 35px; text-align: right; font-weight: 600; font-size: 0.75rem; flex-shrink: 0; }

  /* Score distribution */
  .score-dist { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
  .score-bar {
    flex: 1;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
    min-width: 8px;
    transition: height 0.4s ease;
    position: relative;
    cursor: pointer;
  }
  .score-bar:hover { opacity: 0.8; }
  .score-bar .tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    margin-bottom: 4px;
  }
  .score-bar:hover .tooltip { display: block; }
  .score-labels { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-muted); margin-top: 4px; }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    padding: 12px 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters input, .filters select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .filters input:focus, .filters select:focus { border-color: var(--accent); }
  .filters input::placeholder { color: var(--text-muted); }
  .search-input { width: 200px; }
  .score-input { width: 72px; }
  .score-range { display: flex; align-items: center; gap: 4px; }
  .score-range span { color: var(--text-muted); font-size: 0.75rem; }
  .btn {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn-accent:hover { background: var(--accent-light); }
  .btn-green { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }
  .btn-green:hover { opacity: 0.85; }
  .btn-green:disabled { opacity: 0.4; cursor: default; }
  .export-group { display: flex; gap: 4px; align-items: center; }
  .selected-count { font-size: 0.7rem; color: var(--green); font-weight: 600; margin-left: 2px; }
  .filter-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent);
    color: #fff;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .filter-tag .x { cursor: pointer; opacity: 0.7; }
  .filter-tag .x:hover { opacity: 1; }
  .showing-label { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    padding: 0 24px 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    padding: 10px 8px;
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    color: #60a5fa;
    font-weight: 700;
    border-bottom: 2px solid #1d4ed8;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }
  thead th:hover { color: #93c5fd; }
  thead th .sort-arrow { margin-left: 3px; font-size: 0.6rem; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 10px 8px; vertical-align: top; }
  td.score-cell {
    font-weight: 700;
    text-align: center;
  }
  .score-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .score-high { background: rgba(34,197,94,0.15); color: var(--green); }
  .score-med  { background: rgba(245,158,11,0.15); color: var(--orange); }
  .score-low  { background: rgba(139,143,163,0.15); color: var(--text-muted); }
  .type-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 700;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .flag-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 0.6rem;
    font-weight: 600;
    margin: 1px 2px;
    white-space: nowrap;
  }
  .flag-pill.distress { background: rgba(239,68,68,0.15); color: var(--red); }
  .flag-pill.info     { background: rgba(59,130,246,0.15); color: var(--blue); }
  .flag-pill.fresh    { background: rgba(34,197,94,0.15); color: var(--green); }

  /* Confidence badges */
  .conf-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
  }
  .conf-high   { background: rgba(34,197,94,0.18); color: var(--green); }
  .conf-medium { background: rgba(245,158,11,0.18); color: var(--orange); }
  .conf-low    { background: rgba(239,68,68,0.18); color: var(--red); }
  .conf-none   { background: rgba(139,143,163,0.12); color: var(--text-muted); }

  /* SIFTstack submission status pill */
  .siftstack-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    cursor: help;
    white-space: nowrap;
  }
  .siftstack-pill.ss-completed { background: rgba(34,197,94,0.18); color: var(--green); }
  .siftstack-pill.ss-queued    { background: rgba(245,158,11,0.18); color: var(--orange); }
  .siftstack-pill.ss-failed    { background: rgba(239,68,68,0.18); color: var(--red); }
  .siftstack-pill.ss-none      { background: rgba(139,143,163,0.12); color: var(--text-muted); }

  /* Stat card color variants for siftstack filters */
  .stat-card.enriched .value { color: var(--green); }
  .stat-card.queued   .value { color: var(--orange); }
  .stat-card.manual   .value { color: var(--red); }

  /* SIFTstack queue-confirm modal */
  .siftstack-confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 10000;
  }
  .siftstack-confirm {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    max-width: 460px;
    width: 92%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .siftstack-confirm h3 { margin: 0 0 12px; color: var(--text); font-size: 1.1rem; }
  .siftstack-confirm p  { color: var(--text-muted); font-size: 0.9rem; margin: 8px 0; }
  .siftstack-confirm ul { color: var(--text); font-size: 0.9rem; margin: 8px 0 16px; padding-left: 22px; }
  .siftstack-confirm ul li { margin: 4px 0; }
  .siftstack-confirm-buttons {
    display: flex; flex-direction: column; gap: 8px; margin-top: 16px;
  }
  .siftstack-confirm-buttons .btn { width: 100%; justify-content: center; }

  /* SIFTstack action button (next to Export Selected) */
  .btn-siftstack {
    background: #7c5cfc; color: #fff; border-color: #7c5cfc;
  }
  .btn-siftstack:hover:not(:disabled) { background: #6a4af0; }
  .btn-siftstack:disabled { opacity: 0.45; cursor: not-allowed; }
  td a { color: var(--accent-light); text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .addr-cell { max-width: 200px; }
  .owner-cell { max-width: 260px; word-break: break-word; font-size: 0.78rem; }

  /* Editable cells (foreclosure records) */
  .editable-cell {
    position: relative;
    cursor: text !important;
    border: 1px dashed transparent;
    padding: 2px 4px;
    border-radius: 4px;
    transition: border-color 0.15s, background 0.15s;
  }
  .editable-cell:hover {
    border-color: var(--accent);
    background: rgba(124,92,252,0.06);
  }
  .editable-cell::after {
    content: "\270E";
    position: absolute;
    right: 2px;
    top: 2px;
    font-size: 0.65rem;
    color: var(--accent-light);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .editable-cell:hover::after { opacity: 0.7; }
  .editable-cell.editing {
    border-color: var(--accent);
    background: rgba(124,92,252,0.1);
  }
  .editable-cell input {
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    font-size: 0.78rem;
    padding: 3px 6px;
    border-radius: 3px;
    width: 100%;
    outline: none;
  }
  .editable-cell input:focus { border-color: var(--accent-light); }
  .edit-saved {
    animation: editFlash 0.6s ease;
  }
  @keyframes editFlash {
    0% { background: rgba(34,197,94,0.25); }
    100% { background: transparent; }
  }
  /* Undo button */
  .btn-undo {
    background: rgba(239,68,68,0.15);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
    font-size: 0.75rem;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-undo:hover:not(:disabled) {
    background: rgba(239,68,68,0.25);
    border-color: var(--red);
  }
  .btn-undo:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .undo-info {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: 4px;
  }

  /* Row checkboxes */
  .row-cb, .hdr-cb {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  tbody tr.selected { background: rgba(124,92,252,0.08); }
  tbody tr.selected:hover { background: rgba(124,92,252,0.14); }
  tbody tr td:not(:first-child) { cursor: pointer; }

  /* Detail Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.65);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .modal-header h2 {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
    word-break: break-word;
  }
  .modal-header .cat-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    flex-shrink: 0;
  }
  .modal-close:hover { color: var(--text); }
  .modal-score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
  }
  .modal-score {
    font-size: 1.5rem;
    font-weight: 800;
  }
  .modal-score-bar {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .modal-score-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .modal-flags { display: flex; flex-wrap: wrap; gap: 4px; }
  .modal-section {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
  }
  .modal-section:last-child { border-bottom: none; }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .modal-field-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }
  .modal-field-value {
    font-size: 0.85rem;
    font-weight: 600;
    word-break: break-word;
  }
  .modal-field-value a { color: var(--accent-light); text-decoration: none; font-size: 0.78rem; }
  .modal-field-value a:hover { text-decoration: underline; }
  .modal-addr-block {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 4px;
  }
  .modal-addr-block .addr-line {
    font-size: 0.9rem;
    font-weight: 700;
  }
  .modal-addr-block .addr-city {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    padding: 16px 24px;
  }
  .pagination button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pagination button:hover { border-color: var(--accent); }
  .pagination button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .page-info { font-size: 0.75rem; color: var(--text-muted); }

  /* Responsive */
  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .header { padding: 12px 16px; }
    .filters { padding: 8px 16px; }
    .table-wrap { padding: 0 8px 16px; }
    .search-input { width: 100%; }
    .bar-label { width: 80px; font-size: 0.65rem; }
  }

  /* Edit marker dot — shows next to score when row has manual edits */
  .edit-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    margin-left: 5px;
    background: var(--accent-light);
    border-radius: 50%;
    vertical-align: middle;
  }

  /* ────────────────────────────────────────────────────────────────
     Card view + queue tabs + skip-trace (added for /leads workspace)
     ──────────────────────────────────────────────────────────────── */

  /* Queue tabs */
  .queue-tabs {
    display: flex;
    gap: 0;
    padding: 12px 24px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .queue-tab {
    background: transparent;
    color: var(--text-muted);
    border: none;
    border-bottom: 2px solid transparent;
    padding: 12px 18px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .queue-tab:hover { color: var(--text); }
  .queue-tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .queue-tab .badge {
    margin-left: 6px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    font-size: 0.7rem;
    color: var(--text-muted);
  }
  .queue-tab.active .badge { background: var(--accent); color: #fff; }

  /* Records list */
  .records {
    padding: 16px 24px;
  }
  /* Thin table-row-style card. All 18 fields visible inline.
     Density matches the old table view; cards just add hover, selection,
     and an expandable skip-trace section. */
  .record-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    margin-bottom: 3px;
    transition: border-color 0.12s, background 0.12s;
  }
  .record-card:hover { border-color: var(--accent); }
  .record-card.selected {
    background: rgba(124,92,252,0.10);
    border-color: var(--accent);
  }
  /* Single-line table-like layout. Column widths mirror the original table
     so the same fields land in roughly the same horizontal positions. */
  .record-row {
    display: grid;
    grid-template-columns:
      24px            /* checkbox */
      42px            /* score */
      80px            /* filed */
      80px            /* sale */
      52px            /* type */
      90px            /* category */
      1fr             /* owner */
      1fr             /* co-borrower */
      1fr             /* grantor */
      90px            /* flags */
      1.2fr           /* legal */
      1.4fr           /* property address */
      1.4fr           /* mailing address */
      78px            /* amount */
      60px            /* confidence */
      70px            /* siftstack pill */
      88px            /* doc# */
      72px            /* links */
      120px;          /* actions */
    gap: 6px;
    align-items: center;
  }
  .record-cb-cell {
    display: flex; align-items: center; justify-content: center;
  }
  .record-cb {
    width: 14px; height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .record-field {
    font-size: 0.74rem;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .record-field.wrap { white-space: normal; word-break: break-word; }
  .record-field.dim { color: var(--text-muted); font-size: 0.7rem; }

  /* Tiny action buttons — single-character with title for full label. */
  .actions-col {
    display: flex;
    gap: 3px;
    justify-content: flex-start;
    flex-wrap: wrap;
  }
  .action-btn {
    background: transparent; color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 7px; cursor: pointer;
    font-size: 0.72rem; font-weight: 600;
    text-align: center;

// ── Supabase Client ───────────────────────────────────────────────
const SUPABASE_URL = "https://oqkcmysnhgorjkinfamu.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_XfR5NTuo1LYF8p73_cqQ7w_Ug4LDl3_";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});

// ── State ─────────────────────────────────────────────────────────
let DATA = null;
let FRCL_DATA = null;   // kept for compatibility with existing render/filter code
let filtered = [];
let sortCol = "score";
let sortAsc = false;
let currentPage = 1;
let cardFilter = null;
let sourceFilter = "";
let perPage = 50;
const selectedRows = new Set();

// ── Card-view state (added for /leads workspace) ──────────────────
let currentQueue = "verify";
const phonesByRecord = new Map();
const emailsByRecord = new Map();
const jobsByRecord   = new Map();   // key = `${record_id}|${service}`

// 6 queue buckets for clerk records:
//   verify     -> verification_status = 'pending'
//   active     -> verified_owns AND not yet submitted
//   archive    -> verified_no_owns
//   research   -> needs_research
//   siftstack  -> manual_submitted_at IS NOT NULL (VA submission)
//   autoq      -> siftstack_status set AND manual_submitted_at NULL (legacy)
function recordInQueue(r, queue) {
  if (queue === "siftstack") return !!r.manual_submitted_at;
  if (queue === "autoq")     return !r.manual_submitted_at && !!r.siftstack_status;
  if (queue === "active") {
    return r.verification_status === "verified_owns"
      && !r.manual_submitted_at
      && !r.siftstack_status;
  }
  if (queue === "verify")   return r.verification_status === "pending" || (r.verification_status == null && !r.siftstack_status);
  if (queue === "archive")  return r.verification_status === "verified_no_owns";
  if (queue === "research") return r.verification_status === "needs_research";
  return false;
}

// HTML-escape helper used by card render. Mirrors probate.html.
function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ── Save edit to Supabase ────────────────────────────────────────
// Maps UI field names → Supabase column names and writes the update.
function fieldToUpdate(field, newVal) {
  if (field === "prop_address") {
    const v = newVal || {};
    return {
      prop_address: v.address || null,
      prop_city: v.city || null,
      prop_state: v.state || null,
      prop_zip: v.zip || null,
    };
  }
  if (field === "mail_address") {
    const v = newVal || {};
    return {
      mail_address: v.address || null,
      mail_city: v.city || null,
      mail_state: v.state || null,
      mail_zip: v.zip || null,
    };
  }
  if (field === "legal")     return { legal_description: newVal || null };
  if (field === "sale_date") return { sale_date: newVal || null };
  if (field === "filed")     return { filed_date: newVal || null };
  return { [field]: newVal || null };
}

function applyUpdateToRecord(rec, field, newVal) {
  if (field === "prop_address") {
    const v = newVal || {};
    rec.prop_address = v.address || "";
    rec.prop_city    = v.city    || "";
    rec.prop_state   = v.state   || "";
    rec.prop_zip     = v.zip     || "";
  } else if (field === "mail_address") {
    const v = newVal || {};
    rec.mail_address = v.address || "";
    rec.mail_city    = v.city    || "";
    rec.mail_state   = v.state   || "";
    rec.mail_zip     = v.zip     || "";
  } else if (field === "legal") {
    rec.legal = newVal || "";
  } else {
    rec[field] = newVal || "";
  }
}

async function saveFieldToSupabase(docNum, field, newVal) {
  const status = document.getElementById("editSyncStatus");
  if (status) status.textContent = "Saving…";
  const update = fieldToUpdate(field, newVal);
  const { error } = await sb.from("records").update(update).eq("doc_num", docNum);
  if (error) {
    if (status) { status.textContent = "Save failed"; setTimeout(() => status.textContent = "", 3000); }
    console.error("Save failed:", error);
    return false;
  }
  const rec = DATA?.records?.find(r => r.doc_num === docNum);
  if (rec) applyUpdateToRecord(rec, field, newVal);
  if (status) { status.textContent = "Saved"; setTimeout(() => status.textContent = "", 1500); }
  return true;
}

// Parse "123 Main St, Houston, TX 77001" → { address, city, state, zip }
function parseAddress(val) {
  const parts = val.split(",").map(s => s.trim());
  if (parts.length < 2) return { address: val, city: "", state: "", zip: "" };
  const lastPart = parts[parts.length - 1];
  const stZip = lastPart.match(/^([A-Za-z]{2})\s+(\d{5}(?:-\d{4})?)$/);
  if (stZip) {
    return {
      address: parts[0],
      city:    parts.length >= 3 ? parts.slice(1, -1).join(", ") : "",
      state:   stZip[1].toUpperCase(),
      zip:     stZip[2],
    };
  }
  return { address: parts[0], city: parts.slice(1).join(", "), state: "", zip: "" };
}

// ── Undo / Redo (localStorage, per-browser) ──────────────────────
let undoStack = [];
let redoStack = [];
try {
  const stored = localStorage.getItem("harris_leads_undo");
  if (stored) undoStack = JSON.parse(stored);
  const storedRedo = localStorage.getItem("harris_leads_redo");
  if (storedRedo) redoStack = JSON.parse(storedRedo);
} catch(e) { undoStack = []; redoStack = []; }

const FIELD_LABELS = { owner: "Owner", co_borrower: "Co-Borrower", grantor_name: "Grantor", prop_address: "Prop Addr", mail_address: "Mail Addr", amount: "Amount", legal: "Legal", sale_date: "Sale Date", match_confidence: "Confidence" };

function saveUndoToStorage() {
  if (undoStack.length > 50) undoStack = undoStack.slice(-50);
  if (redoStack.length > 50) redoStack = redoStack.slice(-50);
  try {
    localStorage.setItem("harris_leads_undo", JSON.stringify(undoStack));
    localStorage.setItem("harris_leads_redo", JSON.stringify(redoStack));
  } catch(e) {}
}

function pushUndo(docNum, field, oldVal, newVal) {
  const user = currentProfile?.display_name || "Unknown";
  undoStack.push({ docNum, field, oldVal, newVal, ts: Date.now(), user });
  // Any new edit invalidates the redo history (user took a new branch)
  redoStack = [];
  saveUndoToStorage();
  updateUndoUI();
}

function updateUndoUI() {
  const btn = document.getElementById("undoBtn");
  const redoBtn = document.getElementById("redoBtn");
  const info = document.getElementById("undoInfo");
  if (btn) {
    btn.disabled = undoStack.length === 0;
    btn.title = undoStack.length === 0
      ? "Nothing to undo"
      : `Undo last edit (${undoStack.length} edit${undoStack.length > 1 ? "s" : ""} in history)`;
  }
  if (redoBtn) {
    redoBtn.disabled = redoStack.length === 0;
    redoBtn.title = redoStack.length === 0
      ? "Nothing to redo"
      : `Redo (${redoStack.length} undone edit${redoStack.length > 1 ? "s" : ""} ready to restore)`;
  }
  if (info) {
    if (undoStack.length === 0 && redoStack.length === 0) {
      info.textContent = "";
    } else if (undoStack.length > 0) {
      const last = undoStack[undoStack.length - 1];
      info.textContent = `Last edit: ${FIELD_LABELS[last.field] || last.field} on ${last.docNum} by ${last.user}`;
    } else {
      const next = redoStack[redoStack.length - 1];
      info.textContent = `Next redo: ${FIELD_LABELS[next.field] || next.field} on ${next.docNum}`;
    }
  }
}

async function undoLastEdit() {
  if (undoStack.length === 0) return;
  const entry = undoStack[undoStack.length - 1];
  const fieldLabel = FIELD_LABELS[entry.field] || entry.field;
  const oldDisplay = entry.oldVal || "(empty)";
  const newDisplay = entry.newVal || "(empty)";
  // Confirm so accidental clicks don't blow through edits silently
  const confirmed = confirm(
    `Undo this edit?\n\n` +
    `Record: ${entry.docNum}\n` +
    `Field: ${fieldLabel}\n` +
    `Edited by: ${entry.user}\n\n` +
    `Will revert from "${newDisplay}" back to "${oldDisplay}"`
  );
  if (!confirmed) return;
  undoStack.pop();
  redoStack.push(entry);
  saveUndoToStorage();
  updateUndoUI();
  const ok = await saveFieldToSupabase(entry.docNum, entry.field, entry.oldVal);
  if (ok) { renderTable(); renderPagination(); }
}

async function redoLastEdit() {
  if (redoStack.length === 0) return;
  const entry = redoStack[redoStack.length - 1];
  const fieldLabel = FIELD_LABELS[entry.field] || entry.field;
  const oldDisplay = entry.oldVal || "(empty)";
  const newDisplay = entry.newVal || "(empty)";
  const confirmed = confirm(
    `Redo this edit?\n\n` +
    `Record: ${entry.docNum}\n` +
    `Field: ${fieldLabel}\n\n` +
    `Will re-apply: "${oldDisplay}" -> "${newDisplay}"`
  );
  if (!confirmed) return;
  redoStack.pop();
  undoStack.push(entry);
  saveUndoToStorage();
  updateUndoUI();
  const ok = await saveFieldToSupabase(entry.docNum, entry.field, entry.newVal);
  if (ok) { renderTable(); renderPagination(); }
}

function startEdit(docNum, field, cellEl) {
  if (cellEl.classList.contains("editing")) return;
  // Only editors and admins can edit
  if (!currentProfile || (currentProfile.role !== "admin" && currentProfile.role !== "editor")) {
    const status = document.getElementById("editSyncStatus");
    if (status) { status.textContent = "Read-only — ask admin for editor access"; setTimeout(() => status.textContent = "", 3000); }
    return;
  }
  cellEl.classList.add("editing");

  const rec = DATA.records.find(r => r.doc_num === docNum);
  if (!rec) return;

  let currentVal = "";
  if (field === "prop_address") {
    currentVal = [rec.prop_address, rec.prop_city, rec.prop_state, rec.prop_zip].filter(Boolean).join(", ");
  } else if (field === "mail_address") {
    currentVal = [rec.mail_address, rec.mail_city, rec.mail_state, rec.mail_zip].filter(Boolean).join(", ");
  } else {
    currentVal = rec[field] || "";
  }

  // match_confidence uses a dropdown (fixed values: none / low / medium / high)
  if (field === "match_confidence") {
    const select = document.createElement("select");
    select.style.cssText = "background:var(--surface2);color:var(--text);border:1px solid var(--accent);border-radius:4px;padding:3px 6px;font-size:0.75rem;outline:none;width:100%";
    ["none", "low", "medium", "high"].forEach(opt => {
      const o = document.createElement("option");
      o.value = opt; o.textContent = opt;
      if (opt === (currentVal || "none")) o.selected = true;
      select.appendChild(o);
    });
    cellEl.innerHTML = "";
    cellEl.appendChild(select);
    select.focus();

    let committed = false;
    async function commitSelect() {
      if (committed) return;
      committed = true;
      const val = select.value;
      cellEl.classList.remove("editing");
      if (val === (currentVal || "none")) {
        cellEl.innerHTML = `<span class="conf-pill conf-${val}">${val}</span>`;
        return;
      }
      pushUndo(docNum, field, currentVal || "none", val);
      applyUpdateToRecord(rec, field, val);
      cellEl.innerHTML = `<span class="conf-pill conf-${val}">${val}</span>`;
      await saveFieldToSupabase(docNum, field, val);
      cellEl.classList.add("edit-saved");
      setTimeout(() => cellEl.classList.remove("edit-saved"), 700);
    }

    select.addEventListener("change", commitSelect);
    select.addEventListener("blur", commitSelect);
    select.addEventListener("keydown", e => {
      if (e.key === "Escape") { e.preventDefault(); committed = true; cellEl.classList.remove("editing"); renderTable(); }
    });
    return;
  }

  const placeholders = {
    owner: "Enter owner name…",
    co_borrower: "Enter co-borrower name…",
    grantor_name: "Enter grantor / deceased name…",
    prop_address: "Enter address, city, ST zip…",
    mail_address: "Enter address, city, ST zip…",
    amount: "Enter amount (e.g. $250,000)…",
    legal: "Enter legal description…",
    sale_date: "YYYY-MM-DD",
  };

  const input = document.createElement("input");
  input.type = field === "sale_date" ? "date" : "text";
  input.value = currentVal;
  input.placeholder = placeholders[field] || "Enter value…";

  cellEl.innerHTML = "";
  cellEl.appendChild(input);
  input.focus();
  input.select();

  async function commitEdit() {
    const val = input.value.trim();
    cellEl.classList.remove("editing");

    if (val === currentVal) {
      if (field === "prop_address" || field === "mail_address") {
        const pfx = field === "prop_address" ? "prop" : "mail";
        const disp = [rec[pfx+"_address"], rec[pfx+"_city"], rec[pfx+"_state"], rec[pfx+"_zip"]].filter(Boolean).join(", ");
        cellEl.innerHTML = disp || '<span style="color:var(--text-muted)">--</span>';
      } else {
        cellEl.innerHTML = currentVal || '<span style="color:var(--text-muted)">--</span>';
      }
      return;
    }

    if (field === "prop_address" || field === "mail_address") {
      const prefix = field === "prop_address" ? "prop" : "mail";
      const oldAddr = {
        address: rec[prefix + "_address"] || "",
        city:    rec[prefix + "_city"]    || "",
        state:   rec[prefix + "_state"]   || "",
        zip:     rec[prefix + "_zip"]     || "",
      };
      const newAddr = parseAddress(val);
      pushUndo(docNum, field, oldAddr, newAddr);
      applyUpdateToRecord(rec, field, newAddr);
      const display = [newAddr.address, newAddr.city, newAddr.state, newAddr.zip].filter(Boolean).join(", ");
      cellEl.innerHTML = display || '<span style="color:var(--text-muted)">--</span>';
      await saveFieldToSupabase(docNum, field, newAddr);
    } else {
      pushUndo(docNum, field, currentVal, val);
      applyUpdateToRecord(rec, field, val);
      cellEl.innerHTML = val || '<span style="color:var(--text-muted)">--</span>';
      await saveFieldToSupabase(docNum, field, val);
    }

    cellEl.classList.add("edit-saved");
    setTimeout(() => cellEl.classList.remove("edit-saved"), 700);
  }

  input.addEventListener("blur", commitEdit);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); input.blur(); }
    if (e.key === "Escape") { e.preventDefault(); cellEl.classList.remove("editing"); renderTable(); }
  });
}

// ── Normalize Supabase rows → dashboard shape ──────────────────────
// Dashboard code expects `filed` and `legal`, Supabase stores `filed_date` and `legal_description`.
// We aliass them after fetch so rendering/filtering code stays untouched.
function normalizeFromDb(r) {
  r.filed = r.filed_date || "";
  r.legal = r.legal_description || "";
  r._source = r.source === "estatetrace" ? "estatetrace"
            : r.doc_type === "FRCL" ? "foreclosure"
            : "clerk";
  // Foreclosure stat card + filter lookups use short code "FRCL"
  if (r.doc_type === "FRCL") r.cat = "FRCL";
  if (!r.flags) r.flags = [];
  return r;
}

// ── Central Time formatter (Houston operations) ────────────────────
// Every timestamp shown on the dashboard MUST go through this helper.
// Browser-locale defaults are wrong - viewers in other timezones see
// shifted times that don't match what was logged.
function formatCT(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  if (isNaN(d)) return "";
  return d.toLocaleString("en-US", {
    timeZone: "America/Chicago",
    year:  "numeric", month: "short", day:    "numeric",
    hour:  "2-digit", minute: "2-digit",
    timeZoneName: "short",
  });
}

// ── Load Data ──────────────────────────────────────────────────────
async function loadData() {
  // Fetch in pages of 1000 (Supabase default max per request)
  const all = [];
  const PAGE = 1000;
  let from = 0;
  while (true) {
    const { data, error } = await sb
      .from("records")
      .select("*")
      .order("score", { ascending: false, nullsFirst: false })
      .range(from, from + PAGE - 1);
    if (error) { console.error(error); alert("Load failed: " + error.message); return; }
    if (!data || data.length === 0) break;
    all.push(...data);
    if (data.length < PAGE) break;
    from += PAGE;
  }

  all.forEach(normalizeFromDb);

  const frclCount = all.filter(r => r.doc_type === "FRCL").length;
  const dates = all.map(r => r.filed_date).filter(Boolean).sort();
  DATA = {
    fetched_at: new Date().toISOString(),
    source: "Supabase (live)",
    date_range: { from: dates[0] || "", to: dates[dates.length - 1] || "" },
    total: all.length,
    records: all,
  };
  FRCL_DATA = { total: frclCount };   // kept for legacy meta display

  document.getElementById("meta").innerHTML =
    `Updated: ${formatCT(DATA.fetched_at)}<br>${DATA.date_range.from} to ${DATA.date_range.to}<br>Foreclosures: ${frclCount} postings`;

  buildStats();
  buildCharts();
  populateFilters();
  await loadRuns();
  applyFilters();
}

// ── Run-picker: load scraper_runs and populate the Run dropdown ────
//
// Fetches up to ~5,000 most recent runs (each scraper run is one row).
// On select, queries scraper_run_records for that run, builds a Map of
// record_id -> action, and applyFilters() narrows the table to those
// records. Picking "All Runs" clears the filter.
let RUNS = [];
let SELECTED_RUN_RECORD_IDS = null;   // null = no run filter; Map otherwise

async function loadRuns() {
  try {
    const { data, error } = await sb
      .from("scraper_runs")
      .select("id,run_id,gh_run_number,workflow_name,started_at,completed_at,status,total_seen,total_created,total_updated")
      .order("id", { ascending: false })
      .limit(5000);
    if (error) { console.error("loadRuns failed:", error); return; }
    RUNS = data || [];
  } catch (e) {
    console.error("loadRuns exception:", e);
    RUNS = [];
  }

  const sel = document.getElementById("runPicker");
  // Wipe any previously-built options except the leading "All Runs"
  sel.innerHTML = '<option value="">All Runs</option>';

  RUNS.forEach(r => {
    const dtStr = formatCT(r.started_at);
    const wf = (r.workflow_name || "").replace(/\.yml$/, "")
      .replace("scrape-foreclosures", "Foreclosure")
      .replace("scrape", "Lead");
    const ghTag = r.gh_run_number ? `Run #${r.gh_run_number}` : (r.run_id || `id ${r.id}`);
    const seen = r.total_seen ?? 0;
    const created = r.total_created ?? 0;
    const updated = r.total_updated ?? 0;
    const stats = `seen ${seen} / new ${created} / upd ${updated}`;
    const opt = document.createElement("option");
    opt.value = String(r.id);
    opt.textContent = `${ghTag} ${wf ? "- " + wf : ""} ${dtStr ? "- " + dtStr : ""}  (${stats})`;
    sel.appendChild(opt);
  });
}

// When the user picks a run, load the junction rows for that run and
// build a Set of record_ids that the filter will use.
async function applyRunPickerSelection(runIdStr) {
  if (!runIdStr) {
    SELECTED_RUN_RECORD_IDS = null;
    return;
  }
  const runId = Number(runIdStr);
  try {
    // Pull the junction rows for this run, paginated (1000 cap per request)
    const ids = new Map();   // record_id -> action
    let from = 0;
    const PAGE = 1000;
    while (true) {
      const { data, error } = await sb
        .from("scraper_run_records")
        .select("record_id,action")
        .eq("run_id", runId)
        .range(from, from + PAGE - 1);
      if (error) { console.error("loadRunRecords failed:", error); break; }
      if (!data || data.length === 0) break;
      data.forEach(row => ids.set(row.record_id, row.action));
      if (data.length < PAGE) break;
      from += PAGE;
    }
    SELECTED_RUN_RECORD_IDS = ids;
  } catch (e) {
    console.error("applyRunPickerSelection exception:", e);
    SELECTED_RUN_RECORD_IDS = null;
  }
}

// ── Realtime: live updates when anyone edits a record ──────────────
function subscribeRealtime() {
  if (realtimeChannel) return;
  realtimeChannel = sb
    .channel("records-changes")
    .on("postgres_changes", { event: "UPDATE", schema: "public", table: "records" }, (payload) => {
      const updated = payload.new;
      const rec = DATA?.records?.find(r => r.doc_num === updated.doc_num);
      if (!rec) return;
      const prevStatus = rec.siftstack_status || null;
      Object.assign(rec, normalizeFromDb({ ...updated }));
      renderTable();
      // Refresh stat cards if siftstack_status changed (count could differ)
      if (prevStatus !== (rec.siftstack_status || null)) buildStats();
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "property_data" }, (payload) => {
      const row = payload.new || payload.old;
      if (!row || !row.parcel_acct) return;
      if (row.parcel_acct === currentModalParcelAcct) {
        loadHcadData(currentModalParcelAcct);
      }
    })
    .subscribe();
}

// ── Stat Cards ─────────────────────────────────────────────────────
function buildStats() {
  // Stat cards represent the MAIN view (clerk + foreclosure). EstateTrace
  // probates live in the /probate route and are excluded from these counts
  // so the stat-card numbers always match what the main table actually shows.
  const mainRecords = DATA.records.filter(r => r._source !== "estatetrace");
  const mainTotal = mainRecords.length;
  const estatetraceCount = DATA.records.length - mainTotal;

  const cats = {};
  mainRecords.forEach(r => { cats[r.cat] = (cats[r.cat] || 0) + 1; });

  const withAddr = mainRecords.filter(r => r.prop_address && r.prop_address.trim()).length;
  const pct = mainTotal ? Math.round(withAddr / mainTotal * 100) : 0;

  const ssCompleted = mainRecords.filter(r => r.siftstack_status === "completed").length;
  const ssQueued    = mainRecords.filter(r => r.siftstack_status === "queued").length;
  const ssManual    = mainRecords.filter(r => {
    if (r.siftstack_status) return false; // already submitted or in flight
    const hasAddr = !!(r.prop_address && r.prop_address.trim());
    const hasName = !!((r.owner || r.grantor_name || "").trim());
    return !hasAddr || !hasName;
  }).length;

  let html = `
    <div class="stat-card total" data-filter="all" onclick="toggleCardFilter('all')">
      <div class="value">${mainTotal.toLocaleString()}</div>
      <div class="label">Total Leads</div>
    </div>
    <div class="stat-card addr" data-filter="addr" onclick="toggleCardFilter('addr')">
      <div class="value">${withAddr.toLocaleString()}</div>
      <div class="label">With Address</div>
      <div class="pct">${pct}%</div>
    </div>
    <div class="stat-card enriched" data-filter="ss:completed" onclick="toggleCardFilter('ss:completed')">
      <div class="value">${ssCompleted.toLocaleString()}</div>
      <div class="label">Enriched</div>
    </div>
    <div class="stat-card queued" data-filter="ss:queued" onclick="toggleCardFilter('ss:queued')">
      <div class="value">${ssQueued.toLocaleString()}</div>
      <div class="label">Queued</div>
    </div>
    <div class="stat-card manual" data-filter="ss:manual" onclick="toggleCardFilter('ss:manual')">
      <div class="value">${ssManual.toLocaleString()}</div>
      <div class="label">Needs Manual</div>
    </div>`;

  // Top categories as cards
  const catOrder = ["FRCL","LP","NOFC","TAXLIEN","LIEN","AOJ","LEVY","PROBATE"];
  const catLabels = {};
  DATA.records.forEach(r => { catLabels[r.cat] = r.cat_label; });

  catOrder.forEach(c => {
    if (cats[c]) {
      html += `
        <div class="stat-card" data-filter="cat:${c}" onclick="toggleCardFilter('cat:${c}')">
          <div class="value" style="color:${CAT_COLORS[c] || '#7c5cfc'}">${cats[c]}</div>
          <div class="label">${catLabels[c] || c}</div>
        </div>`;
    }
  });

  // EstateTrace probates — separate card. Click navigates to the dedicated
  // /probate workspace (verification queue + skip-trace UI). Source filter
  // dropdown is still available in this main dashboard for in-place viewing.
  if (estatetraceCount > 0) {
    html += `
      <div class="stat-card" onclick="goToProbateWorkspace()" title="Open the Probate Workspace — verification queue, skip-trace tools, county filters">
        <div class="value" style="color:#10b981">${estatetraceCount.toLocaleString()}</div>
        <div class="label">EstateTrace &rarr;</div>
      </div>`;
  }

  document.getElementById("stats").innerHTML = html;
}

// Navigate to the dedicated probate workspace (separate page).
function goToProbateWorkspace() {
  window.location.href = "probate.html";
}

// Switches the source filter to EstateTrace in this main dashboard
// (kept for backward compatibility with anyone using the dropdown directly).
function showEstatetraceOnly() {
  document.getElementById("sourceFilter").value = "estatetrace";
  cardFilter = null;
  currentPage = 1;
  applyFilters();
}

function toggleCardFilter(filter) {
  if (cardFilter === filter) {
    cardFilter = null;
  } else {
    cardFilter = filter;
  }
  // Highlight active card
  document.querySelectorAll(".stat-card").forEach(el => {
    el.classList.toggle("active", el.dataset.filter === cardFilter);
  });
  currentPage = 1;
  applyFilters();
}

// ── Charts ─────────────────────────────────────────────────────────
function buildCharts() {
  // Category bar chart
  const cats = {};
  const catLabels = {};
  DATA.records.forEach(r => {
    cats[r.cat] = (cats[r.cat] || 0) + 1;
    catLabels[r.cat] = r.cat_label;
  });
  const maxCat = Math.max(...Object.values(cats));
  const sortedCats = Object.entries(cats).sort((a, b) => b[1] - a[1]);

  let barHtml = "";
  sortedCats.forEach(([cat, count]) => {
    const pct = (count / maxCat * 100).toFixed(0);
    const color = CAT_COLORS[cat] || "#7c5cfc";
    const shortLabel = (catLabels[cat] || cat).replace(/ \/ /g, "/").substring(0, 20);
    barHtml += `
      <div class="bar-row">
        <div class="bar-label" title="${catLabels[cat]}">${shortLabel}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${count > 5 ? count : ''}</div></div>
        <div class="bar-count">${count}</div>
      </div>`;
  });
  document.getElementById("catChart").innerHTML = barHtml;

  // Score distribution
  const buckets = {};
  for (let i = 30; i <= 100; i += 5) buckets[i] = 0;
  DATA.records.forEach(r => {
    const b = Math.floor(r.score / 5) * 5;
    const key = Math.max(30, Math.min(100, b));
    buckets[key] = (buckets[key] || 0) + 1;
  });
  const maxBucket = Math.max(...Object.values(buckets), 1);
  let scoreHtml = "";
  Object.entries(buckets).forEach(([score, count]) => {
    const h = Math.max(2, (count / maxBucket * 100));
    const color = score >= 70 ? "var(--green)" : score >= 50 ? "var(--orange)" : "var(--accent)";
    scoreHtml += `<div class="score-bar" style="height:${h}%;background:${color}"><div class="tooltip">${score}-${parseInt(score)+4}: ${count}</div></div>`;
  });
  document.getElementById("scoreChart").innerHTML = scoreHtml;
}

// ── Filters ────────────────────────────────────────────────────────
function populateFilters() {
  const types = [...new Set(DATA.records.map(r => r.doc_type))].sort();
  const sel = document.getElementById("typeFilter");
  types.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });

  const flags = new Set();
  DATA.records.forEach(r => (r.flags || []).forEach(f => flags.add(f)));
  const fsel = document.getElementById("flagFilter");
  [...flags].sort().forEach(f => {
    const opt = document.createElement("option");
    opt.value = f; opt.textContent = f;
    fsel.appendChild(opt);
  });

  // Populate sale month filter from sale_date field (auto-populates as new months are scraped)
  const saleMonths = new Map();
  const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  DATA.records.forEach(r => {
    if (r.sale_date) {
      const d = new Date(r.sale_date);
      if (!isNaN(d)) {
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        if (!saleMonths.has(key)) saleMonths.set(key, 0);
        saleMonths.set(key, saleMonths.get(key) + 1);
      }
    }
  });
  const smSel = document.getElementById("saleMonthFilter");
  [...saleMonths.entries()].sort((a,b) => a[0].localeCompare(b[0])).forEach(([key, count]) => {
    const [y, m] = key.split("-");
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = `${monthNames[parseInt(m)-1]} ${y} (${count})`;
    smSel.appendChild(opt);
  });

  // Per-page selector
  document.getElementById("perpageSelect").addEventListener("change", function() {
    perPage = this.value === "all" ? Infinity : parseInt(this.value);
    currentPage = 1;
    applyFilters();
  });

  // Live filtering
  document.getElementById("searchInput").addEventListener("input", () => { currentPage = 1; applyFilters(); });
  document.getElementById("typeFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("scoreMin").addEventListener("input", () => { currentPage = 1; applyFilters(); });
  document.getElementById("scoreMax").addEventListener("input", () => { currentPage = 1; applyFilters(); });
  document.getElementById("flagFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("addrFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("confFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("sourceFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("runPicker").addEventListener("change", async (e) => {
    currentPage = 1;
    await applyRunPickerSelection(e.target.value);
    applyFilters();
  });
  document.getElementById("saleMonthFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("filedFrom").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("filedTo").addEventListener("change", () => { currentPage = 1; applyFilters(); });
}

function getFiltered() {
  const q     = document.getElementById("searchInput").value.toLowerCase();
  const type  = document.getElementById("typeFilter").value;
  const sMin  = parseInt(document.getElementById("scoreMin").value);
  const sMax  = parseInt(document.getElementById("scoreMax").value);
  const minScore = isNaN(sMin) ? 0 : sMin;
  const maxScore = isNaN(sMax) ? 100 : sMax;
  const flag  = document.getElementById("flagFilter").value;
  const addr  = document.getElementById("addrFilter").value;
  const conf  = document.getElementById("confFilter").value;
  const src   = document.getElementById("sourceFilter").value;
  const saleMonth = document.getElementById("saleMonthFilter").value;
  const filedFrom = document.getElementById("filedFrom").value;
  const filedTo   = document.getElementById("filedTo").value;

  return DATA.records.filter(r => {
    // Queue tab filter (added for /leads workspace) — must pass first
    if (!recordInQueue(r, currentQueue)) return false;
    // EstateTrace records are isolated from the main table by default.
    // They live in the /probate route. Only surface them in the main view
    // when the source filter is explicitly set to 'estatetrace'.
    if (r._source === "estatetrace" && src !== "estatetrace") return false;
    if (src && (r._source || "clerk") !== src) return false;
    // Run-picker filter: SELECTED_RUN_RECORD_IDS is a Map(record_id -> action)
    // populated when the user picks a run. Records not in the Map are excluded.
    if (SELECTED_RUN_RECORD_IDS && !SELECTED_RUN_RECORD_IDS.has(r.id)) return false;
    // Sale month filter (by sale_date)
    if (saleMonth && r.sale_date) {
      const d = new Date(r.sale_date);
      if (!isNaN(d)) {
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        if (key !== saleMonth) return false;
      } else return false;
    } else if (saleMonth && !r.sale_date) return false;
    // Filed date range filter
    if (filedFrom && r.filed && r.filed < filedFrom) return false;
    if (filedTo && r.filed && r.filed > filedTo) return false;
    // Card filter
    if (cardFilter) {
      if (cardFilter === "addr") {
        if (!r.prop_address || !r.prop_address.trim()) return false;
      } else if (cardFilter.startsWith("cat:")) {
        if (r.cat !== cardFilter.slice(4)) return false;
      } else if (cardFilter === "ss:completed") {
        if (r.siftstack_status !== "completed") return false;
      } else if (cardFilter === "ss:queued") {
        if (r.siftstack_status !== "queued") return false;
      } else if (cardFilter === "ss:manual") {
        if (r.siftstack_status) return false;
        const hasAddr = !!(r.prop_address && r.prop_address.trim());
        const hasName = !!((r.owner || r.grantor_name || "").trim());
        if (hasAddr && hasName) return false; // has both → not manual
      }
      // "all" = no filter
    }
    if (type && r.doc_type !== type) return false;
    if (r.score < minScore || r.score > maxScore) return false;
    if (flag && !(r.flags || []).includes(flag)) return false;
    if (addr === "with" && (!r.prop_address || !r.prop_address.trim())) return false;
    if (addr === "without" && r.prop_address && r.prop_address.trim()) return false;
    if (conf && (r.match_confidence || "none") !== conf) return false;
    if (q) {
      const hay = [r.owner, r.grantor_name, r.grantee_names, r.legal, r.doc_num, r.cat_label, r.prop_address, r.mail_address]
        .join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}
