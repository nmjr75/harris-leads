// Recompute the per-tab badges. Counts are scoped to ALL active filters
// EXCEPT the queue filter itself, so VAs see how many records are in
// each tab given their current slice.
function recomputeQueueCounts() {
  if (!DATA?.records) return;
  const src   = document.getElementById("sourceFilter").value;
  const type  = document.getElementById("typeFilter").value;
  const sMin  = parseInt(document.getElementById("scoreMin").value);
  const sMax  = parseInt(document.getElementById("scoreMax").value);
  const minScore = isNaN(sMin) ? 0 : sMin;
  const maxScore = isNaN(sMax) ? 100 : sMax;
  const flag  = document.getElementById("flagFilter").value;
  const addr  = document.getElementById("addrFilter").value;
  const conf  = document.getElementById("confFilter").value;
  const saleMonth = document.getElementById("saleMonthFilter").value;
  const filedFrom = document.getElementById("filedFrom").value;
  const filedTo   = document.getElementById("filedTo").value;
  const q     = (document.getElementById("searchInput").value || "").toLowerCase();

  const baseScope = (r) => {
    if (r._source === "estatetrace" && src !== "estatetrace") return false;
    if (src && (r._source || "clerk") !== src) return false;
    if (SELECTED_RUN_RECORD_IDS && !SELECTED_RUN_RECORD_IDS.has(r.id)) return false;
    if (saleMonth) {
      if (!r.sale_date) return false;
      const d = new Date(r.sale_date);
      if (isNaN(d)) return false;
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (key !== saleMonth) return false;
    }
    if (filedFrom && r.filed && r.filed < filedFrom) return false;
    if (filedTo && r.filed && r.filed > filedTo) return false;
    if (type && r.doc_type !== type) return false;
    if (r.score < minScore || r.score > maxScore) return false;
    if (flag && !(r.flags || []).includes(flag)) return false;
    if (addr === "with" && (!r.prop_address || !r.prop_address.trim())) return false;
    if (addr === "without" && r.prop_address && r.prop_address.trim()) return false;
    if (conf && (r.match_confidence || "none") !== conf) return false;
    if (q) {
      const hay = [r.owner, r.grantor_name, r.grantee_names, r.legal, r.doc_num, r.cat_label, r.prop_address, r.mail_address]
        .filter(Boolean).join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  };

  const scoped = DATA.records.filter(baseScope);
  const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val.toLocaleString(); };
  setText("verifyCount",    scoped.filter(r => recordInQueue(r, "verify")).length);
  setText("activeCount",    scoped.filter(r => recordInQueue(r, "active")).length);
  setText("archiveCount",   scoped.filter(r => recordInQueue(r, "archive")).length);
  setText("researchCount",  scoped.filter(r => recordInQueue(r, "research")).length);
  setText("siftstackQCount", scoped.filter(r => recordInQueue(r, "siftstack")).length);
  setText("autoqCount",     scoped.filter(r => recordInQueue(r, "autoq")).length);
}

async function loadContactData() {
  phonesByRecord.clear();
  emailsByRecord.clear();
  jobsByRecord.clear();
  try {
    const [pRes, eRes, jRes] = await Promise.all([
      sb.from("contact_phones").select("*").limit(50000),
      sb.from("contact_emails").select("*").limit(50000),
      sb.from("skip_trace_jobs").select("*").limit(50000),
    ]);
    (pRes.data || []).forEach(p => {
      if (!phonesByRecord.has(p.record_id)) phonesByRecord.set(p.record_id, []);
      phonesByRecord.get(p.record_id).push(p);
    });
    (eRes.data || []).forEach(e => {
      if (!emailsByRecord.has(e.record_id)) emailsByRecord.set(e.record_id, []);
      emailsByRecord.get(e.record_id).push(e);
    });
    (jRes.data || []).forEach(j => {
      jobsByRecord.set(`${j.record_id}|${j.service}`, j);
    });
  } catch (e) { console.warn("loadContactData failed:", e); }
}

async function refreshContactDataForRecord(recordId) {
  try {
    const [pRes, eRes, jRes] = await Promise.all([
      sb.from("contact_phones").select("*").eq("record_id", recordId),
      sb.from("contact_emails").select("*").eq("record_id", recordId),
      sb.from("skip_trace_jobs").select("*").eq("record_id", recordId),
    ]);
    phonesByRecord.set(recordId, pRes.data || []);
    emailsByRecord.set(recordId, eRes.data || []);
    // Clear and re-set jobs for this record
    [...jobsByRecord.keys()].forEach(k => { if (k.startsWith(recordId + "|")) jobsByRecord.delete(k); });
    (jRes.data || []).forEach(j => jobsByRecord.set(`${j.record_id}|${j.service}`, j));
  } catch (e) { console.warn("refreshContactDataForRecord failed:", e); }
}

// ── Skip-trace helpers (ported from probate.html) ─────────────────
function normalizePhone(input) {
  if (!input) return null;
  const digits = String(input).replace(/\D/g, "");
  let ten;
  if (digits.length === 10) ten = digits;
  else if (digits.length === 11 && digits[0] === "1") ten = digits.slice(1);
  else return null;
  return {
    e164: "+1" + ten,
    display: `(${ten.slice(0, 3)}) ${ten.slice(3, 6)}-${ten.slice(6)}`,
  };
}

function buildTPSUrl(firstName, lastName, city, state) {
  const name = [firstName, lastName].filter(Boolean).join(" ").trim();
  if (!name) return null;
  const cityState = [city, state].filter(Boolean).join(" ").trim();
  const params = new URLSearchParams();
  params.set("name", name);
  if (cityState) params.set("citystatezip", cityState);
  return "https://www.truepeoplesearch.com/results?" + params.toString();
}

function formatPhoneOnBlur(input) {
  const raw = input.value.trim();
  if (!raw) { input.classList.remove("error"); return; }
  const norm = normalizePhone(raw);
  if (norm) { input.value = norm.display; input.classList.remove("error"); }
  else { input.classList.add("error"); }
}

// Toggle which phone slot is "best" within a SECTION (owner or co-borrower).
// Only one starred per role. Visual-only until Save.
function toggleBestInSection(sectionEl, slot) {
  const slots = sectionEl.querySelectorAll(".phone-slot");
  slots.forEach(el => {
    const s = parseInt(el.dataset.slot, 10);
    const star = el.querySelector(".star-toggle");
    if (s === slot) {
      const wasActive = el.classList.contains("is-best");
      el.classList.toggle("is-best", !wasActive);
      star.classList.toggle("active", !wasActive);
      star.innerHTML = !wasActive ? "&#9733;" : "&#9734;";
    } else {
      el.classList.remove("is-best");
      star.classList.remove("active");
      star.innerHTML = "&#9734;";
    }
  });
}

function renderRecordList() {
  const container = document.getElementById("records");
  if (!container) return;
  if (filtered.length === 0) {
    const labels = {verify:"Verify",active:"Active",archive:"Archive",research:"Research",siftstack:"Sent to SIFTstack",autoq:"Auto-Q"};
    container.innerHTML = `
      <div class="empty-state">
        <h3>No records in ${labels[currentQueue]} queue</h3>
        <p>Try changing filters or switch to a different queue tab above.</p>
      </div>`;
    return;
  }
  const effectivePP = perPage === Infinity ? filtered.length : perPage;
  const pageStart = (currentPage - 1) * effectivePP;
  const pageEnd = Math.min(pageStart + effectivePP, filtered.length);
  const page = filtered.slice(pageStart, pageEnd);
  container.innerHTML = page.map(renderRecordCard).join("");
}

function renderRecordCard(r) {
  const isSelected = selectedRows.has(r.doc_num);
  const selectedCls = isSelected ? " selected" : "";
  const scoreCls = (r.score || 0) >= 70 ? "score-high" : (r.score || 0) >= 50 ? "score-med" : "score-low";

  let flagsHtml = "";
  (r.flags || []).forEach(f => {
    const cls = f === "New this week" ? "fresh" : DISTRESS_FLAGS.has(f) ? "distress" : "info";
    flagsHtml += `<span class="flag-pill ${cls}" title="${escapeHtml(f)}">${escapeHtml(f.length > 8 ? f.substring(0,8) + "…" : f)}</span>`;
  });

  const propAddr = [r.prop_address, r.prop_city, r.prop_state, r.prop_zip].filter(Boolean).join(", ");
  const mailAddr = [r.mail_address, r.mail_city, r.mail_state, r.mail_zip].filter(Boolean).join(", ");

  let ssPill = "";
  if (r.manual_submitted_at) {
    ssPill = `<span class="siftstack-pill-card manual" title="Manually submitted by VA">M-${r.siftstack_status || "sent"}</span>`;
  } else if (r.siftstack_status) {
    ssPill = `<span class="siftstack-pill-card ${r.siftstack_status}" title="Auto-queued by scraper (legacy)">A-${r.siftstack_status}</span>`;
  }

  const docNumEsc = escapeHtml(r.doc_num || "");
  const cat = r.cat_label || r.cat || "";

  return `
    <div class="record-card${selectedCls}" data-doc-num="${docNumEsc}">
      <div class="record-row">
        <div class="record-cb-cell">
          <input type="checkbox" class="record-cb" ${isSelected ? "checked" : ""} onchange="toggleRecordCard('${docNumEsc}', this.checked)">
        </div>
        <div class="record-field"><span class="score-pill ${scoreCls}">${r.score || 0}</span></div>
        <div class="record-field" title="Filed">${r.filed || "—"}</div>
        <div class="record-field" title="Sale Date">${r.sale_date || ""}</div>
        <div class="record-field"><span class="type-badge">${escapeHtml(r.doc_type || "")}</span></div>
        <div class="record-field" title="${escapeHtml(cat)}">${escapeHtml(cat)}</div>
        <div class="record-field" title="${escapeHtml(r.owner || "")}">${escapeHtml(r.owner || "—")}</div>
        <div class="record-field" title="${escapeHtml(r.co_borrower || "")}">${escapeHtml(r.co_borrower || "")}</div>
        <div class="record-field" title="${escapeHtml(r.grantor_name || "")}">${escapeHtml(r.grantor_name || "")}</div>
        <div class="record-field wrap">${flagsHtml}</div>
        <div class="record-field" title="${escapeHtml(r.legal || "")}">${escapeHtml(r.legal || "")}</div>
        <div class="record-field" title="${escapeHtml(propAddr)}">${escapeHtml(propAddr || "—")}</div>
        <div class="record-field dim" title="${escapeHtml(mailAddr)}">${escapeHtml(mailAddr || "")}</div>
        <div class="record-field" title="Amount">${escapeHtml(r.amount || "")}</div>
        <div class="record-field"><span class="conf-pill conf-${r.match_confidence || 'none'}">${r.match_confidence || 'none'}</span></div>
        <div class="record-field">${ssPill}</div>
        <div class="record-field dim" title="${docNumEsc}">${docNumEsc}</div>
        <div class="record-field">
          ${r.clerk_url ? `<a class="ext-link-card" href="${escapeHtml(r.clerk_url)}" target="_blank" rel="noopener" title="Open Clerk record">CL</a>` : ""}
          ${r.hcad_url ? `<a class="ext-link-card" href="${escapeHtml(r.hcad_url)}" target="_blank" rel="noopener" title="Open HCAD" style="color:var(--green)">HC</a>` : ""}
        </div>
        <div class="actions-col">${renderActionsForRecord(r)}</div>
      </div>
      ${renderSkipTraceSection(r)}
    </div>
  `;
}

function renderActionsForRecord(r) {
  const role = currentProfile?.role;
  const canEdit = role === "admin" || role === "editor";
  if (!canEdit) return `<span style="font-size:0.7rem;color:var(--text-muted)">read-only</span>`;
  const status = r.verification_status;
  const id = escapeHtml(r.id);
  // Compact text buttons sized for a table cell. Stack vertically with
  // small font; user reads what each button does. No more cryptic icons.
  const btn = (cls, newStatus, label, title) =>
    `<button class="action-btn ${cls}" title="${title}" onclick="flipStatusCard('${id}','${newStatus}', this)">${label}</button>`;

  let actions;
  if (status === "pending" || status == null) {
    actions = btn("confirm", "verified_owns", "Confirm", "Confirm owner owns the property → moves to Active") +
              btn("archive", "verified_no_owns", "Archive", "No property / not a real lead → moves to Archive") +
              btn("research", "needs_research", "Research", "Cannot find the address → moves to Research");
  } else if (status === "verified_owns") {
    actions = btn("reverify", "pending", "Re-verify", "Send back to Verify queue") +
              btn("archive", "verified_no_owns", "Archive", "No property") +
              btn("research", "needs_research", "Research", "Needs research");
  } else if (status === "verified_no_owns") {
    actions = btn("reverify", "pending", "Re-verify", "Send back to Verify queue") +
              btn("confirm", "verified_owns", "Confirm", "Actually owns property");
  } else if (status === "needs_research") {
    actions = btn("confirm", "verified_owns", "Confirm", "Confirm Owns") +
              btn("archive", "verified_no_owns", "Archive", "No Property") +
              btn("reverify", "pending", "Re-verify", "Re-verify");
  } else {
    actions = "—";
  }
  // Skip-trace toggle button only shown on Active queue records
  if (recordInQueue(r, "active")) {
    const phones = phonesByRecord.get(r.id) || [];
    const phoneCount = phones.length;
    actions += `<button class="action-btn skiptrace" title="Open skip-trace panel for owner + co-borrower" onclick="toggleStpRow('${id}', this)">Skip Trace${phoneCount > 0 ? ` (${phoneCount})` : ""}</button>`;
  }
  return `<div class="actions-cell-inner">${actions}</div>`;
}

function toggleStpRow(recordId, btnEl) {
  const row = document.getElementById(`stp-row-${recordId}`);
  const panel = document.getElementById(`stp-panel-${recordId}`);
  if (!row || !panel) return;
  if (row.style.display === "none" || !row.style.display) {
    panel.innerHTML = renderPanelForm(recordId);
    row.style.display = "";
    if (btnEl) btnEl.classList.add("active");
  } else {
    row.style.display = "none";
    panel.innerHTML = "";
    if (btnEl) btnEl.classList.remove("active");
  }
}

// Build the full skip-trace panel — matches probate UX with two
// side-by-side sections (owner + co-borrower), search date / status /
// comment / notes at the top, 4 phone slots + email per section,
// last-seen date per phone, functional star.
function renderPanelForm(recordId) {
  const r = DATA.records.find(rec => rec.id === recordId);
  if (!r) return `<div class="stp-error">Record not found.</div>`;

  const phones = phonesByRecord.get(recordId) || [];
  const emails = emailsByRecord.get(recordId) || [];
  const job = jobsByRecord.get(`${recordId}|truepeoplesearch`) || {};

  const tpsPhones = phones.filter(p => p.source === "truepeoplesearch_manual");
  const tpsEmails = emails.filter(e => e.source === "truepeoplesearch_manual");

  // Phones bucketed by role, then by priority slot
  const buckets = { owner: {}, co_borrower: {} };
  tpsPhones.forEach(p => {
    if (!buckets[p.role]) return;
    if (p.priority >= 1 && p.priority <= 4) buckets[p.role][p.priority] = p;
  });
  // Email per role (first one)
  const ownerEmail = tpsEmails.find(e => e.role === "owner")?.email || "";
  const cobEmail   = tpsEmails.find(e => e.role === "co_borrower")?.email || "";

  // Name parsing for TPS link (first/last from full name string)
  const nameParts = (s) => {
    const t = (s || "").trim();
    if (!t) return [null, null];
    const parts = t.split(/\s+/);
    return [parts[0], parts.slice(1).join(" ")];
  };
  const [oFirst, oLast] = nameParts(r.owner);
  const [cFirst, cLast] = nameParts(r.co_borrower);
  const ownerTps = buildTPSUrl(oFirst, oLast, r.prop_city || r.mail_city, r.prop_state || r.mail_state);
  const cobTps   = buildTPSUrl(cFirst, cLast, r.prop_city || r.mail_city, r.prop_state || r.mail_state);

  const todayCT = new Date().toLocaleDateString("en-CA", { timeZone: "America/Chicago" });

  const personBlock = (role, name, tpsUrl, slotsObj, emailVal) => {
    const slot = (n, label) => {
      const p = slotsObj[n] || {};
      const isBest = !!p.is_best;
      return `
        <div class="phone-slot ${isBest ? "is-best" : ""}" data-role="${role}" data-slot="${n}">
          <button class="star-toggle ${isBest ? "active" : ""}" type="button"
                  onclick="toggleBestInSection(this.closest('.stp-person-block'), ${n})"
                  title="Mark as best phone for SMS">${isBest ? "&#9733;" : "&#9734;"}</button>
          <span class="slot-label">${label}</span>
          <input type="text" class="phone-input" placeholder="(XXX) XXX-XXXX"
                 data-phone-input="${n}" data-role="${role}"
                 value="${escapeHtml(p.phone_display || "")}"
                 onblur="formatPhoneOnBlur(this)">
          <label style="font-size:0.66rem;color:var(--text-muted);margin-left:auto">Last seen</label>
          <input type="date" class="last-seen-input"
                 data-last-seen="${n}" data-role="${role}"
                 value="${escapeHtml(p.last_activity || "")}">
        </div>`;
    };
    return `
      <div class="stp-person-block" data-role="${role}">
        <div class="stp-person-header">
          <span>${escapeHtml(name || "(none)")}<span class="role-tag">${role.replace("_", " ")}</span></span>
          ${tpsUrl
            ? `<a class="tps-link" href="${escapeHtml(tpsUrl)}" target="_blank" rel="noopener" title="Search ${escapeHtml(name)} on TruePeopleSearch">&#8599; TPS</a>`
            : `<span class="tps-link disabled">no name</span>`}
        </div>
        <div class="stp-phones">
          ${slot(1, "Cell 1")}
          ${slot(2, "Cell 2")}
          ${slot(3, "Cell 3")}
          ${slot(4, "Land 1")}
        </div>
        <div class="stp-email-row">
          <label>Email</label>
          <input type="email" class="email-input" data-role="${role}"
                 placeholder="email@example.com" value="${escapeHtml(emailVal || "")}">
        </div>
      </div>`;
  };

  const showCob = !!r.co_borrower;
  const peopleHtml = showCob
    ? personBlock("owner", r.owner || "(no owner)", ownerTps, buckets.owner, ownerEmail) +
      personBlock("co_borrower", r.co_borrower, cobTps, buckets.co_borrower, cobEmail)
    : personBlock("owner", r.owner || "(no owner)", ownerTps, buckets.owner, ownerEmail);

  return `
    <div class="stp-header">
      <h4>Skip Trace Workspace</h4>
      <span style="font-size:0.7rem;color:var(--text-muted)">Doc# ${escapeHtml(r.doc_num || "")}</span>
    </div>

    <div class="stp-meta-row">
      <label>Search Date</label>
      <input type="date" class="stp-input short-date" id="stp-date-${recordId}"
             value="${escapeHtml(job.search_date || todayCT)}">
      <label style="margin-left:6px">Status</label>
      <select class="stp-select" id="stp-status-${recordId}">
        <option value="pending"        ${(!job.status || job.status === "pending") ? "selected" : ""}>Pending</option>
        <option value="open"           ${job.status === "open" ? "selected" : ""}>Open</option>
        <option value="not_found"      ${job.status === "not_found" ? "selected" : ""}>Not Found</option>
        <option value="needs_research" ${job.status === "needs_research" ? "selected" : ""}>Needs Research</option>
      </select>
    </div>
    <div class="stp-meta-row">
      <label>Comment</label>
      <input type="text" class="stp-input comment-input" id="stp-comment-${recordId}"
             placeholder="One-line comment about this search..."
             value="${escapeHtml(job.comment || "")}">
    </div>
    <div class="stp-meta-row">
      <label>Notes</label>
      <textarea class="stp-input notes-input" id="stp-notes-${recordId}" rows="2"
                placeholder="Free-form notes from VA — context, leads, follow-ups..."
                style="resize:vertical;min-height:36px">${escapeHtml(job.notes || "")}</textarea>
    </div>

    <div class="stp-people-grid ${showCob ? "" : "single-col"}" id="stp-people-${recordId}">
      ${peopleHtml}
    </div>

    <div class="stp-error" id="stp-error-${recordId}"></div>

    <div class="stp-buttons">
      <button class="stp-btn" onclick="toggleStpRow('${recordId}', null)">Close</button>
      <button class="stp-btn primary" onclick="savePanelDataCard('${recordId}', this)">Save Skip Trace</button>
    </div>`;
}

// Save the panel — writes to skip_trace_jobs (one row), contact_phones
// (delete-then-insert all TPS-source rows for owner+co_borrower roles),
// and contact_emails (same pattern). Comment + Notes both stored on
// the skip_trace_jobs row.
async function savePanelDataCard(recordId, btnEl) {
  if (!currentSession?.user?.id) { leadsToast("Sign in required", "error"); return; }
  const role = currentProfile?.role;
  if (role !== "admin" && role !== "editor") {
    leadsToast("Only editors can save skip-trace data", "error");
    return;
  }
  const errEl = document.getElementById(`stp-error-${recordId}`);
  if (errEl) errEl.textContent = "";

  // The panel lives inside a <tr> in the table — find it via id, NOT
  // .closest('.record-card'). That was the bug that broke Save.
  const panel = document.getElementById(`stp-panel-${recordId}`);
  if (!panel) {
    leadsToast("Panel not found — cannot save", "error");
    return;
  }

  const date = document.getElementById(`stp-date-${recordId}`).value || null;
  const status = document.getElementById(`stp-status-${recordId}`).value;
  const comment = document.getElementById(`stp-comment-${recordId}`).value.trim() || null;
  const notes = document.getElementById(`stp-notes-${recordId}`).value.trim() || null;

  // Collect phones from each .phone-slot
  const phoneRows = [];
  let hasInvalid = false;
  panel.querySelectorAll(".phone-slot").forEach(el => {
    const r = el.dataset.role;
    const slot = parseInt(el.dataset.slot, 10);
    const phoneInput = el.querySelector(".phone-input");
    const lastSeenInput = el.querySelector(".last-seen-input");
    const raw = phoneInput.value.trim();
    if (!raw) return;
    const norm = normalizePhone(raw);
    if (!norm) {
      phoneInput.classList.add("error");
      hasInvalid = true;
      return;
    }
    phoneInput.classList.remove("error");
    phoneRows.push({
      record_id: recordId,
      role: r,
      phone_e164: norm.e164,
      phone_display: norm.display,
      phone_type: slot === 4 ? "landline" : "wireless",
      priority: slot,
      is_best: el.classList.contains("is-best"),
      source: "truepeoplesearch_manual",
      last_activity: lastSeenInput.value || null,
      added_by: currentSession.user.id,
      updated_by: currentSession.user.id,
    });
  });

  if (hasInvalid) {
    if (errEl) errEl.textContent = "One or more phones are invalid (need 10 digits). Fix the highlighted fields.";
    return;
  }

  // is_best constraint: at most one per (record_id, role)
  const bestByRole = {};
  for (const p of phoneRows) {
    if (p.is_best) {
      if (bestByRole[p.role]) {
        if (errEl) errEl.textContent = `Only one "best" phone allowed per person (${p.role}).`;
        return;
      }
      bestByRole[p.role] = true;
    }
  }

  // Collect emails per role
  const emailRows = [];
  panel.querySelectorAll(".email-input").forEach(input => {
    const r = input.dataset.role;
    const raw = input.value.trim();
    if (!raw) return;
    if (!raw.includes("@")) {
      hasInvalid = true;
      input.classList.add("error");
      return;
    }
    input.classList.remove("error");
    emailRows.push({
      record_id: recordId,
      role: r,
      email: raw.toLowerCase(),
      source: "truepeoplesearch_manual",
      added_by: currentSession.user.id,
      updated_by: currentSession.user.id,
    });
  });
  if (hasInvalid) {
    if (errEl) errEl.textContent = "Email looks invalid (no @). Fix highlighted fields.";
    return;
  }

  btnEl.disabled = true;
  btnEl.textContent = "Saving...";

  try {
    // 1. Upsert skip_trace_jobs row
    const jobPayload = {
      record_id: recordId,
      service: "truepeoplesearch",
      status: status,
      search_date: date,
      comment: comment,
      searched_by: currentSession.user.id,
    };
    // Notes column may not exist in older DB — try with notes first, fall back without
    let jobErr;
    ({ error: jobErr } = await sb
      .from("skip_trace_jobs")
      .upsert({ ...jobPayload, notes: notes }, { onConflict: "record_id,service" }));
    if (jobErr && jobErr.message && jobErr.message.includes("notes")) {
      // notes column doesn't exist — retry without
      ({ error: jobErr } = await sb
        .from("skip_trace_jobs")
        .upsert(jobPayload, { onConflict: "record_id,service" }));
      if (!jobErr) {
        leadsToast("Notes saved as comment (notes column missing — see migration).", "info");
      }
    }
    if (jobErr) throw jobErr;

    // 2. Delete + re-insert phones for owner + co_borrower (TPS source)
    const { error: delPhErr } = await sb
      .from("contact_phones")
      .delete()
      .eq("record_id", recordId)
      .eq("source", "truepeoplesearch_manual")
      .in("role", ["owner", "co_borrower"]);
    if (delPhErr) throw delPhErr;
    if (phoneRows.length > 0) {
      const { error: insPhErr } = await sb.from("contact_phones").insert(phoneRows);
      if (insPhErr) throw insPhErr;
    }

    // 3. Delete + re-insert emails for owner + co_borrower (TPS source)
    const { error: delEmErr } = await sb
      .from("contact_emails")
      .delete()
      .eq("record_id", recordId)
      .eq("source", "truepeoplesearch_manual")
      .in("role", ["owner", "co_borrower"]);
    if (delEmErr) throw delEmErr;
    if (emailRows.length > 0) {
      const { error: insEmErr } = await sb.from("contact_emails").insert(emailRows);
      if (insEmErr) throw insEmErr;
    }

    await refreshContactDataForRecord(recordId);
    leadsToast("Skip trace saved", "success");
    applyFilters();
  } catch (e) {
    console.error("savePanelDataCard error:", e);
    const msg = e.message || (e.error ? e.error.message : null) || String(e);
    if (errEl) errEl.textContent = "Save failed: " + msg;
    leadsToast("Save failed: " + msg, "error");
    btnEl.disabled = false;
    btnEl.textContent = "Save Skip Trace";
  }
}

async function flipStatusCard(recordId, newStatus, btnEl) {
  if (!currentSession?.user?.id) { leadsToast("Sign in required", "error"); return; }
  const role = currentProfile?.role;
  if (role !== "admin" && role !== "editor") {
    leadsToast("Only editors can verify records", "error");
    return;
  }
  const card = btnEl?.closest(".record-card");
  if (card) { card.style.opacity = "0.5"; card.style.pointerEvents = "none"; }
  try {
    const { data, error } = await sb
      .from("records")
      .update({ verification_status: newStatus })
      .eq("id", recordId)
      .select("verification_status, verified_by, verified_at, manual_overrides")
      .single();
    if (error) {
      leadsToast("Update failed: " + error.message, "error");
      return;
    }
    const rec = DATA.records.find(r => r.id === recordId);
    if (rec && data) Object.assign(rec, data);
    applyFilters();
    leadsToast(`Status changed to ${newStatus.replace(/_/g, " ")}`, "success");
  } catch (e) {
    leadsToast("Update crashed: " + (e.message || e), "error");
  } finally {
    if (card) { card.style.opacity = "1"; card.style.pointerEvents = ""; }
  }
}

function toggleRecordCard(docNum, checked) {
  if (checked) selectedRows.add(docNum);
  else selectedRows.delete(docNum);
  const card = document.querySelector(`.record-card[data-doc-num="${docNum}"]`);
  if (card) card.classList.toggle("selected", checked);
  updateSelectionUI();
}

let leadsToastEl = null;
let leadsToastTimer = null;
function leadsToast(message, type = "info") {
  if (leadsToastEl) leadsToastEl.remove();
  if (leadsToastTimer) clearTimeout(leadsToastTimer);
  leadsToastEl = document.createElement("div");
  leadsToastEl.className = `toast ${type}`;
  leadsToastEl.textContent = message;
  document.body.appendChild(leadsToastEl);
  leadsToastTimer = setTimeout(() => {
    if (leadsToastEl) leadsToastEl.remove();
    leadsToastEl = null;
  }, 3500);
}

function applyFilters() {
  recomputeQueueCounts();
  filtered = getFiltered();
  sortData();
  renderTable();
  renderPagination();

  // Active filter tag
  let tag = "";
  if (cardFilter && cardFilter !== "all") {
    const label =
      cardFilter === "addr" ? "With Address" :
      cardFilter === "ss:completed" ? "SIFTstack Enriched" :
      cardFilter === "ss:queued" ? "SIFTstack Queued" :
      cardFilter === "ss:manual" ? "Needs Manual Research" :
      cardFilter.replace("cat:", "");
    tag = `<span class="filter-tag">${label} <span class="x" onclick="toggleCardFilter('${cardFilter}')">&times;</span></span>`;
  }
  document.getElementById("activeFilter").innerHTML = tag;
  document.getElementById("showingLabel").textContent = `Showing ${filtered.length} of ${DATA.total}`;
}

function resetFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("typeFilter").value = "";
  document.getElementById("scoreMin").value = "";
  document.getElementById("scoreMax").value = "";
  document.getElementById("flagFilter").value = "";
  document.getElementById("addrFilter").value = "";
  document.getElementById("confFilter").value = "";
  document.getElementById("sourceFilter").value = "";
  document.getElementById("runPicker").value = "";
  SELECTED_RUN_RECORD_IDS = null;
  document.getElementById("saleMonthFilter").value = "";
  document.getElementById("filedFrom").value = "";
  document.getElementById("filedTo").value = "";
  cardFilter = null;
  selectedRows.clear();
  updateSelectionUI();
  document.querySelectorAll(".stat-card").forEach(el => el.classList.remove("active"));
  currentPage = 1;
  applyFilters();
}

// ── Sort ───────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = col === "filed"; }
  sortData();
  renderTable();
}

function sortData() {
  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === "score") { va = va || 0; vb = vb || 0; }
    else if (sortCol === "flags") { va = (va||[]).length; vb = (vb||[]).length; }
    else { va = (va || "").toString().toLowerCase(); vb = (vb || "").toString().toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

// ── Table Render ───────────────────────────────────────────────────
function renderTable() {
  // Header with checkbox
  const effectivePP = perPage === Infinity ? filtered.length : perPage;
  const pageData = filtered.slice((currentPage - 1) * effectivePP, (currentPage - 1) * effectivePP + effectivePP);
  const allPageSelected = pageData.length > 0 && pageData.every(r => selectedRows.has(r.doc_num));

  let thead = `<tr><th style="width:32px"><input type="checkbox" class="hdr-cb" ${allPageSelected ? 'checked' : ''} onchange="togglePageAll(this.checked)"></th>`;
  COLS.forEach(c => {
    const arrow = sortCol === c.key ? (sortAsc ? " &#9650;" : " &#9660;") : "";
    thead += `<th style="width:${c.w}" onclick="sortBy('${c.key}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  });
  thead += "</tr>";
  document.getElementById("thead").innerHTML = thead;

  // Body (paginated)
  let html = "";
  pageData.forEach(r => {
    const scoreCls = r.score >= 70 ? "score-high" : r.score >= 50 ? "score-med" : "score-low";
    const isSelected = selectedRows.has(r.doc_num);

    let flagsHtml = "";
    (r.flags || []).forEach(f => {
      const cls = f === "New this week" ? "fresh" : DISTRESS_FLAGS.has(f) ? "distress" : "info";
      flagsHtml += `<span class="flag-pill ${cls}">${f}</span>`;
    });

    const propAddr = [r.prop_address, r.prop_city, r.prop_state, r.prop_zip].filter(Boolean).join(", ");
    const mailAddr = [r.mail_address, r.mail_city, r.mail_state, r.mail_zip].filter(Boolean).join(", ");

    const rowIdx = (currentPage - 1) * perPage + filtered.indexOf(r);
    const editable = currentProfile && (currentProfile.role === "admin" || currentProfile.role === "editor");
    const hasEdits = (r.manual_overrides || []).length > 0;
    const editMark = hasEdits ? '<span class="edit-dot" title="Manually edited"></span>' : '';
    const mutedDash = '<span style="color:var(--text-muted)">--</span>';
    const cell = (field, displayVal, extraStyle) => {
      const content = displayVal || mutedDash;
      const style = extraStyle ? ` style="${extraStyle}"` : "";
      if (editable) {
        return `<td class="editable-cell" ondblclick="startEdit('${r.doc_num}','${field}',this)" title="Double-click to edit"${style}>${content}</td>`;
      }
      return `<td onclick="openModal(${rowIdx})"${style}>${content}</td>`;
    };

    html += `<tr class="${isSelected ? 'selected' : ''}" data-idx="${rowIdx}">
      <td><input type="checkbox" class="row-cb" ${isSelected ? 'checked' : ''} onchange="toggleRow('${r.doc_num}', this.checked)"></td>
      <td class="score-cell" onclick="openModal(${rowIdx})"><span class="score-pill ${scoreCls}">${r.score || 0}</span>${editMark}</td>
      <td onclick="openModal(${rowIdx})">${r.filed || ""}</td>
      ${cell("sale_date", r.sale_date)}
      <td onclick="openModal(${rowIdx})"><span class="type-badge">${r.doc_type || ""}</span></td>
      <td onclick="openModal(${rowIdx})">${r.cat_label || ""}</td>
      ${cell("owner", r.owner)}
      ${cell("co_borrower", r.co_borrower)}
      ${cell("grantor_name", r.grantor_name)}
      <td onclick="openModal(${rowIdx})">${flagsHtml}</td>
      ${cell("legal", r.legal)}
      ${cell("prop_address", propAddr)}
      ${cell("mail_address", mailAddr)}
      ${cell("amount", r.amount, "font-size:0.78rem")}
      ${editable
        ? `<td class="editable-cell" ondblclick="startEdit('${r.doc_num}','match_confidence',this)" title="Double-click to edit"><span class="conf-pill conf-${r.match_confidence || 'none'}">${r.match_confidence || 'none'}</span></td>`
        : `<td onclick="openModal(${rowIdx})"><span class="conf-pill conf-${r.match_confidence || 'none'}">${r.match_confidence || 'none'}</span></td>`}
      <td onclick="openModal(${rowIdx})">${renderSiftstackPill(r)}</td>
      <td style="font-size:0.7rem" onclick="openModal(${rowIdx})">${r.doc_num}</td>
      <td style="font-size:0.7rem">${r.clerk_url ? '<a href="' + r.clerk_url + '" target="_blank" rel="noopener">Clerk</a>' : ''}${r.hcad_url ? ' <a href="' + r.hcad_url + '" target="_blank" rel="noopener" style="color:var(--green)">HCAD</a>' : ''}</td>
      <td class="actions-cell">${renderActionsForRecord(r)}</td>
    </tr>`;

    // Skip-trace expansion row — only on Active queue. Visible when
    // user clicks the "Skip Trace" action button.
    if (recordInQueue(r, "active")) {
      const phones = phonesByRecord.get(r.id) || [];
      const phoneCount = phones.length;

function renderSiftstackPill(r) {
  const status = r.siftstack_status || "none";
  const ts = r.siftstack_completed_at;
  const labels = {
    completed: "✓ Enriched",
    queued:    "⏳ Queued",
    failed:    "✗ Failed",
    none:      "—",
  };
  const label = labels[status] || "—";

  return `<span class="siftstack-pill ss-${status}" title="${safeTitle}">${label}</span>`;
}

// ── Sync Probates (manual trigger, server-side via Edge Function) ──
// Calls supabase/functions/trigger-probate-sync which:
//   1. Verifies the caller is admin or editor
//   2. Calls GitHub workflow_dispatch via a server-side PAT
//   3. Returns the run URL so the user can watch progress
// VAs never see GitHub or the PAT — everything happens server-side.
async function handleSyncProbates() {
  if (!currentSession?.user?.id) { alert("Not signed in."); return; }
  const editable = currentProfile && (currentProfile.role === "admin" || currentProfile.role === "editor");
  if (!editable) { alert("Only editors can sync probates."); return; }

  const btn = document.getElementById("syncProbatesBtn");
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = "&#x21bb; Syncing...";

  try {
    const { data, error } = await sb.functions.invoke("trigger-probate-sync", {
      body: { dry_run: false },
    });

    if (error) {
      // sb.functions.invoke surfaces non-2xx as an error with the response in context
      const detail = (error.context && typeof error.context.json === "function")
        ? await error.context.json().catch(() => null)
        : null;
      const msg = (detail && detail.error) || error.message || "Sync trigger failed";
      alert(`Sync failed: ${msg}`);
      return;
    }

    if (!data || !data.ok) {
      alert(`Sync failed: ${(data && data.error) || "Unknown error"}`);
      return;
    }

    // Success — show a toast-like alert with the run link
    const runUrl = data.run_url || "";
    const proceed = confirm(
      `${data.message || "Sync started."}\n\n` +
      `New probates will appear in this dashboard within ~30-60 seconds.\n\n` +
      `Click OK to open the live workflow status, or Cancel to stay here.`
    );
    if (proceed && runUrl) {
      window.open(runUrl, "_blank", "noopener");
    }
  } catch (e) {
    alert(`Sync failed: ${e.message || e}`);
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}

async function handleSiftstackButton() {
  if (!currentSession?.user?.id) { alert("Not signed in."); return; }
  const editable = currentProfile && (currentProfile.role === "admin" || currentProfile.role === "editor");
  if (!editable) { alert("Only editors can queue records."); return; }
  if (selectedRows.size === 0) return;

  const selected    = DATA.records.filter(r => selectedRows.has(r.doc_num));
  const completedL  = selected.filter(r => r.siftstack_status === "completed");
  const queuedL     = selected.filter(r => r.siftstack_status === "queued");
  const freshL      = selected.filter(r => !r.siftstack_status || r.siftstack_status === "failed");

  let toQueue;
  if (completedL.length > 0) {
    const choice = await showSiftstackConfirm(selected.length, completedL.length, queuedL.length, freshL.length);
    if (choice === "cancel") return;
    if (choice === "reenrich") toQueue = [...freshL, ...completedL];
    else if (choice === "skip") toQueue = freshL;
  } else {
    toQueue = freshL;
    if (queuedL.length > 0 && freshL.length === 0) {
      alert(`All ${queuedL.length} selected records are already queued. Nothing to do.`);
      return;
    }
  }

  if (!toQueue || toQueue.length === 0) {
    alert("No records to submit.");
    return;
  }

  const batchId = (crypto.randomUUID && crypto.randomUUID()) ||
    "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
    });

  const rows = toQueue.map(r => ({
    record_id: r.id,
    batch_id:  batchId,
    queued_by: currentSession.user.id,
    status:    "pending",
  }));

  // Step 1: mark records as VA-submitted so they move out of Active and into
  // the Sent-to-SIFTstack tab immediately, even before the worker runs.
  const now = new Date().toISOString();
  const ids = toQueue.map(r => r.id);
  try {
    const { error: updErr } = await sb
      .from("records")
      .update({ manual_submitted_at: now, manual_submitted_by: currentSession.user.id })
      .in("id", ids);
    if (updErr) {
      alert("Failed to mark records as submitted: " + updErr.message);
      return;
    }
  } catch (e) {
    alert("Submit-stamp crashed: " + (e.message || e));
    return;
  }

  // Step 2: insert into siftstack_queue so the worker picks them up.
  const { error } = await sb.from("siftstack_queue").insert(rows);
  if (error) {
    alert("Records were marked but queue insert failed: " + error.message);
    return;
  }

  // Patch local state so cards refresh immediately
  toQueue.forEach(r => {
    r.manual_submitted_at = now;
    r.manual_submitted_by = currentSession.user.id;
    if (!r.siftstack_status) r.siftstack_status = "queued";
  });

  alert(`Submitted ${rows.length} record(s) to SIFTstack. Worker runs every 5 min.`);
  selectedRows.clear();
  applyFilters();
  updateSelectionUI();
}

function showSiftstackConfirm(total, completedN, queuedN, freshN) {
  return new Promise(resolve => {
    const overlay = document.createElement("div");
    overlay.className = "siftstack-confirm-overlay";
    overlay.innerHTML = `
      <div class="siftstack-confirm">
        <h3>SIFTstack Queue</h3>
        <p>You selected <b>${total}</b> record(s).</p>
        <ul>
          ${completedN ? `<li><b>${completedN}</b> already enriched</li>` : ""}
          ${queuedN    ? `<li><b>${queuedN}</b> already queued (will be skipped either way)</li>` : ""}
          ${freshN     ? `<li><b>${freshN}</b> not yet submitted</li>` : ""}
        </ul>
        <p>What would you like to do?</p>
        <div class="siftstack-confirm-buttons">
          <button class="btn btn-siftstack" id="ss-reenrich">Re-enrich enriched + queue fresh (${completedN + freshN})</button>
          <button class="btn btn-green" id="ss-skip">Skip enriched, queue only fresh (${freshN})</button>
          <button class="btn" id="ss-cancel">Cancel</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const close = (result) => { overlay.remove(); resolve(result); };
    overlay.querySelector("#ss-reenrich").onclick = () => close("reenrich");
    overlay.querySelector("#ss-skip").onclick     = () => close("skip");
    overlay.querySelector("#ss-cancel").onclick   = () => close("cancel");
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close("cancel"); });
  });
}

// ── Pagination ─────────────────────────────────────────────────────
function renderPagination() {
  const ePP = perPage === Infinity ? filtered.length : perPage;
  const totalPages = Math.max(1, Math.ceil(filtered.length / ePP));
  if (totalPages <= 1) { document.getElementById("pagination").innerHTML = ""; return; }

  let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">&laquo; Prev</button>`;
  const start = Math.max(1, currentPage - 3);
  const end = Math.min(totalPages, currentPage + 3);
  if (start > 1) html += `<button onclick="goPage(1)">1</button><span class="page-info">...</span>`;
  for (let i = start; i <= end; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < totalPages) html += `<span class="page-info">...</span><button onclick="goPage(${totalPages})">${totalPages}</button>`;
  html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next &raquo;</button>`;
  html += `<span class="page-info" style="margin-left:8px">Page ${currentPage} of ${totalPages}</span>`;
  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
  renderPagination();
  document.querySelector(".table-wrap").scrollIntoView({behavior: "smooth"});
}

// ── Name Splitting ────────────────────────────────────────────────
// Suffixes that stay with last name
const NAME_SUFFIXES = new Set(["sr","jr","ii","iii","iv","v","esq","md","phd","dds","dvm"]);

function splitName(fullName) {
  if (!fullName) return { first: "", middle: "", last: "" };
  // Strip leading "by " prefix (common in foreclosure grantor fields)
  let name = fullName.replace(/^by\s+/i, "").trim();
  if (!name) return { first: "", middle: "", last: "" };

  // Split into parts, handling commas for suffixes like ", Sr" or ", Jr"
  // First check if there's a suffix after a comma
  let suffix = "";
  const commaMatch = name.match(/^(.+?),\s*(Sr|Jr|II|III|IV|V|Esq|MD|PhD|DDS|DVM)\.?$/i);
  if (commaMatch) {
    name = commaMatch[1].trim();
    suffix = ", " + commaMatch[2];
  }

  const parts = name.split(/\s+/).filter(Boolean);

  if (parts.length === 0) return { first: "", middle: "", last: "" };
  if (parts.length === 1) return { first: toTitleCase(parts[0]), middle: "", last: "" };

  // Check if last word is a suffix without comma (e.g. "John Smith Jr")
  if (parts.length >= 3 && NAME_SUFFIXES.has(parts[parts.length - 1].toLowerCase().replace(/\.$/,""))) {
    suffix = ", " + parts.pop();
  }

  if (parts.length === 2) {
    return { first: toTitleCase(parts[0]), middle: "", last: toTitleCase(parts[1]) + suffix };
  }

  // 3+ parts: first word = first, last word = last, everything in between = middle
  const first = toTitleCase(parts[0]);
  const last = toTitleCase(parts[parts.length - 1]) + suffix;
  const middle = parts.slice(1, -1).map(toTitleCase).join(" ");
  return { first, middle, last };
}

function toTitleCase(s) {
  if (!s) return "";
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

// ── CSV Export ─────────────────────────────────────────────────────
function exportCSV(mode) {
  let rows;
  if (mode === "selected") {
    rows = getFiltered().filter(r => selectedRows.has(r.doc_num));
    if (rows.length === 0) return;
  } else {
    rows = getFiltered();
  }
  const headers = [
    "Score","Filed","Sale Date","Date Scraped","Type","Category",
    "Owner First Name","Owner Middle Name","Owner Last Name",
    "Co-Borrower First Name","Co-Borrower Middle Name","Co-Borrower Last Name",
    "Grantor First Name","Grantor Middle Name","Grantor Last Name",
    "Grantee (Heirs)",
    "Property Address","Property City","Property State","Property Zip",
    "Mail Address","Mail City","Mail State","Mail Zip",
    "Flags","Legal Description","Amount",
    "Match Confidence","Doc #","Batch","Source","Clerk URL","HCAD URL"
  ];
  let csv = headers.join(",") + "\n";
  rows.forEach(r => {
    const owner = splitName(r.owner);
    const coBorrower = splitName(r.co_borrower);
    const grantor = splitName(r.grantor_name);
    csv += [
      r.score, r.filed, r.sale_date||"", r.date_scraped||"",
      r.doc_type, `"${(r.cat_label||'').replace(/"/g,'""')}"`,
      `"${owner.first}"`, `"${owner.middle}"`, `"${owner.last}"`,
      `"${coBorrower.first}"`, `"${coBorrower.middle}"`, `"${coBorrower.last}"`,
      `"${grantor.first}"`, `"${grantor.middle}"`, `"${grantor.last}"`,
      `"${(r.grantee_names||'').replace(/"/g,'""')}"`,
      `"${(r.prop_address||'').replace(/"/g,'""')}"`, r.prop_city||"", r.prop_state||"", r.prop_zip||"",
      `"${(r.mail_address||'').replace(/"/g,'""')}"`, r.mail_city||"", r.mail_state||"", r.mail_zip||"",
      `"${(r.flags||[]).join('; ')}"`,
      `"${(r.legal||'').replace(/"/g,'""')}"`,
      `"${(r.amount||'').replace(/"/g,'""')}"`,
      r.match_confidence||"none", r.doc_num, r.batch_id||"", r._source||"clerk", r.clerk_url||"", r.hcad_url||""
    ].join(",") + "\n";
  });
  // Smart filename based on active filters
  const fParts = [];
  const _src = document.getElementById("sourceFilter").value;
  const _sm = document.getElementById("saleMonthFilter").value;
  const _type = document.getElementById("typeFilter").value;
  const _ff = document.getElementById("filedFrom").value;
  const _ft = document.getElementById("filedTo").value;
  if (_src) fParts.push(_src);
  if (_sm) fParts.push("sale-" + _sm);
  if (_type) fParts.push(_type.toLowerCase());
  if (_ff || _ft) fParts.push("filed-" + (_ff||"start") + "-to-" + (_ft||"end"));
  if (cardFilter && cardFilter !== "all") fParts.push(cardFilter === "addr" ? "with-addr" : cardFilter.replace("cat:","").toLowerCase());
  if (mode === "selected") fParts.push("selected-" + rows.length);
  const datePart = new Date().toISOString().slice(0,10);
  let filename = "harris_leads";
  if (fParts.length > 0) filename += "_" + fParts.join("_");
  filename += "_" + datePart + ".csv";
  filename = filename.replace(/[^a-zA-Z0-9._-]/g, "_").replace(/_+/g, "_");
  const blob = new Blob([csv], {type: "text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

async function loadHcadData(parcelAcct) {

    el.innerHTML = '<span style="font-style:italic">No parcel account linked to this record</span>';

  const { data, error } = await sb.from("property_data").select("*").eq("parcel_acct", parcelAcct).maybeSingle();
  if (!document.getElementById("hcadContent")) return; // modal closed during fetch
  if (error) {
    el.innerHTML = '<span style="color:var(--red)">Error loading HCAD data: ' + error.message + '</span>';
    return;
  }
  if (!data) {
    el.innerHTML = '<span style="font-style:italic">Data not yet captured &mdash; run HCAD extension</span>';
    return;
  }
  const fmt = v => (v === null || v === undefined || v === "") ? "--" : v;
  const fmtNum = v => (v === null || v === undefined) ? "--" : Number(v).toLocaleString();
  const fmtMoney = v => (v === null || v === undefined) ? "--" : "$" + Number(v).toLocaleString();
  el.innerHTML = `
    <div class="modal-grid">
      <div><div class="modal-field-label">Bedrooms</div><div class="modal-field-value">${fmt(data.bedrooms)}</div></div>
      <div><div class="modal-field-label">Bathrooms</div><div class="modal-field-value">${fmt(data.bathrooms)}</div></div>
      <div><div class="modal-field-label">Square Feet</div><div class="modal-field-value">${fmtNum(data.sqft)}</div></div>
      <div><div class="modal-field-label">Year Built</div><div class="modal-field-value">${fmt(data.year_built)}</div></div>
      <div><div class="modal-field-label">Lot Size (sqft)</div><div class="modal-field-value">${fmtNum(data.lot_size_sqft)}</div></div>
      <div><div class="modal-field-label">Market Value</div><div class="modal-field-value" style="color:var(--green);font-weight:700">${fmtMoney(data.market_value)}</div></div>
      <div><div class="modal-field-label">Appraised Value</div><div class="modal-field-value">${fmtMoney(data.appraised_value)}</div></div>
      <div><div class="modal-field-label">Structure Type</div><div class="modal-field-value">${fmt(data.structure_type)}</div></div>
      <div><div class="modal-field-label">Parcel ID</div><div class="modal-field-value" style="font-family:monospace;font-size:0.75rem">${parcelAcct}</div></div>
    </div>
  `;
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("active");
  document.body.style.overflow = "";
  currentModalParcelAcct = null;
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── Init ───────────────────────────────────────────────────────────
(async () => {
  updateUndoUI();
  const ok = await checkAuth();
  if (ok) {
    await loadData();
    await loadContactData();
    subscribeRealtime();
  }
})();
</script>
</body>
</html>
