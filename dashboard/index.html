<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harris County Motivated Seller Leads — SiftLeads</title>
<style>
  :root {
    --bg: #0a0c12;
    --surface: #13161f;
    --surface2: #1c2030;
    --surface3: #252a3a;
    --border: #2a2f45;
    --border-light: #353b55;
    --text: #e8eaf4;
    --text-muted: #7d829a;
    --text-dim: #5a5f75;
    --accent: #7c5cfc;
    --accent-light: #9b82fc;
    --accent-glow: rgba(124,92,252,0.12);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --orange: #f59e0b;
    --orange-dim: rgba(245,158,11,0.12);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --cyan: #06b6d4;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 2px 12px rgba(0,0,0,0.25);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Top Navigation Bar ─────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 0.85rem;
    color: #fff;
    letter-spacing: -0.02em;
  }
  .brand-text h1 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .brand-text h1 span { color: var(--accent-light); }
  .brand-text .subtitle {
    font-size: 0.6rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .topbar-meta {
    text-align: right;
    font-size: 0.7rem;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .topbar-meta .date-range { color: var(--accent-light); font-weight: 600; }
  .topbar-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: var(--green-dim);
    color: var(--green);
    margin-left: 6px;
  }

  /* ── Stat Cards ─────────────────────────────────────────────── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    padding: 16px 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .stat-card:hover { border-color: var(--border-light); transform: translateY(-1px); box-shadow: var(--shadow); }
  .stat-card.active { border-color: var(--accent); background: var(--surface2); box-shadow: 0 0 0 1px var(--accent), var(--shadow); }
  .stat-card .value {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1.1;
    color: var(--accent-light);
    letter-spacing: -0.02em;
  }
  .stat-card .label {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .stat-card.total .value { color: var(--text); }
  .stat-card.addr .value  { color: var(--green); }
  .stat-card .pct {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 0.6rem;
    color: var(--text-dim);
    font-weight: 600;
  }

  /* ── Charts Row ─────────────────────────────────────────────── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 28px 12px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .chart-card h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .bar-chart { display: flex; flex-direction: column; gap: 5px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
  }
  .bar-label { width: 115px; text-align: right; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.7rem; }
  .bar-track { flex: 1; height: 18px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 6px; font-size: 0.62rem; font-weight: 600; color: #fff; }
  .bar-count { width: 35px; text-align: right; font-weight: 600; font-size: 0.72rem; flex-shrink: 0; }

  /* Score distribution */
  .score-dist { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
  .score-bar {
    flex: 1;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
    min-width: 8px;
    transition: height 0.4s ease;
    position: relative;
    cursor: pointer;
  }
  .score-bar:hover { opacity: 0.8; }
  .score-bar .tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    font-size: 0.62rem;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    margin-bottom: 4px;
  }
  .score-bar:hover .tooltip { display: block; }
  .score-labels { display: flex; justify-content: space-between; font-size: 0.58rem; color: var(--text-dim); margin-top: 4px; }

  /* ── Filter Toolbar ─────────────────────────────────────────── */
  .toolbar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 10px 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .toolbar-section {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .toolbar-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }
  .toolbar input, .toolbar select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: 0.78rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
  .toolbar input::placeholder { color: var(--text-dim); }
  .search-input { width: 180px; }
  .score-input { width: 64px; }
  .score-range { display: flex; align-items: center; gap: 3px; }
  .score-range span { color: var(--text-dim); font-size: 0.72rem; }

  .btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    font-weight: 500;
  }
  .btn:hover { border-color: var(--accent); background: var(--surface3); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn-accent:hover { background: var(--accent-light); border-color: var(--accent-light); }
  .btn-green { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }
  .btn-green:hover { opacity: 0.9; }
  .btn-green:disabled { opacity: 0.3; cursor: default; }
  .export-group { display: flex; gap: 4px; align-items: center; }
  .selected-count { font-size: 0.68rem; color: rgba(255,255,255,0.8); font-weight: 600; margin-left: 2px; }

  .filter-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent);
    color: #fff;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.68rem;
    font-weight: 600;
  }
  .filter-tag .x { cursor: pointer; opacity: 0.7; }
  .filter-tag .x:hover { opacity: 1; }

  .toolbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .showing-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; }

  /* Per-page selector */
  .perpage-group {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--text-muted);
  }
  .perpage-group label { font-weight: 500; white-space: nowrap; }

  /* ── Table ──────────────────────────────────────────────────── */
  .table-wrap {
    overflow-x: auto;
    padding: 0 28px 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }
  thead th {
    position: sticky;
    top: 56px;
    background: var(--surface);
    padding: 10px 8px;
    text-align: left;
    font-size: 0.68rem;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    letter-spacing: 0.04em;
    font-weight: 600;
  }
  thead th:hover { color: var(--accent-light); }
  thead th .sort-arrow { margin-left: 3px; font-size: 0.58rem; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 10px 8px; vertical-align: top; }
  td.score-cell {
    font-weight: 700;
    text-align: center;
  }
  .score-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 700;
  }
  .score-high { background: var(--green-dim); color: var(--green); }
  .score-med  { background: var(--orange-dim); color: var(--orange); }
  .score-low  { background: rgba(139,143,163,0.12); color: var(--text-muted); }
  .type-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.62rem;
    font-weight: 700;
    background: var(--surface3);
    border: 1px solid var(--border);
  }
  .flag-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 0.58rem;
    font-weight: 600;
    margin: 1px 2px;
    white-space: nowrap;
  }
  .flag-pill.distress { background: var(--red-dim); color: var(--red); }
  .flag-pill.info     { background: var(--blue-dim); color: var(--blue); }
  .flag-pill.fresh    { background: var(--green-dim); color: var(--green); }

  .conf-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
  }
  .conf-high   { background: var(--green-dim); color: var(--green); }
  .conf-medium { background: var(--orange-dim); color: var(--orange); }
  .conf-low    { background: var(--red-dim); color: var(--red); }
  .conf-none   { background: rgba(139,143,163,0.08); color: var(--text-dim); }
  td a { color: var(--accent-light); text-decoration: none; font-weight: 500; }
  td a:hover { text-decoration: underline; }
  .addr-cell { max-width: 200px; }
  .owner-cell { max-width: 260px; word-break: break-word; }

  .row-cb, .hdr-cb {
    width: 15px; height: 15px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  tbody tr.selected { background: var(--accent-glow); }
  tbody tr.selected:hover { background: rgba(124,92,252,0.16); }

  /* ── Pagination ─────────────────────────────────────────────── */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 5px;
    padding: 16px 28px;
  }
  .pagination button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 11px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .pagination button:hover { border-color: var(--accent); }
  .pagination button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pagination button:disabled { opacity: 0.3; cursor: default; }
  .page-info { font-size: 0.72rem; color: var(--text-muted); }

  /* ── Footer ─────────────────────────────────────────────────── */
  .footer {
    text-align: center;
    padding: 20px 28px 28px;
    font-size: 0.65rem;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .footer a { color: var(--accent-light); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* ── Responsive ─────────────────────────────────────────────── */
  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .topbar { padding: 0 14px; }
    .toolbar { padding: 8px 14px; }
    .table-wrap { padding: 0 8px 16px; }
    .search-input { width: 100%; }
    .bar-label { width: 80px; font-size: 0.62rem; }
    .toolbar-divider { display: none; }
    .brand-text .subtitle { display: none; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- Top Navigation -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">SL</div>
    <div class="brand-text">
      <h1>Harris County <span>Motivated Sellers</span></h1>
      <div class="subtitle">Real-Time Distress Lead Intelligence</div>
    </div>
  </div>
  <div class="topbar-meta" id="meta"></div>
</div>

<!-- Stat Cards -->
<div class="stats" id="stats"></div>

<!-- Charts -->
<div class="charts-row" id="chartsRow">
  <div class="chart-card">
    <h3>Leads by Category</h3>
    <div class="bar-chart" id="catChart"></div>
  </div>
  <div class="chart-card">
    <h3>Score Distribution</h3>
    <div class="score-dist" id="scoreChart"></div>
    <div class="score-labels"><span>30</span><span>50</span><span>70</span><span>100</span></div>
  </div>
</div>

<!-- Filter Toolbar -->
<div class="toolbar" id="filtersBar">
  <div class="toolbar-section">
    <input type="text" class="search-input" id="searchInput" placeholder="Search owner, legal, doc#…">
  </div>
  <div class="toolbar-divider"></div>
  <div class="toolbar-section">
    <select id="typeFilter"><option value="">All Types</option></select>
    <select id="monthFilter"><option value="">All Months</option></select>
    <select id="flagFilter"><option value="">All Flags</option></select>
  </div>
  <div class="toolbar-divider"></div>
  <div class="toolbar-section">
    <div class="score-range">
      <input type="number" class="score-input" id="scoreMin" placeholder="Min" min="0" max="100">
      <span>–</span>
      <input type="number" class="score-input" id="scoreMax" placeholder="Max" min="0" max="100">
    </div>
    <select id="addrFilter">
      <option value="">All</option>
      <option value="with">With Address</option>
      <option value="without">Without Address</option>
    </select>
    <select id="confFilter">
      <option value="">All Confidence</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
      <option value="none">None</option>
    </select>
  </div>
  <div class="toolbar-divider"></div>
  <div class="toolbar-section">
    <button class="btn" onclick="resetFilters()">Reset</button>
    <div class="export-group">
      <button class="btn btn-accent" onclick="exportCSV('all')">⬇ Export All</button>
      <button class="btn btn-green" id="exportSelBtn" onclick="exportCSV('selected')" disabled>⬇ Selected <span class="selected-count" id="selCount"></span></button>
    </div>
  </div>
  <span id="activeFilter"></span>
  <div class="toolbar-right">
    <div class="perpage-group">
      <label>Show:</label>
      <select id="perpageSelect">
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="150">150</option>
        <option value="all">All</option>
      </select>
    </div>
    <span class="showing-label" id="showingLabel"></span>
  </div>
</div>

<!-- Table -->
<div class="table-wrap">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>

<!-- Footer -->
<div class="footer">
  Harris County Clerk public records &middot; Data refreshed automatically &middot; Built with <a href="#">SiftLeads</a>
</div>

<script>
let DATA = null;
let filtered = [];
let sortCol = "score";
let sortAsc = false;
let currentPage = 1;
let cardFilter = null;
let perPage = 50;
const selectedRows = new Set();

const COLS = [
  {key: "score", label: "Score", w: "55px"},
  {key: "filed", label: "Filed", w: "90px"},
  {key: "doc_type", label: "Type", w: "55px"},
  {key: "cat_label", label: "Category", w: "160px"},
  {key: "owner", label: "Owner", w: "220px"},
  {key: "flags", label: "Flags", w: "170px"},
  {key: "legal", label: "Legal Description", w: "200px"},
  {key: "prop_address", label: "Property Address", w: "170px"},
  {key: "mail_address", label: "Mail Address", w: "150px"},
  {key: "match_confidence", label: "Confidence", w: "80px"},
  {key: "doc_num", label: "Doc #", w: "100px"},
  {key: "link", label: "Links", w: "80px"},
];

const CAT_COLORS = {
  LP: "#ef4444", NOFC: "#f59e0b", TAXLIEN: "#f97316", LIEN: "#eab308",
  JUD: "#a855f7", LEVY: "#ec4899", PROBATE: "#06b6d4", BNKRCY: "#6366f1",
  REL: "#64748b",
};

const DISTRESS_FLAGS = new Set([
  "Lis pendens", "Pre-foreclosure / trustee sale", "Judgment lien",
  "Federal tax lien", "Lien (HOA / state tax / other)", "Levy on real estate",
  "Probate / estate", "Bankruptcy",
]);

// ── Month Helpers ─────────────────────────────────────────────────
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function getMonthKey(filedStr) {
  // filed format expected: "YYYY-MM-DD" or "MM/DD/YYYY" etc.
  if (!filedStr) return null;
  const d = new Date(filedStr);
  if (isNaN(d)) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(key) {
  const [y, m] = key.split("-");
  return `${MONTH_NAMES[parseInt(m)-1]} ${y}`;
}

// ── Load Data ─────────────────────────────────────────────────────
async function loadData() {
  const resp = await fetch("records.json");
  DATA = await resp.json();

  const updated = new Date(DATA.fetched_at).toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"});
  document.getElementById("meta").innerHTML =
    `<span class="date-range">${DATA.date_range.from} → ${DATA.date_range.to}</span><br>Updated ${updated}<span class="topbar-badge">Live</span>`;

  buildStats();
  buildCharts();
  populateFilters();
  applyFilters();
}

// ── Stat Cards ────────────────────────────────────────────────────
function buildStats() {
  const cats = {};
  DATA.records.forEach(r => { cats[r.cat] = (cats[r.cat] || 0) + 1; });

  const withAddr = DATA.records.filter(r => r.prop_address && r.prop_address.trim()).length;
  const pct = DATA.total ? Math.round(withAddr / DATA.total * 100) : 0;

  let html = `
    <div class="stat-card total" data-filter="all" onclick="toggleCardFilter('all')">
      <div class="value">${DATA.total.toLocaleString()}</div>
      <div class="label">Total Leads</div>
    </div>
    <div class="stat-card addr" data-filter="addr" onclick="toggleCardFilter('addr')">
      <div class="value">${withAddr.toLocaleString()}</div>
      <div class="label">With Address</div>
      <div class="pct">${pct}%</div>
    </div>`;

  const catOrder = ["LP","NOFC","TAXLIEN","LIEN","JUD","LEVY","PROBATE","BNKRCY","REL"];
  const catLabels = {};
  DATA.records.forEach(r => { catLabels[r.cat] = r.cat_label; });

  catOrder.forEach(c => {
    if (cats[c]) {
      html += `
        <div class="stat-card" data-filter="cat:${c}" onclick="toggleCardFilter('cat:${c}')">
          <div class="value" style="color:${CAT_COLORS[c] || '#7c5cfc'}">${cats[c]}</div>
          <div class="label">${catLabels[c] || c}</div>
        </div>`;
    }
  });

  document.getElementById("stats").innerHTML = html;
}

function toggleCardFilter(filter) {
  cardFilter = (cardFilter === filter) ? null : filter;
  document.querySelectorAll(".stat-card").forEach(el => {
    el.classList.toggle("active", el.dataset.filter === cardFilter);
  });
  currentPage = 1;
  applyFilters();
}

// ── Charts ────────────────────────────────────────────────────────
function buildCharts() {
  const cats = {};
  const catLabels = {};
  DATA.records.forEach(r => {
    cats[r.cat] = (cats[r.cat] || 0) + 1;
    catLabels[r.cat] = r.cat_label;
  });
  const maxCat = Math.max(...Object.values(cats));
  const sortedCats = Object.entries(cats).sort((a, b) => b[1] - a[1]);

  let barHtml = "";
  sortedCats.forEach(([cat, count]) => {
    if (cat === "REL") return;
    const pct = (count / maxCat * 100).toFixed(0);
    const color = CAT_COLORS[cat] || "#7c5cfc";
    const shortLabel = (catLabels[cat] || cat).replace(/ \/ /g, "/").substring(0, 20);
    barHtml += `
      <div class="bar-row">
        <div class="bar-label" title="${catLabels[cat]}">${shortLabel}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${count > 5 ? count : ''}</div></div>
        <div class="bar-count">${count}</div>
      </div>`;
  });
  document.getElementById("catChart").innerHTML = barHtml;

  const buckets = {};
  for (let i = 30; i <= 100; i += 5) buckets[i] = 0;
  DATA.records.forEach(r => {
    const b = Math.floor(r.score / 5) * 5;
    const key = Math.max(30, Math.min(100, b));
    buckets[key] = (buckets[key] || 0) + 1;
  });
  const maxBucket = Math.max(...Object.values(buckets), 1);
  let scoreHtml = "";
  Object.entries(buckets).forEach(([score, count]) => {
    const h = Math.max(2, (count / maxBucket * 100));
    const color = score >= 70 ? "var(--green)" : score >= 50 ? "var(--orange)" : "var(--accent)";
    scoreHtml += `<div class="score-bar" style="height:${h}%;background:${color}"><div class="tooltip">${score}-${parseInt(score)+4}: ${count}</div></div>`;
  });
  document.getElementById("scoreChart").innerHTML = scoreHtml;
}

// ── Filters ───────────────────────────────────────────────────────
function populateFilters() {
  // Type filter
  const types = [...new Set(DATA.records.map(r => r.doc_type))].sort();
  const sel = document.getElementById("typeFilter");
  types.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });

  // Month filter
  const monthKeys = new Set();
  DATA.records.forEach(r => {
    const mk = getMonthKey(r.filed);
    if (mk) monthKeys.add(mk);
  });
  const sortedMonths = [...monthKeys].sort().reverse(); // newest first
  const msel = document.getElementById("monthFilter");
  sortedMonths.forEach(mk => {
    const opt = document.createElement("option");
    opt.value = mk; opt.textContent = monthLabel(mk);
    msel.appendChild(opt);
  });

  // Flag filter
  const flags = new Set();
  DATA.records.forEach(r => (r.flags || []).forEach(f => flags.add(f)));
  const fsel = document.getElementById("flagFilter");
  [...flags].sort().forEach(f => {
    const opt = document.createElement("option");
    opt.value = f; opt.textContent = f;
    fsel.appendChild(opt);
  });

  // Per-page selector
  document.getElementById("perpageSelect").addEventListener("change", function() {
    perPage = this.value === "all" ? Infinity : parseInt(this.value);
    currentPage = 1;
    applyFilters();
  });

  // Live filtering
  const ids = ["searchInput","typeFilter","monthFilter","scoreMin","scoreMax","flagFilter","addrFilter","confFilter"];
  ids.forEach(id => {
    const el = document.getElementById(id);
    const evt = el.tagName === "INPUT" ? "input" : "change";
    el.addEventListener(evt, () => { currentPage = 1; applyFilters(); });
  });
}

function getActiveFilterDesc() {
  // Build a description of currently active filters for smart filenames
  const parts = [];
  const type  = document.getElementById("typeFilter").value;
  const month = document.getElementById("monthFilter").value;
  const flag  = document.getElementById("flagFilter").value;
  const addr  = document.getElementById("addrFilter").value;
  const conf  = document.getElementById("confFilter").value;
  const sMin  = document.getElementById("scoreMin").value;
  const sMax  = document.getElementById("scoreMax").value;
  const q     = document.getElementById("searchInput").value.trim();

  if (cardFilter && cardFilter !== "all") {
    if (cardFilter === "addr") parts.push("with-address");
    else parts.push(cardFilter.replace("cat:", "").toLowerCase());
  }
  if (type) parts.push(type.toLowerCase());
  if (month) parts.push(month); // e.g. "2026-03"
  if (flag) parts.push(flag.replace(/[^a-zA-Z0-9]/g, "-").toLowerCase().replace(/-+/g, "-"));
  if (addr === "with") parts.push("with-addr");
  if (addr === "without") parts.push("no-addr");
  if (conf) parts.push("conf-" + conf);
  if (sMin || sMax) parts.push("score-" + (sMin || "0") + "-" + (sMax || "100"));
  if (q) parts.push(q.replace(/[^a-zA-Z0-9]/g, "-").toLowerCase().substring(0, 20));

  return parts;
}

function getFiltered() {
  const q     = document.getElementById("searchInput").value.toLowerCase();
  const type  = document.getElementById("typeFilter").value;
  const month = document.getElementById("monthFilter").value;
  const sMin  = parseInt(document.getElementById("scoreMin").value);
  const sMax  = parseInt(document.getElementById("scoreMax").value);
  const minScore = isNaN(sMin) ? 0 : sMin;
  const maxScore = isNaN(sMax) ? 100 : sMax;
  const flag  = document.getElementById("flagFilter").value;
  const addr  = document.getElementById("addrFilter").value;
  const conf  = document.getElementById("confFilter").value;

  return DATA.records.filter(r => {
    if (cardFilter) {
      if (cardFilter === "addr") {
        if (!r.prop_address || !r.prop_address.trim()) return false;
      } else if (cardFilter.startsWith("cat:")) {
        if (r.cat !== cardFilter.slice(4)) return false;
      }
    }
    if (type && r.doc_type !== type) return false;
    if (month && getMonthKey(r.filed) !== month) return false;
    if (r.score < minScore || r.score > maxScore) return false;
    if (flag && !(r.flags || []).includes(flag)) return false;
    if (addr === "with" && (!r.prop_address || !r.prop_address.trim())) return false;
    if (addr === "without" && r.prop_address && r.prop_address.trim()) return false;
    if (conf && (r.match_confidence || "none") !== conf) return false;
    if (q) {
      const hay = [r.owner, r.legal, r.doc_num, r.cat_label, r.prop_address, r.mail_address]
        .join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function applyFilters() {
  filtered = getFiltered();
  sortData();
  renderTable();
  renderPagination();

  let tag = "";
  if (cardFilter && cardFilter !== "all") {
    const label = cardFilter === "addr" ? "With Address" : cardFilter.replace("cat:", "");
    tag = `<span class="filter-tag">${label} <span class="x" onclick="toggleCardFilter('${cardFilter}')">&times;</span></span>`;
  }
  document.getElementById("activeFilter").innerHTML = tag;
  document.getElementById("showingLabel").textContent = `Showing ${filtered.length} of ${DATA.total}`;
}

function resetFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("typeFilter").value = "";
  document.getElementById("monthFilter").value = "";
  document.getElementById("scoreMin").value = "";
  document.getElementById("scoreMax").value = "";
  document.getElementById("flagFilter").value = "";
  document.getElementById("addrFilter").value = "";
  document.getElementById("confFilter").value = "";
  cardFilter = null;
  selectedRows.clear();
  updateSelectionUI();
  document.querySelectorAll(".stat-card").forEach(el => el.classList.remove("active"));
  currentPage = 1;
  applyFilters();
}

// ── Sort ──────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = col === "filed"; }
  sortData();
  renderTable();
}

function sortData() {
  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === "score") { va = va || 0; vb = vb || 0; }
    else if (sortCol === "flags") { va = (va||[]).length; vb = (vb||[]).length; }
    else { va = (va || "").toString().toLowerCase(); vb = (vb || "").toString().toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

// ── Table Render ──────────────────────────────────────────────────
function renderTable() {
  const effectivePerPage = perPage === Infinity ? filtered.length : perPage;
  const start = (currentPage - 1) * effectivePerPage;
  const pageData = filtered.slice(start, start + effectivePerPage);
  const allPageSelected = pageData.length > 0 && pageData.every(r => selectedRows.has(r.doc_num));

  let thead = `<tr><th style="width:32px"><input type="checkbox" class="hdr-cb" ${allPageSelected ? 'checked' : ''} onchange="togglePageAll(this.checked)"></th>`;
  COLS.forEach(c => {
    const arrow = sortCol === c.key ? (sortAsc ? " &#9650;" : " &#9660;") : "";
    thead += `<th style="width:${c.w}" onclick="sortBy('${c.key}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  });
  thead += "</tr>";
  document.getElementById("thead").innerHTML = thead;

  let html = "";
  pageData.forEach(r => {
    const scoreCls = r.score >= 70 ? "score-high" : r.score >= 50 ? "score-med" : "score-low";
    const isSelected = selectedRows.has(r.doc_num);

    let flagsHtml = "";
    (r.flags || []).forEach(f => {
      const cls = f === "New this week" ? "fresh" : DISTRESS_FLAGS.has(f) ? "distress" : "info";
      flagsHtml += `<span class="flag-pill ${cls}">${f}</span>`;
    });

    const propAddr = [r.prop_address, r.prop_city, r.prop_state, r.prop_zip].filter(Boolean).join(", ");
    const mailAddr = [r.mail_address, r.mail_city, r.mail_state, r.mail_zip].filter(Boolean).join(", ");

    html += `<tr class="${isSelected ? 'selected' : ''}">
      <td><input type="checkbox" class="row-cb" ${isSelected ? 'checked' : ''} onchange="toggleRow('${r.doc_num}', this.checked)"></td>
      <td class="score-cell"><span class="score-pill ${scoreCls}">${r.score}</span></td>
      <td>${r.filed || ""}</td>
      <td><span class="type-badge">${r.doc_type}</span></td>
      <td>${r.cat_label}</td>
      <td class="owner-cell">${r.owner || ""}</td>
      <td>${flagsHtml}</td>
      <td>${r.legal || ""}</td>
      <td class="addr-cell">${propAddr || '<span style="color:var(--text-dim)">—</span>'}</td>
      <td class="addr-cell">${mailAddr || '<span style="color:var(--text-dim)">—</span>'}</td>
      <td><span class="conf-pill conf-${r.match_confidence || 'none'}">${r.match_confidence || 'none'}</span></td>
      <td style="font-size:0.68rem">${r.doc_num}</td>
      <td style="font-size:0.68rem">${r.clerk_url ? '<a href="' + r.clerk_url + '" target="_blank" rel="noopener">Clerk</a>' : ''}${r.hcad_url ? ' <a href="' + r.hcad_url + '" target="_blank" rel="noopener" style="color:var(--green)">HCAD</a>' : ''}</td>
    </tr>`;
  });
  document.getElementById("tbody").innerHTML = html || '<tr><td colspan="13" style="text-align:center;padding:40px;color:var(--text-dim)">No records match your filters</td></tr>';
}

// ── Row Selection ─────────────────────────────────────────────────
function toggleRow(docNum, checked) {
  if (checked) selectedRows.add(docNum);
  else selectedRows.delete(docNum);
  updateSelectionUI();
  const rows = document.querySelectorAll("tbody tr");
  rows.forEach(tr => {
    const cb = tr.querySelector(".row-cb");
    if (cb) tr.classList.toggle("selected", cb.checked);
  });
  const effectivePerPage = perPage === Infinity ? filtered.length : perPage;
  const start = (currentPage - 1) * effectivePerPage;
  const pageData = filtered.slice(start, start + effectivePerPage);
  const hdrCb = document.querySelector(".hdr-cb");
  if (hdrCb) hdrCb.checked = pageData.length > 0 && pageData.every(r => selectedRows.has(r.doc_num));
}

function togglePageAll(checked) {
  const effectivePerPage = perPage === Infinity ? filtered.length : perPage;
  const start = (currentPage - 1) * effectivePerPage;
  const pageData = filtered.slice(start, start + effectivePerPage);
  pageData.forEach(r => {
    if (checked) selectedRows.add(r.doc_num);
    else selectedRows.delete(r.doc_num);
  });
  updateSelectionUI();
  renderTable();
}

function updateSelectionUI() {
  const count = selectedRows.size;
  const btn = document.getElementById("exportSelBtn");
  const badge = document.getElementById("selCount");
  btn.disabled = count === 0;
  badge.textContent = count > 0 ? `(${count})` : "";
}

// ── Pagination ────────────────────────────────────────────────────
function renderPagination() {
  const effectivePerPage = perPage === Infinity ? filtered.length : perPage;
  const totalPages = Math.max(1, Math.ceil(filtered.length / effectivePerPage));
  if (totalPages <= 1) { document.getElementById("pagination").innerHTML = ""; return; }

  let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">&laquo; Prev</button>`;
  const start = Math.max(1, currentPage - 3);
  const end = Math.min(totalPages, currentPage + 3);
  if (start > 1) html += `<button onclick="goPage(1)">1</button><span class="page-info">…</span>`;
  for (let i = start; i <= end; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < totalPages) html += `<span class="page-info">…</span><button onclick="goPage(${totalPages})">${totalPages}</button>`;
  html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next &raquo;</button>`;
  html += `<span class="page-info" style="margin-left:8px">Page ${currentPage} of ${totalPages}</span>`;
  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
  renderPagination();
  document.querySelector(".table-wrap").scrollIntoView({behavior: "smooth"});
}

// ── Smart CSV Export ──────────────────────────────────────────────
function exportCSV(mode) {
  let rows;
  if (mode === "selected") {
    rows = getFiltered().filter(r => selectedRows.has(r.doc_num));
    if (rows.length === 0) return;
  } else {
    rows = getFiltered();
  }
  const headers = [
    "Score","Filed","Type","Category","Owner","Flags","Legal Description",
    "Property Address","Property City","Property State","Property Zip",
    "Mail Address","Mail City","Mail State","Mail Zip",
    "Match Confidence","Doc #","Clerk URL","HCAD URL"
  ];
  let csv = headers.join(",") + "\n";
  rows.forEach(r => {
    csv += [
      r.score, r.filed, r.doc_type, `"${(r.cat_label||'').replace(/"/g,'""')}"`,
      `"${(r.owner||'').replace(/"/g,'""')}"`,
      `"${(r.flags||[]).join('; ')}"`,
      `"${(r.legal||'').replace(/"/g,'""')}"`,
      `"${(r.prop_address||'').replace(/"/g,'""')}"`, r.prop_city||"", r.prop_state||"", r.prop_zip||"",
      `"${(r.mail_address||'').replace(/"/g,'""')}"`, r.mail_city||"", r.mail_state||"", r.mail_zip||"",
      r.match_confidence||"none", r.doc_num, r.clerk_url||"", r.hcad_url||""
    ].join(",") + "\n";
  });

  // ── Smart filename based on active filters ──
  const filterParts = getActiveFilterDesc();
  const datePart = new Date().toISOString().slice(0,10);
  let filename = "harris_leads";
  if (filterParts.length > 0) {
    filename += "_" + filterParts.join("_");
  }
  if (mode === "selected") {
    filename += "_selected-" + rows.length;
  }
  filename += "_" + datePart + ".csv";

  // Sanitize filename
  filename = filename.replace(/[^a-zA-Z0-9._-]/g, "_").replace(/_+/g, "_");

  const blob = new Blob([csv], {type: "text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// ── Init ──────────────────────────────────────────────────────────
loadData();
