<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harris County Motivated Seller Leads</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #23273a;
    --border: #2d3148;
    --text: #e4e6f0;
    --text-muted: #8b8fa3;
    --accent: #7c5cfc;
    --accent-light: #9b82fc;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --blue: #3b82f6;
    --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h1 { font-size: 1.25rem; font-weight: 700; }
  .header h1 span { color: var(--accent-light); }
  .header-meta { font-size: 0.75rem; color: var(--text-muted); text-align: right; }

  /* Stat Cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    padding: 16px 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .stat-card.active { border-color: var(--accent); background: var(--surface2); }
  .stat-card .value {
    font-size: 1.75rem;
    font-weight: 800;
    line-height: 1.1;
    color: var(--accent-light);
  }
  .stat-card .label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .stat-card.total .value { color: var(--text); }
  .stat-card.addr .value  { color: var(--green); }

  /* Score badge on cards */
  .stat-card .pct {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 0.65rem;
    color: var(--text-muted);
  }

  /* Charts row */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 24px 12px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .chart-card h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }
  .bar-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
  }
  .bar-label { width: 120px; text-align: right; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 18px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 6px; font-size: 0.65rem; font-weight: 600; color: #fff; }
  .bar-count { width: 35px; text-align: right; font-weight: 600; font-size: 0.75rem; flex-shrink: 0; }

  /* Score distribution */
  .score-dist { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
  .score-bar {
    flex: 1;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
    min-width: 8px;
    transition: height 0.4s ease;
    position: relative;
    cursor: pointer;
  }
  .score-bar:hover { opacity: 0.8; }
  .score-bar .tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    margin-bottom: 4px;
  }
  .score-bar:hover .tooltip { display: block; }
  .score-labels { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-muted); margin-top: 4px; }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    padding: 12px 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters input, .filters select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .filters input:focus, .filters select:focus { border-color: var(--accent); }
  .filters input::placeholder { color: var(--text-muted); }
  .search-input { width: 200px; }
  .score-input { width: 72px; }
  .score-range { display: flex; align-items: center; gap: 4px; }
  .score-range span { color: var(--text-muted); font-size: 0.75rem; }
  .btn {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn-accent:hover { background: var(--accent-light); }
  .btn-green { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }
  .btn-green:hover { opacity: 0.85; }
  .btn-green:disabled { opacity: 0.4; cursor: default; }
  .export-group { display: flex; gap: 4px; align-items: center; }
  .selected-count { font-size: 0.7rem; color: var(--green); font-weight: 600; margin-left: 2px; }
  .filter-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent);
    color: #fff;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .filter-tag .x { cursor: pointer; opacity: 0.7; }
  .filter-tag .x:hover { opacity: 1; }
  .showing-label { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    padding: 0 24px 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    padding: 10px 8px;
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }
  thead th:hover { color: var(--accent-light); }
  thead th .sort-arrow { margin-left: 3px; font-size: 0.6rem; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 10px 8px; vertical-align: top; }
  td.score-cell {
    font-weight: 700;
    text-align: center;
  }
  .score-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .score-high { background: rgba(34,197,94,0.15); color: var(--green); }
  .score-med  { background: rgba(245,158,11,0.15); color: var(--orange); }
  .score-low  { background: rgba(139,143,163,0.15); color: var(--text-muted); }
  .type-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 700;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .flag-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 0.6rem;
    font-weight: 600;
    margin: 1px 2px;
    white-space: nowrap;
  }
  .flag-pill.distress { background: rgba(239,68,68,0.15); color: var(--red); }
  .flag-pill.info     { background: rgba(59,130,246,0.15); color: var(--blue); }
  .flag-pill.fresh    { background: rgba(34,197,94,0.15); color: var(--green); }

  /* Confidence badges */
  .conf-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
  }
  .conf-high   { background: rgba(34,197,94,0.18); color: var(--green); }
  .conf-medium { background: rgba(245,158,11,0.18); color: var(--orange); }
  .conf-low    { background: rgba(239,68,68,0.18); color: var(--red); }
  .conf-none   { background: rgba(139,143,163,0.12); color: var(--text-muted); }

  /* SIFTstack submission status pill */
  .siftstack-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    cursor: help;
    white-space: nowrap;
  }
  .siftstack-pill.ss-completed { background: rgba(34,197,94,0.18); color: var(--green); }
  .siftstack-pill.ss-queued    { background: rgba(245,158,11,0.18); color: var(--orange); }
  .siftstack-pill.ss-failed    { background: rgba(239,68,68,0.18); color: var(--red); }
  .siftstack-pill.ss-none      { background: rgba(139,143,163,0.12); color: var(--text-muted); }

  /* Stat card color variants for siftstack filters */
  .stat-card.enriched .value { color: var(--green); }
  .stat-card.queued   .value { color: var(--orange); }
  .stat-card.manual   .value { color: var(--red); }

  /* SIFTstack queue-confirm modal */
  .siftstack-confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 10000;
  }
  .siftstack-confirm {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    max-width: 460px;
    width: 92%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .siftstack-confirm h3 { margin: 0 0 12px; color: var(--text); font-size: 1.1rem; }
  .siftstack-confirm p  { color: var(--text-muted); font-size: 0.9rem; margin: 8px 0; }
  .siftstack-confirm ul { color: var(--text); font-size: 0.9rem; margin: 8px 0 16px; padding-left: 22px; }
  .siftstack-confirm ul li { margin: 4px 0; }
  .siftstack-confirm-buttons {
    display: flex; flex-direction: column; gap: 8px; margin-top: 16px;
  }
  .siftstack-confirm-buttons .btn { width: 100%; justify-content: center; }

  /* SIFTstack action button (next to Export Selected) */
  .btn-siftstack {
    background: #7c5cfc; color: #fff; border-color: #7c5cfc;
  }
  .btn-siftstack:hover:not(:disabled) { background: #6a4af0; }
  .btn-siftstack:disabled { opacity: 0.45; cursor: not-allowed; }
  td a { color: var(--accent-light); text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .addr-cell { max-width: 200px; }
  .owner-cell { max-width: 260px; word-break: break-word; font-size: 0.78rem; }

  /* Editable cells (foreclosure records) */
  .editable-cell {
    position: relative;
    cursor: text !important;
    border: 1px dashed transparent;
    padding: 2px 4px;
    border-radius: 4px;
    transition: border-color 0.15s, background 0.15s;
  }
  .editable-cell:hover {
    border-color: var(--accent);
    background: rgba(124,92,252,0.06);
  }
  .editable-cell::after {
    content: "\270E";
    position: absolute;
    right: 2px;
    top: 2px;
    font-size: 0.65rem;
    color: var(--accent-light);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .editable-cell:hover::after { opacity: 0.7; }
  .editable-cell.editing {
    border-color: var(--accent);
    background: rgba(124,92,252,0.1);
  }
  .editable-cell input {
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    font-size: 0.78rem;
    padding: 3px 6px;
    border-radius: 3px;
    width: 100%;
    outline: none;
  }
  .editable-cell input:focus { border-color: var(--accent-light); }
  .edit-saved {
    animation: editFlash 0.6s ease;
  }
  @keyframes editFlash {
    0% { background: rgba(34,197,94,0.25); }
    100% { background: transparent; }
  }
  /* Undo button */
  .btn-undo {
    background: rgba(239,68,68,0.15);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
    font-size: 0.75rem;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-undo:hover:not(:disabled) {
    background: rgba(239,68,68,0.25);
    border-color: var(--red);
  }
  .btn-undo:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .undo-info {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: 4px;
  }

  /* Row checkboxes */
  .row-cb, .hdr-cb {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  tbody tr.selected { background: rgba(124,92,252,0.08); }
  tbody tr.selected:hover { background: rgba(124,92,252,0.14); }
  tbody tr td:not(:first-child) { cursor: pointer; }

  /* Detail Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.65);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .modal-header h2 {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
    word-break: break-word;
  }
  .modal-header .cat-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    flex-shrink: 0;
  }
  .modal-close:hover { color: var(--text); }
  .modal-score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
  }
  .modal-score {
    font-size: 1.5rem;
    font-weight: 800;
  }
  .modal-score-bar {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .modal-score-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .modal-flags { display: flex; flex-wrap: wrap; gap: 4px; }
  .modal-section {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
  }
  .modal-section:last-child { border-bottom: none; }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .modal-field-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }
  .modal-field-value {
    font-size: 0.85rem;
    font-weight: 600;
    word-break: break-word;
  }
  .modal-field-value a { color: var(--accent-light); text-decoration: none; font-size: 0.78rem; }
  .modal-field-value a:hover { text-decoration: underline; }
  .modal-addr-block {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 4px;
  }
  .modal-addr-block .addr-line {
    font-size: 0.9rem;
    font-weight: 700;
  }
  .modal-addr-block .addr-city {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    padding: 16px 24px;
  }
  .pagination button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pagination button:hover { border-color: var(--accent); }
  .pagination button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .page-info { font-size: 0.75rem; color: var(--text-muted); }

  /* Responsive */
  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .header { padding: 12px 16px; }
    .filters { padding: 8px 16px; }
    .table-wrap { padding: 0 8px 16px; }
    .search-input { width: 100%; }
    .bar-label { width: 80px; font-size: 0.65rem; }
  }

  /* Edit marker dot — shows next to score when row has manual edits */
  .edit-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    margin-left: 5px;
    background: var(--accent-light);
    border-radius: 50%;
    vertical-align: middle;
  }
</style>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header">
  <h1>Harris County <span>Motivated Sellers</span></h1>
  <div class="header-meta" id="meta"></div>
</div>

<div class="stats" id="stats"></div>

<div class="charts-row" id="chartsRow">
  <div class="chart-card">
    <h3>Leads by Category</h3>
    <div class="bar-chart" id="catChart"></div>
  </div>
  <div class="chart-card">
    <h3>Score Distribution</h3>
    <div class="score-dist" id="scoreChart"></div>
    <div class="score-labels"><span>30</span><span>50</span><span>70</span><span>100</span></div>
  </div>
</div>

<div class="filters" id="filtersBar">
  <select id="typeFilter"><option value="">All Types</option></select>
  <div class="score-range">
    <input type="number" class="score-input" id="scoreMin" placeholder="Min" min="0" max="100">
    <span>–</span>
    <input type="number" class="score-input" id="scoreMax" placeholder="Max" min="0" max="100">
  </div>
  <select id="flagFilter"><option value="">All Flags</option></select>
  <select id="addrFilter">
    <option value="">All</option>
    <option value="with">With Address</option>
    <option value="without">Without Address</option>
  </select>
  <select id="confFilter">
    <option value="">All Confidence</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
    <option value="none">None</option>
  </select>
  <select id="sourceFilter">
    <option value="">All Sources</option>
    <option value="clerk">Clerk Records</option>
    <option value="foreclosure">Foreclosures</option>
  </select>
  <select id="runPicker" title="Pick a scraper run to see only the records it touched">
    <option value="">All Runs</option>
  </select>
  <select id="batchFilter">
    <option value="">All Batches</option>
  </select>
  <select id="saleMonthFilter"><option value="">All Sale Months</option></select>
  <span style="font-size:0.72rem;color:var(--text-muted);">Filed:</span>
  <input type="date" id="filedFrom" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:0.75rem;outline:none;width:125px" title="Filed from date">
  <span style="font-size:0.72rem;color:var(--text-muted);">to</span>
  <input type="date" id="filedTo" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:0.75rem;outline:none;width:125px" title="Filed to date">
  <input type="text" class="search-input" id="searchInput" placeholder="Search owner, legal, doc#...">
  <button class="btn" onclick="resetFilters()">Reset</button>
  <div class="export-group">
    <button class="btn btn-accent" onclick="exportCSV('all')">Export All</button>
    <button class="btn btn-green" id="exportSelBtn" onclick="exportCSV('selected')" disabled>Export Selected <span class="selected-count" id="selCount"></span></button>
    <button class="btn btn-siftstack" id="siftstackBtn" onclick="handleSiftstackButton()" disabled title="Queue selected records for SIFTstack enrichment">SIFTstack <span class="selected-count" id="siftstackCount"></span></button>
    <button class="btn-undo" id="undoBtn" onclick="undoLastEdit()" disabled>&#8630; Undo</button><span class="undo-info" id="undoInfo"></span>
  </div>
  <span id="activeFilter"></span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
    <span style="font-size:0.72rem;color:var(--text-muted);">Show:</span>

// Maps UI field names → Supabase column names and writes the update.
function fieldToUpdate(field, newVal) {
  if (field === "prop_address") {
    const v = newVal || {};
    return {
      prop_address: v.address || null,
      prop_city: v.city || null,
      prop_state: v.state || null,
      prop_zip: v.zip || null,
    };
  }
  if (field === "mail_address") {
    const v = newVal || {};
    return {
      mail_address: v.address || null,
      mail_city: v.city || null,
      mail_state: v.state || null,
      mail_zip: v.zip || null,
    };
  }
  if (field === "legal")     return { legal_description: newVal || null };
  if (field === "sale_date") return { sale_date: newVal || null };
  if (field === "filed")     return { filed_date: newVal || null };
  return { [field]: newVal || null };
}

function applyUpdateToRecord(rec, field, newVal) {
  if (field === "prop_address") {
    const v = newVal || {};
    rec.prop_address = v.address || "";
    rec.prop_city    = v.city    || "";
    rec.prop_state   = v.state   || "";
    rec.prop_zip     = v.zip     || "";
  } else if (field === "mail_address") {
    const v = newVal || {};
    rec.mail_address = v.address || "";
    rec.mail_city    = v.city    || "";
    rec.mail_state   = v.state   || "";
    rec.mail_zip     = v.zip     || "";
  } else if (field === "legal") {
    rec.legal = newVal || "";
  } else {
    rec[field] = newVal || "";
  }
}

async function saveFieldToSupabase(docNum, field, newVal) {
  const status = document.getElementById("editSyncStatus");
  if (status) status.textContent = "Saving…";
  const update = fieldToUpdate(field, newVal);
  const { error } = await sb.from("records").update(update).eq("doc_num", docNum);
  if (error) {
    if (status) { status.textContent = "Save failed"; setTimeout(() => status.textContent = "", 3000); }
    console.error("Save failed:", error);
    return false;
  }
  const rec = DATA?.records?.find(r => r.doc_num === docNum);
  if (rec) applyUpdateToRecord(rec, field, newVal);
  if (status) { status.textContent = "Saved"; setTimeout(() => status.textContent = "", 1500); }
  return true;
}

// Parse "123 Main St, Houston, TX 77001" → { address, city, state, zip }
function parseAddress(val) {
  const parts = val.split(",").map(s => s.trim());
  if (parts.length < 2) return { address: val, city: "", state: "", zip: "" };
  const lastPart = parts[parts.length - 1];
  const stZip = lastPart.match(/^([A-Za-z]{2})\s+(\d{5}(?:-\d{4})?)$/);
  if (stZip) {
    return {
      address: parts[0],
      city:    parts.length >= 3 ? parts.slice(1, -1).join(", ") : "",
      state:   stZip[1].toUpperCase(),
      zip:     stZip[2],
    };
  }
  return { address: parts[0], city: parts.slice(1).join(", "), state: "", zip: "" };
}

// ── Undo (localStorage, per-browser) ─────────────────────────────

function saveUndoToStorage() {

}

function pushUndo(docNum, field, oldVal, newVal) {

  updateUndoUI();
}

  if (!btn) return;
  if (undoStack.length === 0) {
    btn.disabled = true;
    if (info) info.textContent = "";

    btn.disabled = false;
    const last = undoStack[undoStack.length - 1];
    const fieldLabels = { owner: "Owner", co_borrower: "Co-Borrower", grantor_name: "Grantor", prop_address: "Prop Addr", mail_address: "Mail Addr", amount: "Amount", legal: "Legal", sale_date: "Sale Date" };
    if (info) info.textContent = `${fieldLabels[last.field] || last.field} on ${last.docNum} by ${last.user}`;
  }
}

// ── Normalize Supabase rows → dashboard shape ──────────────────────
// Dashboard code expects `filed` and `legal`, Supabase stores `filed_date` and `legal_description`.
// We aliass them after fetch so rendering/filtering code stays untouched.
function normalizeFromDb(r) {
  r.filed = r.filed_date || "";
  r.legal = r.legal_description || "";
  r._source = r.doc_type === "FRCL" ? "foreclosure" : "clerk";
  // Foreclosure stat card + filter lookups use short code "FRCL"
  if (r.doc_type === "FRCL") r.cat = "FRCL";
  if (!r.flags) r.flags = [];
  return r;
}

// ── Central Time formatter (Houston operations) ────────────────────
// Every timestamp shown on the dashboard MUST go through this helper.
// Browser-locale defaults are wrong - viewers in other timezones see
// shifted times that don't match what was logged.
function formatCT(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  if (isNaN(d)) return "";
  return d.toLocaleString("en-US", {
    timeZone: "America/Chicago",
    year:  "numeric", month: "short", day:    "numeric",
    hour:  "2-digit", minute: "2-digit",
    timeZoneName: "short",
  });
}

// ── Load Data ──────────────────────────────────────────────────────
async function loadData() {
  // Fetch in pages of 1000 (Supabase default max per request)
  const all = [];
  const PAGE = 1000;
  let from = 0;
  while (true) {
    const { data, error } = await sb
      .from("records")
      .select("*")
      .order("score", { ascending: false, nullsFirst: false })
      .range(from, from + PAGE - 1);
    if (error) { console.error(error); alert("Load failed: " + error.message); return; }
    if (!data || data.length === 0) break;
    all.push(...data);
    if (data.length < PAGE) break;
    from += PAGE;
  }

  all.forEach(normalizeFromDb);

  const frclCount = all.filter(r => r.doc_type === "FRCL").length;
  const dates = all.map(r => r.filed_date).filter(Boolean).sort();
  DATA = {
    fetched_at: new Date().toISOString(),
    source: "Supabase (live)",
    date_range: { from: dates[0] || "", to: dates[dates.length - 1] || "" },
    total: all.length,
    records: all,
  };
  FRCL_DATA = { total: frclCount };   // kept for legacy meta display

  document.getElementById("meta").innerHTML =
    `Updated: ${formatCT(DATA.fetched_at)}<br>${DATA.date_range.from} to ${DATA.date_range.to}<br>Foreclosures: ${frclCount} postings`;

  buildStats();
  buildCharts();
  populateFilters();
  await loadRuns();
  applyFilters();
}

// ── Run-picker: load scraper_runs and populate the Run dropdown ────
//
// Fetches up to ~5,000 most recent runs (each scraper run is one row).
// On select, queries scraper_run_records for that run, builds a Map of
// record_id -> action, and applyFilters() narrows the table to those
// records. Picking "All Runs" clears the filter.
let RUNS = [];
let SELECTED_RUN_RECORD_IDS = null;   // null = no run filter; Map otherwise

async function loadRuns() {
  try {
    const { data, error } = await sb
      .from("scraper_runs")
      .select("id,run_id,gh_run_number,workflow_name,started_at,completed_at,status,total_seen,total_created,total_updated")
      .order("id", { ascending: false })
      .limit(5000);
    if (error) { console.error("loadRuns failed:", error); return; }
    RUNS = data || [];
  } catch (e) {
    console.error("loadRuns exception:", e);
    RUNS = [];
  }

  const sel = document.getElementById("runPicker");
  // Wipe any previously-built options except the leading "All Runs"
  sel.innerHTML = '<option value="">All Runs</option>';

  RUNS.forEach(r => {
    const dtStr = formatCT(r.started_at);
    const wf = (r.workflow_name || "").replace(/\.yml$/, "")
      .replace("scrape-foreclosures", "Foreclosure")
      .replace("scrape", "Lead");
    const ghTag = r.gh_run_number ? `Run #${r.gh_run_number}` : (r.run_id || `id ${r.id}`);
    const seen = r.total_seen ?? 0;
    const created = r.total_created ?? 0;
    const updated = r.total_updated ?? 0;
    const stats = `seen ${seen} / new ${created} / upd ${updated}`;
    const opt = document.createElement("option");
    opt.value = String(r.id);
    opt.textContent = `${ghTag} ${wf ? "- " + wf : ""} ${dtStr ? "- " + dtStr : ""}  (${stats})`;
    sel.appendChild(opt);
  });
}

// When the user picks a run, load the junction rows for that run and
// build a Set of record_ids that the filter will use.
async function applyRunPickerSelection(runIdStr) {
  if (!runIdStr) {
    SELECTED_RUN_RECORD_IDS = null;
    return;
  }
  const runId = Number(runIdStr);
  try {
    // Pull the junction rows for this run, paginated (1000 cap per request)
    const ids = new Map();   // record_id -> action
    let from = 0;
    const PAGE = 1000;
    while (true) {
      const { data, error } = await sb
        .from("scraper_run_records")
        .select("record_id,action")
        .eq("run_id", runId)
        .range(from, from + PAGE - 1);
      if (error) { console.error("loadRunRecords failed:", error); break; }
      if (!data || data.length === 0) break;
      data.forEach(row => ids.set(row.record_id, row.action));
      if (data.length < PAGE) break;
      from += PAGE;
    }
    SELECTED_RUN_RECORD_IDS = ids;
  } catch (e) {
    console.error("applyRunPickerSelection exception:", e);
    SELECTED_RUN_RECORD_IDS = null;
  }
}

// ── Realtime: live updates when anyone edits a record ──────────────
function subscribeRealtime() {
  if (realtimeChannel) return;
  realtimeChannel = sb
    .channel("records-changes")
    .on("postgres_changes", { event: "UPDATE", schema: "public", table: "records" }, (payload) => {
      const updated = payload.new;
      const rec = DATA?.records?.find(r => r.doc_num === updated.doc_num);
      if (!rec) return;
      const prevStatus = rec.siftstack_status || null;
      Object.assign(rec, normalizeFromDb({ ...updated }));
      renderTable();
      // Refresh stat cards if siftstack_status changed (count could differ)
      if (prevStatus !== (rec.siftstack_status || null)) buildStats();
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "property_data" }, (payload) => {
      const row = payload.new || payload.old;
      if (!row || !row.parcel_acct) return;
      if (row.parcel_acct === currentModalParcelAcct) {
        loadHcadData(currentModalParcelAcct);
      }
    })
    .subscribe();
}

// ── Stat Cards ─────────────────────────────────────────────────────
function buildStats() {
  const cats = {};
  DATA.records.forEach(r => { cats[r.cat] = (cats[r.cat] || 0) + 1; });

  const withAddr = DATA.records.filter(r => r.prop_address && r.prop_address.trim()).length;
  const pct = DATA.total ? Math.round(withAddr / DATA.total * 100) : 0;

  const ssCompleted = DATA.records.filter(r => r.siftstack_status === "completed").length;
  const ssQueued    = DATA.records.filter(r => r.siftstack_status === "queued").length;
  const ssManual    = DATA.records.filter(r => {
    if (r.siftstack_status) return false; // already submitted or in flight
    const hasAddr = !!(r.prop_address && r.prop_address.trim());
    const hasName = !!((r.owner || r.grantor_name || "").trim());
    return !hasAddr || !hasName;
  }).length;

  let html = `
    <div class="stat-card total" data-filter="all" onclick="toggleCardFilter('all')">
      <div class="value">${DATA.total.toLocaleString()}</div>
      <div class="label">Total Leads</div>
    </div>
    <div class="stat-card addr" data-filter="addr" onclick="toggleCardFilter('addr')">
      <div class="value">${withAddr.toLocaleString()}</div>
      <div class="label">With Address</div>
      <div class="pct">${pct}%</div>
    </div>
    <div class="stat-card enriched" data-filter="ss:completed" onclick="toggleCardFilter('ss:completed')">
      <div class="value">${ssCompleted.toLocaleString()}</div>
      <div class="label">Enriched</div>
    </div>
    <div class="stat-card queued" data-filter="ss:queued" onclick="toggleCardFilter('ss:queued')">
      <div class="value">${ssQueued.toLocaleString()}</div>
      <div class="label">Queued</div>
    </div>
    <div class="stat-card manual" data-filter="ss:manual" onclick="toggleCardFilter('ss:manual')">
      <div class="value">${ssManual.toLocaleString()}</div>
      <div class="label">Needs Manual</div>
    </div>`;

  // Top categories as cards
  const catOrder = ["FRCL","LP","NOFC","TAXLIEN","LIEN","AOJ","LEVY","PROBATE"];
  const catLabels = {};
  DATA.records.forEach(r => { catLabels[r.cat] = r.cat_label; });

  catOrder.forEach(c => {
    if (cats[c]) {
      html += `
        <div class="stat-card" data-filter="cat:${c}" onclick="toggleCardFilter('cat:${c}')">
          <div class="value" style="color:${CAT_COLORS[c] || '#7c5cfc'}">${cats[c]}</div>
          <div class="label">${catLabels[c] || c}</div>
        </div>`;
    }
  });

  document.getElementById("stats").innerHTML = html;
}

function toggleCardFilter(filter) {
  if (cardFilter === filter) {
    cardFilter = null;
  } else {
    cardFilter = filter;
  }
  // Highlight active card
  document.querySelectorAll(".stat-card").forEach(el => {
    el.classList.toggle("active", el.dataset.filter === cardFilter);
  });
  currentPage = 1;
  applyFilters();
}

// ── Charts ─────────────────────────────────────────────────────────
function buildCharts() {
  // Category bar chart
  const cats = {};
  const catLabels = {};
  DATA.records.forEach(r => {
    cats[r.cat] = (cats[r.cat] || 0) + 1;
    catLabels[r.cat] = r.cat_label;
  });
  const maxCat = Math.max(...Object.values(cats));
  const sortedCats = Object.entries(cats).sort((a, b) => b[1] - a[1]);

  let barHtml = "";
  sortedCats.forEach(([cat, count]) => {
    const pct = (count / maxCat * 100).toFixed(0);
    const color = CAT_COLORS[cat] || "#7c5cfc";
    const shortLabel = (catLabels[cat] || cat).replace(/ \/ /g, "/").substring(0, 20);
    barHtml += `
      <div class="bar-row">
        <div class="bar-label" title="${catLabels[cat]}">${shortLabel}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${count > 5 ? count : ''}</div></div>
        <div class="bar-count">${count}</div>
      </div>`;
  });
  document.getElementById("catChart").innerHTML = barHtml;

  // Score distribution
  const buckets = {};
  for (let i = 30; i <= 100; i += 5) buckets[i] = 0;
  DATA.records.forEach(r => {
    const b = Math.floor(r.score / 5) * 5;
    const key = Math.max(30, Math.min(100, b));
    buckets[key] = (buckets[key] || 0) + 1;
  });
  const maxBucket = Math.max(...Object.values(buckets), 1);
  let scoreHtml = "";
  Object.entries(buckets).forEach(([score, count]) => {
    const h = Math.max(2, (count / maxBucket * 100));
    const color = score >= 70 ? "var(--green)" : score >= 50 ? "var(--orange)" : "var(--accent)";
    scoreHtml += `<div class="score-bar" style="height:${h}%;background:${color}"><div class="tooltip">${score}-${parseInt(score)+4}: ${count}</div></div>`;
  });
  document.getElementById("scoreChart").innerHTML = scoreHtml;
}

// ── Filters ────────────────────────────────────────────────────────
function populateFilters() {
  const types = [...new Set(DATA.records.map(r => r.doc_type))].sort();
  const sel = document.getElementById("typeFilter");
  types.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });

  const flags = new Set();
  DATA.records.forEach(r => (r.flags || []).forEach(f => flags.add(f)));
  const fsel = document.getElementById("flagFilter");
  [...flags].sort().forEach(f => {
    const opt = document.createElement("option");
    opt.value = f; opt.textContent = f;
    fsel.appendChild(opt);
  });

  // Populate sale month filter from sale_date field (auto-populates as new months are scraped)
  const saleMonths = new Map();
  const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  DATA.records.forEach(r => {
    if (r.sale_date) {
      const d = new Date(r.sale_date);
      if (!isNaN(d)) {
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        if (!saleMonths.has(key)) saleMonths.set(key, 0);
        saleMonths.set(key, saleMonths.get(key) + 1);
      }
    }
  });
  const smSel = document.getElementById("saleMonthFilter");
  [...saleMonths.entries()].sort((a,b) => a[0].localeCompare(b[0])).forEach(([key, count]) => {
    const [y, m] = key.split("-");
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = `${monthNames[parseInt(m)-1]} ${y} (${count})`;
    smSel.appendChild(opt);
  });

  // Per-page selector
  document.getElementById("perpageSelect").addEventListener("change", function() {
    perPage = this.value === "all" ? Infinity : parseInt(this.value);
    currentPage = 1;
    applyFilters();
  });

  // Live filtering
  document.getElementById("searchInput").addEventListener("input", () => { currentPage = 1; applyFilters(); });
  document.getElementById("typeFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("scoreMin").addEventListener("input", () => { currentPage = 1; applyFilters(); });
  document.getElementById("scoreMax").addEventListener("input", () => { currentPage = 1; applyFilters(); });
  document.getElementById("flagFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("addrFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("confFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("sourceFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("batchFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("runPicker").addEventListener("change", async (e) => {
    currentPage = 1;
    await applyRunPickerSelection(e.target.value);
    applyFilters();
  });
  document.getElementById("saleMonthFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("filedFrom").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("filedTo").addEventListener("change", () => { currentPage = 1; applyFilters(); });

  // Populate batch filter dropdown from foreclosure records
  const batchMap = new Map();  // batch_id → { label, count }
  DATA.records.forEach(r => {
    if (r.batch_id) {
      if (!batchMap.has(r.batch_id)) {
        batchMap.set(r.batch_id, { label: r.batch_label || r.batch_id, count: 0 });
      }
      batchMap.get(r.batch_id).count++;
    }
  });
  const bsel = document.getElementById("batchFilter");
  // Sort batches by batch number (B1, B2, B3...)
  const sortedBatches = [...batchMap.entries()].sort((a, b) => {
    const numA = parseInt(a[0].replace("B", "")) || 0;
    const numB = parseInt(b[0].replace("B", "")) || 0;
    return numB - numA;  // newest first
  });
  sortedBatches.forEach(([bid, info]) => {
    const opt = document.createElement("option");
    opt.value = bid;
    opt.textContent = `${info.label} (${info.count})`;
    bsel.appendChild(opt);
  });
}

function getFiltered() {
  const q     = document.getElementById("searchInput").value.toLowerCase();
  const type  = document.getElementById("typeFilter").value;
  const sMin  = parseInt(document.getElementById("scoreMin").value);
  const sMax  = parseInt(document.getElementById("scoreMax").value);
  const minScore = isNaN(sMin) ? 0 : sMin;
  const maxScore = isNaN(sMax) ? 100 : sMax;
  const flag  = document.getElementById("flagFilter").value;
  const addr  = document.getElementById("addrFilter").value;
  const conf  = document.getElementById("confFilter").value;
  const src   = document.getElementById("sourceFilter").value;
  const batch = document.getElementById("batchFilter").value;
  const saleMonth = document.getElementById("saleMonthFilter").value;
  const filedFrom = document.getElementById("filedFrom").value;
  const filedTo   = document.getElementById("filedTo").value;

  return DATA.records.filter(r => {
    if (src && (r._source || "clerk") !== src) return false;
    if (batch && (r.batch_id || "") !== batch) return false;
    // Run-picker filter: SELECTED_RUN_RECORD_IDS is a Map(record_id -> action)
    // populated when the user picks a run. Records not in the Map are excluded.
    if (SELECTED_RUN_RECORD_IDS && !SELECTED_RUN_RECORD_IDS.has(r.id)) return false;
    // Sale month filter (by sale_date)
    if (saleMonth && r.sale_date) {
      const d = new Date(r.sale_date);
      if (!isNaN(d)) {
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        if (key !== saleMonth) return false;
      } else return false;
    } else if (saleMonth && !r.sale_date) return false;
    // Filed date range filter
    if (filedFrom && r.filed && r.filed < filedFrom) return false;
    if (filedTo && r.filed && r.filed > filedTo) return false;
    // Card filter
    if (cardFilter) {
      if (cardFilter === "addr") {
        if (!r.prop_address || !r.prop_address.trim()) return false;
      } else if (cardFilter.startsWith("cat:")) {
        if (r.cat !== cardFilter.slice(4)) return false;
      } else if (cardFilter === "ss:completed") {
        if (r.siftstack_status !== "completed") return false;
      } else if (cardFilter === "ss:queued") {
        if (r.siftstack_status !== "queued") return false;
      } else if (cardFilter === "ss:manual") {
        if (r.siftstack_status) return false;
        const hasAddr = !!(r.prop_address && r.prop_address.trim());
        const hasName = !!((r.owner || r.grantor_name || "").trim());
        if (hasAddr && hasName) return false; // has both → not manual
      }
      // "all" = no filter
    }
    if (type && r.doc_type !== type) return false;
    if (r.score < minScore || r.score > maxScore) return false;
    if (flag && !(r.flags || []).includes(flag)) return false;
    if (addr === "with" && (!r.prop_address || !r.prop_address.trim())) return false;
    if (addr === "without" && r.prop_address && r.prop_address.trim()) return false;
    if (conf && (r.match_confidence || "none") !== conf) return false;
    if (q) {
      const hay = [r.owner, r.grantor_name, r.grantee_names, r.legal, r.doc_num, r.cat_label, r.prop_address, r.mail_address]
        .join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function applyFilters() {
  filtered = getFiltered();
  sortData();
  renderTable();
  renderPagination();

  // Active filter tag
  let tag = "";
  if (cardFilter && cardFilter !== "all") {
    const label =
      cardFilter === "addr" ? "With Address" :
      cardFilter === "ss:completed" ? "SIFTstack Enriched" :
      cardFilter === "ss:queued" ? "SIFTstack Queued" :
      cardFilter === "ss:manual" ? "Needs Manual Research" :
      cardFilter.replace("cat:", "");
    tag = `<span class="filter-tag">${label} <span class="x" onclick="toggleCardFilter('${cardFilter}')">&times;</span></span>`;
  }
  document.getElementById("activeFilter").innerHTML = tag;
  document.getElementById("showingLabel").textContent = `Showing ${filtered.length} of ${DATA.total}`;
}

function resetFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("typeFilter").value = "";
  document.getElementById("scoreMin").value = "";
  document.getElementById("scoreMax").value = "";
  document.getElementById("flagFilter").value = "";
  document.getElementById("addrFilter").value = "";
  document.getElementById("confFilter").value = "";
  document.getElementById("sourceFilter").value = "";
  document.getElementById("batchFilter").value = "";
  document.getElementById("runPicker").value = "";
  SELECTED_RUN_RECORD_IDS = null;
  document.getElementById("saleMonthFilter").value = "";
  document.getElementById("filedFrom").value = "";
  document.getElementById("filedTo").value = "";
  cardFilter = null;
  selectedRows.clear();
  updateSelectionUI();
  document.querySelectorAll(".stat-card").forEach(el => el.classList.remove("active"));
  currentPage = 1;
  applyFilters();
}

// ── Sort ───────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = col === "filed"; }
  sortData();
  renderTable();
}

function sortData() {
  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === "score") { va = va || 0; vb = vb || 0; }
    else if (sortCol === "flags") { va = (va||[]).length; vb = (vb||[]).length; }
    else { va = (va || "").toString().toLowerCase(); vb = (vb || "").toString().toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

// ── Table Render ───────────────────────────────────────────────────
function renderTable() {
  // Header with checkbox
  const effectivePP = perPage === Infinity ? filtered.length : perPage;
  const pageData = filtered.slice((currentPage - 1) * effectivePP, (currentPage - 1) * effectivePP + effectivePP);
  const allPageSelected = pageData.length > 0 && pageData.every(r => selectedRows.has(r.doc_num));

  let thead = `<tr><th style="width:32px"><input type="checkbox" class="hdr-cb" ${allPageSelected ? 'checked' : ''} onchange="togglePageAll(this.checked)"></th>`;
  COLS.forEach(c => {
    const arrow = sortCol === c.key ? (sortAsc ? " &#9650;" : " &#9660;") : "";
    thead += `<th style="width:${c.w}" onclick="sortBy('${c.key}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  });
  thead += "</tr>";
  document.getElementById("thead").innerHTML = thead;

  // Body (paginated)
  let html = "";
  pageData.forEach(r => {
    const scoreCls = r.score >= 70 ? "score-high" : r.score >= 50 ? "score-med" : "score-low";
    const isSelected = selectedRows.has(r.doc_num);

    let flagsHtml = "";
    (r.flags || []).forEach(f => {
      const cls = f === "New this week" ? "fresh" : DISTRESS_FLAGS.has(f) ? "distress" : "info";
      flagsHtml += `<span class="flag-pill ${cls}">${f}</span>`;
    });

    const propAddr = [r.prop_address, r.prop_city, r.prop_state, r.prop_zip].filter(Boolean).join(", ");
    const mailAddr = [r.mail_address, r.mail_city, r.mail_state, r.mail_zip].filter(Boolean).join(", ");

    const rowIdx = (currentPage - 1) * perPage + filtered.indexOf(r);
    const editable = currentProfile && (currentProfile.role === "admin" || currentProfile.role === "editor");
    const hasEdits = (r.manual_overrides || []).length > 0;
    const editMark = hasEdits ? '<span class="edit-dot" title="Manually edited"></span>' : '';
    const mutedDash = '<span style="color:var(--text-muted)">--</span>';
    const cell = (field, displayVal, extraStyle) => {
      const content = displayVal || mutedDash;
      const style = extraStyle ? ` style="${extraStyle}"` : "";
      if (editable) {
        return `<td class="editable-cell" ondblclick="startEdit('${r.doc_num}','${field}',this)" title="Double-click to edit"${style}>${content}</td>`;
      }
      return `<td onclick="openModal(${rowIdx})"${style}>${content}</td>`;
    };

    html += `<tr class="${isSelected ? 'selected' : ''}" data-idx="${rowIdx}">
      <td><input type="checkbox" class="row-cb" ${isSelected ? 'checked' : ''} onchange="toggleRow('${r.doc_num}', this.checked)"></td>
      <td class="score-cell" onclick="openModal(${rowIdx})"><span class="score-pill ${scoreCls}">${r.score || 0}</span>${editMark}</td>
      <td onclick="openModal(${rowIdx})">${r.filed || ""}</td>
      ${cell("sale_date", r.sale_date)}
      <td onclick="openModal(${rowIdx})"><span class="type-badge">${r.doc_type || ""}</span></td>
      <td onclick="openModal(${rowIdx})">${r.cat_label || ""}</td>
      ${cell("owner", r.owner)}
      ${cell("co_borrower", r.co_borrower)}
      ${cell("grantor_name", r.grantor_name)}
      <td onclick="openModal(${rowIdx})">${flagsHtml}</td>
      ${cell("legal", r.legal)}
      ${cell("prop_address", propAddr)}
      ${cell("mail_address", mailAddr)}
      ${cell("amount", r.amount, "font-size:0.78rem")}
      ${editable
        ? `<td class="editable-cell" ondblclick="startEdit('${r.doc_num}','match_confidence',this)" title="Double-click to edit"><span class="conf-pill conf-${r.match_confidence || 'none'}">${r.match_confidence || 'none'}</span></td>`
        : `<td onclick="openModal(${rowIdx})"><span class="conf-pill conf-${r.match_confidence || 'none'}">${r.match_confidence || 'none'}</span></td>`}
      <td onclick="openModal(${rowIdx})">${renderSiftstackPill(r)}</td>
      <td style="font-size:0.7rem" onclick="openModal(${rowIdx})">${r.doc_num}</td>
      <td style="font-size:0.7rem">${r.clerk_url ? '<a href="' + r.clerk_url + '" target="_blank" rel="noopener">Clerk</a>' : ''}${r.hcad_url ? ' <a href="' + r.hcad_url + '" target="_blank" rel="noopener" style="color:var(--green)">HCAD</a>' : ''}</td>
    </tr>`;
  });
  document.getElementById("tbody").innerHTML = html || '<tr><td colspan="18" style="text-align:center;padding:32px;color:var(--text-muted)">No records match your filters</td></tr>';
}

// ── Row Selection ─────────────────────────────────────────────────
function toggleRow(docNum, checked) {
  if (checked) selectedRows.add(docNum);
  else selectedRows.delete(docNum);
  updateSelectionUI();
  // Update the row highlight without full re-render
  const rows = document.querySelectorAll("tbody tr");
  rows.forEach(tr => {
    const cb = tr.querySelector(".row-cb");
    if (cb) tr.classList.toggle("selected", cb.checked);
  });
  // Update header checkbox
  const ePP2 = perPage === Infinity ? filtered.length : perPage;
  const pageData = filtered.slice((currentPage - 1) * ePP2, (currentPage - 1) * ePP2 + ePP2);
  const hdrCb = document.querySelector(".hdr-cb");
  if (hdrCb) hdrCb.checked = pageData.length > 0 && pageData.every(r => selectedRows.has(r.doc_num));
}

function togglePageAll(checked) {
  const ePP3 = perPage === Infinity ? filtered.length : perPage;
  const pageData = filtered.slice((currentPage - 1) * ePP3, (currentPage - 1) * ePP3 + ePP3);
  pageData.forEach(r => {
    if (checked) selectedRows.add(r.doc_num);
    else selectedRows.delete(r.doc_num);
  });
  updateSelectionUI();
  renderTable();
}

function updateSelectionUI() {
  const count = selectedRows.size;
  const btn = document.getElementById("exportSelBtn");
  const badge = document.getElementById("selCount");
  btn.disabled = count === 0;
  badge.textContent = count > 0 ? `(${count})` : "";

  const ssBtn = document.getElementById("siftstackBtn");
  const ssBadge = document.getElementById("siftstackCount");
  if (ssBtn && ssBadge) {
    const editable = currentProfile && (currentProfile.role === "admin" || currentProfile.role === "editor");
    ssBtn.disabled = count === 0 || !editable;
    ssBadge.textContent = count > 0 ? `(${count})` : "";
  }
}

// ── SIFTstack submission pill + queue button ─────────────────────
function renderSiftstackPill(r) {
  const status = r.siftstack_status || "none";
  const ts = r.siftstack_completed_at;
  const labels = {
    completed: "✓ Enriched",
    queued:    "⏳ Queued",
    failed:    "✗ Failed",
    none:      "—",
  };
  const label = labels[status] || "—";
  let title = "Not yet submitted";
  if (status === "completed")
    title = ts ? "Enriched " + formatCT(ts) : "Enriched";
  else if (status === "failed")
    title = ts ? "Failed " + formatCT(ts) : "Failed";
  else if (status === "queued")
    title = "Queued — awaiting SIFTstack worker";
  // Escape quotes for safe HTML attribute
  const safeTitle = String(title).replace(/"/g, "&quot;");
  return `<span class="siftstack-pill ss-${status}" title="${safeTitle}">${label}</span>`;
}

async function handleSiftstackButton() {
  if (!currentSession?.user?.id) { alert("Not signed in."); return; }
  const editable = currentProfile && (currentProfile.role === "admin" || currentProfile.role === "editor");
  if (!editable) { alert("Only editors can queue records."); return; }
  if (selectedRows.size === 0) return;

  const selected    = DATA.records.filter(r => selectedRows.has(r.doc_num));
  const completedL  = selected.filter(r => r.siftstack_status === "completed");
  const queuedL     = selected.filter(r => r.siftstack_status === "queued");
  const freshL      = selected.filter(r => !r.siftstack_status || r.siftstack_status === "failed");

  let toQueue;
  if (completedL.length > 0) {
    const choice = await showSiftstackConfirm(selected.length, completedL.length, queuedL.length, freshL.length);
    if (choice === "cancel") return;
    if (choice === "reenrich") toQueue = [...freshL, ...completedL];
    else if (choice === "skip") toQueue = freshL;
  } else {
    toQueue = freshL;
    if (queuedL.length > 0 && freshL.length === 0) {
      alert(`All ${queuedL.length} selected records are already queued. Nothing to do.`);
      return;
    }
  }

  if (!toQueue || toQueue.length === 0) {
    alert("No records to submit.");
    return;
  }

  const batchId = (crypto.randomUUID && crypto.randomUUID()) ||
    "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
    });

  const rows = toQueue.map(r => ({
    record_id: r.id,
    batch_id:  batchId,
    queued_by: currentSession.user.id,
    status:    "pending",
  }));

  const { error } = await sb.from("siftstack_queue").insert(rows);
  if (error) {
    alert("Failed to queue: " + error.message);
    return;
  }

  // Trigger will set records.siftstack_status = 'queued' for each one.
  // Realtime subscription on records table picks up the change.
  alert(`Queued ${rows.length} record(s) for SIFTstack enrichment.`);
  selectedRows.clear();
  renderTable();
  updateSelectionUI();
}

function showSiftstackConfirm(total, completedN, queuedN, freshN) {
  return new Promise(resolve => {
    const overlay = document.createElement("div");
    overlay.className = "siftstack-confirm-overlay";
    overlay.innerHTML = `
      <div class="siftstack-confirm">
        <h3>SIFTstack Queue</h3>
        <p>You selected <b>${total}</b> record(s).</p>
        <ul>
          ${completedN ? `<li><b>${completedN}</b> already enriched</li>` : ""}
          ${queuedN    ? `<li><b>${queuedN}</b> already queued (will be skipped either way)</li>` : ""}
          ${freshN     ? `<li><b>${freshN}</b> not yet submitted</li>` : ""}
        </ul>
        <p>What would you like to do?</p>
        <div class="siftstack-confirm-buttons">
          <button class="btn btn-siftstack" id="ss-reenrich">Re-enrich enriched + queue fresh (${completedN + freshN})</button>
          <button class="btn btn-green" id="ss-skip">Skip enriched, queue only fresh (${freshN})</button>
          <button class="btn" id="ss-cancel">Cancel</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const close = (result) => { overlay.remove(); resolve(result); };
    overlay.querySelector("#ss-reenrich").onclick = () => close("reenrich");
    overlay.querySelector("#ss-skip").onclick     = () => close("skip");
    overlay.querySelector("#ss-cancel").onclick   = () => close("cancel");
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close("cancel"); });
  });
}

// ── Pagination ─────────────────────────────────────────────────────
function renderPagination() {
  const ePP = perPage === Infinity ? filtered.length : perPage;
  const totalPages = Math.max(1, Math.ceil(filtered.length / ePP));
  if (totalPages <= 1) { document.getElementById("pagination").innerHTML = ""; return; }

  let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">&laquo; Prev</button>`;
  const start = Math.max(1, currentPage - 3);
  const end = Math.min(totalPages, currentPage + 3);
  if (start > 1) html += `<button onclick="goPage(1)">1</button><span class="page-info">...</span>`;
  for (let i = start; i <= end; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < totalPages) html += `<span class="page-info">...</span><button onclick="goPage(${totalPages})">${totalPages}</button>`;
  html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next &raquo;</button>`;
  html += `<span class="page-info" style="margin-left:8px">Page ${currentPage} of ${totalPages}</span>`;
  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
  renderPagination();
  document.querySelector(".table-wrap").scrollIntoView({behavior: "smooth"});
}

// ── Name Splitting ────────────────────────────────────────────────
// Suffixes that stay with last name
const NAME_SUFFIXES = new Set(["sr","jr","ii","iii","iv","v","esq","md","phd","dds","dvm"]);

function splitName(fullName) {
  if (!fullName) return { first: "", middle: "", last: "" };
  // Strip leading "by " prefix (common in foreclosure grantor fields)
  let name = fullName.replace(/^by\s+/i, "").trim();
  if (!name) return { first: "", middle: "", last: "" };

  // Split into parts, handling commas for suffixes like ", Sr" or ", Jr"
  // First check if there's a suffix after a comma
  let suffix = "";
  const commaMatch = name.match(/^(.+?),\s*(Sr|Jr|II|III|IV|V|Esq|MD|PhD|DDS|DVM)\.?$/i);
  if (commaMatch) {
    name = commaMatch[1].trim();
    suffix = ", " + commaMatch[2];
  }

  const parts = name.split(/\s+/).filter(Boolean);

  if (parts.length === 0) return { first: "", middle: "", last: "" };
  if (parts.length === 1) return { first: toTitleCase(parts[0]), middle: "", last: "" };

  // Check if last word is a suffix without comma (e.g. "John Smith Jr")
  if (parts.length >= 3 && NAME_SUFFIXES.has(parts[parts.length - 1].toLowerCase().replace(/\.$/,""))) {
    suffix = ", " + parts.pop();
  }

  if (parts.length === 2) {
    return { first: toTitleCase(parts[0]), middle: "", last: toTitleCase(parts[1]) + suffix };
  }

  // 3+ parts: first word = first, last word = last, everything in between = middle
  const first = toTitleCase(parts[0]);
  const last = toTitleCase(parts[parts.length - 1]) + suffix;
  const middle = parts.slice(1, -1).map(toTitleCase).join(" ");
  return { first, middle, last };
}

function toTitleCase(s) {
  if (!s) return "";
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

// ── CSV Export ─────────────────────────────────────────────────────
function exportCSV(mode) {
  let rows;
  if (mode === "selected") {
    rows = getFiltered().filter(r => selectedRows.has(r.doc_num));
    if (rows.length === 0) return;
  } else {
    rows = getFiltered();
  }
  const headers = [
    "Score","Filed","Sale Date","Date Scraped","Type","Category",
    "Owner First Name","Owner Middle Name","Owner Last Name",
    "Co-Borrower First Name","Co-Borrower Middle Name","Co-Borrower Last Name",
    "Grantor First Name","Grantor Middle Name","Grantor Last Name",
    "Grantee (Heirs)",
    "Property Address","Property City","Property State","Property Zip",
    "Mail Address","Mail City","Mail State","Mail Zip",
    "Flags","Legal Description","Amount",
    "Match Confidence","Doc #","Batch","Source","Clerk URL","HCAD URL"
  ];
  let csv = headers.join(",") + "\n";
  rows.forEach(r => {
    const owner = splitName(r.owner);
    const coBorrower = splitName(r.co_borrower);
    const grantor = splitName(r.grantor_name);
    csv += [
      r.score, r.filed, r.sale_date||"", r.date_scraped||"",
      r.doc_type, `"${(r.cat_label||'').replace(/"/g,'""')}"`,
      `"${owner.first}"`, `"${owner.middle}"`, `"${owner.last}"`,
      `"${coBorrower.first}"`, `"${coBorrower.middle}"`, `"${coBorrower.last}"`,
      `"${grantor.first}"`, `"${grantor.middle}"`, `"${grantor.last}"`,
      `"${(r.grantee_names||'').replace(/"/g,'""')}"`,
      `"${(r.prop_address||'').replace(/"/g,'""')}"`, r.prop_city||"", r.prop_state||"", r.prop_zip||"",
      `"${(r.mail_address||'').replace(/"/g,'""')}"`, r.mail_city||"", r.mail_state||"", r.mail_zip||"",
      `"${(r.flags||[]).join('; ')}"`,
      `"${(r.legal||'').replace(/"/g,'""')}"`,
      `"${(r.amount||'').replace(/"/g,'""')}"`,
      r.match_confidence||"none", r.doc_num, r.batch_id||"", r._source||"clerk", r.clerk_url||"", r.hcad_url||""
    ].join(",") + "\n";
  });
  // Smart filename based on active filters
  const fParts = [];
  const _src = document.getElementById("sourceFilter").value;
  const _sm = document.getElementById("saleMonthFilter").value;
  const _batch = document.getElementById("batchFilter").value;
  const _type = document.getElementById("typeFilter").value;
  const _ff = document.getElementById("filedFrom").value;
  const _ft = document.getElementById("filedTo").value;
  if (_src) fParts.push(_src);
  if (_sm) fParts.push("sale-" + _sm);
  if (_batch) fParts.push(_batch);
  if (_type) fParts.push(_type.toLowerCase());
  if (_ff || _ft) fParts.push("filed-" + (_ff||"start") + "-to-" + (_ft||"end"));
  if (cardFilter && cardFilter !== "all") fParts.push(cardFilter === "addr" ? "with-addr" : cardFilter.replace("cat:","").toLowerCase());
  if (mode === "selected") fParts.push("selected-" + rows.length);
  const datePart = new Date().toISOString().slice(0,10);
  let filename = "harris_leads";
  if (fParts.length > 0) filename += "_" + fParts.join("_");
  filename += "_" + datePart + ".csv";
  filename = filename.replace(/[^a-zA-Z0-9._-]/g, "_").replace(/_+/g, "_");
  const blob = new Blob([csv], {type: "text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

async function loadHcadData(parcelAcct) {
  const el = document.getElementById("hcadContent");
  if (!el) return;
  if (!parcelAcct) {
    el.innerHTML = '<span style="font-style:italic">No parcel account linked to this record</span>';
    return;
  }
  const { data, error } = await sb.from("property_data").select("*").eq("parcel_acct", parcelAcct).maybeSingle();
  if (!document.getElementById("hcadContent")) return; // modal closed during fetch
  if (error) {
    el.innerHTML = '<span style="color:var(--red)">Error loading HCAD data: ' + error.message + '</span>';
    return;
  }
  if (!data) {
    el.innerHTML = '<span style="font-style:italic">Data not yet captured &mdash; run HCAD extension</span>';
    return;
  }
  const fmt = v => (v === null || v === undefined || v === "") ? "--" : v;
  const fmtNum = v => (v === null || v === undefined) ? "--" : Number(v).toLocaleString();
  const fmtMoney = v => (v === null || v === undefined) ? "--" : "$" + Number(v).toLocaleString();
  el.innerHTML = `
    <div class="modal-grid">
      <div><div class="modal-field-label">Bedrooms</div><div class="modal-field-value">${fmt(data.bedrooms)}</div></div>
      <div><div class="modal-field-label">Bathrooms</div><div class="modal-field-value">${fmt(data.bathrooms)}</div></div>
      <div><div class="modal-field-label">Square Feet</div><div class="modal-field-value">${fmtNum(data.sqft)}</div></div>
      <div><div class="modal-field-label">Year Built</div><div class="modal-field-value">${fmt(data.year_built)}</div></div>
      <div><div class="modal-field-label">Lot Size (sqft)</div><div class="modal-field-value">${fmtNum(data.lot_size_sqft)}</div></div>
      <div><div class="modal-field-label">Market Value</div><div class="modal-field-value" style="color:var(--green);font-weight:700">${fmtMoney(data.market_value)}</div></div>
      <div><div class="modal-field-label">Appraised Value</div><div class="modal-field-value">${fmtMoney(data.appraised_value)}</div></div>
      <div><div class="modal-field-label">Structure Type</div><div class="modal-field-value">${fmt(data.structure_type)}</div></div>
      <div><div class="modal-field-label">Parcel ID</div><div class="modal-field-value" style="font-family:monospace;font-size:0.75rem">${parcelAcct}</div></div>
    </div>
  `;
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("active");
  document.body.style.overflow = "";
  currentModalParcelAcct = null;
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
