<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harris County Motivated Seller Leads</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #23273a;
    --border: #2d3148;
    --text: #e4e6f0;
    --text-muted: #8b8fa3;
    --accent: #7c5cfc;
    --accent-light: #9b82fc;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --blue: #3b82f6;
    --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h1 { font-size: 1.25rem; font-weight: 700; }
  .header h1 span { color: var(--accent-light); }
  .header-meta { font-size: 0.75rem; color: var(--text-muted); text-align: right; }

  /* Stat Cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    padding: 16px 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .stat-card.active { border-color: var(--accent); background: var(--surface2); }
  .stat-card .value {
    font-size: 1.75rem;
    font-weight: 800;
    line-height: 1.1;
    color: var(--accent-light);
  }
  .stat-card .label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .stat-card.total .value { color: var(--text); }
  .stat-card.addr .value  { color: var(--green); }

  /* Score badge on cards */
  .stat-card .pct {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 0.65rem;
    color: var(--text-muted);
  }

  /* Charts row */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 24px 12px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .chart-card h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }
  .bar-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
  }
  .bar-label { width: 120px; text-align: right; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 18px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 6px; font-size: 0.65rem; font-weight: 600; color: #fff; }
  .bar-count { width: 35px; text-align: right; font-weight: 600; font-size: 0.75rem; flex-shrink: 0; }

  /* Score distribution */
  .score-dist { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
  .score-bar {
    flex: 1;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
    min-width: 8px;
    transition: height 0.4s ease;
    position: relative;
    cursor: pointer;
  }
  .score-bar:hover { opacity: 0.8; }
  .score-bar .tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    margin-bottom: 4px;
  }
  .score-bar:hover .tooltip { display: block; }
  .score-labels { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-muted); margin-top: 4px; }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    padding: 12px 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters input, .filters select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .filters input:focus, .filters select:focus { border-color: var(--accent); }
  .filters input::placeholder { color: var(--text-muted); }
  .search-input { width: 200px; }
  .score-input { width: 72px; }
  .score-range { display: flex; align-items: center; gap: 4px; }
  .score-range span { color: var(--text-muted); font-size: 0.75rem; }
  .btn {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn-accent:hover { background: var(--accent-light); }
  .btn-green { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }
  .btn-green:hover { opacity: 0.85; }
  .btn-green:disabled { opacity: 0.4; cursor: default; }
  .export-group { display: flex; gap: 4px; align-items: center; }
  .selected-count { font-size: 0.7rem; color: var(--green); font-weight: 600; margin-left: 2px; }
  .filter-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent);
    color: #fff;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .filter-tag .x { cursor: pointer; opacity: 0.7; }
  .filter-tag .x:hover { opacity: 1; }
  .showing-label { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    padding: 0 24px 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    padding: 10px 8px;
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }
  thead th:hover { color: var(--accent-light); }
  thead th .sort-arrow { margin-left: 3px; font-size: 0.6rem; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 10px 8px; vertical-align: top; }
  td.score-cell {
    font-weight: 700;
    text-align: center;
  }
  .score-pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .score-high { background: rgba(34,197,94,0.15); color: var(--green); }
  .score-med  { background: rgba(245,158,11,0.15); color: var(--orange); }
  .score-low  { background: rgba(139,143,163,0.15); color: var(--text-muted); }
  .type-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 700;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .flag-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 0.6rem;
    font-weight: 600;
    margin: 1px 2px;
    white-space: nowrap;
  }
  .flag-pill.distress { background: rgba(239,68,68,0.15); color: var(--red); }
  .flag-pill.info     { background: rgba(59,130,246,0.15); color: var(--blue); }
  .flag-pill.fresh    { background: rgba(34,197,94,0.15); color: var(--green); }

  /* Confidence badges */
  .conf-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
  }
  .conf-high   { background: rgba(34,197,94,0.18); color: var(--green); }
  .conf-medium { background: rgba(245,158,11,0.18); color: var(--orange); }
  .conf-low    { background: rgba(239,68,68,0.18); color: var(--red); }
  .conf-none   { background: rgba(139,143,163,0.12); color: var(--text-muted); }
  td a { color: var(--accent-light); text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .addr-cell { max-width: 200px; }
  .owner-cell { max-width: 260px; word-break: break-word; font-size: 0.78rem; }

  /* Editable cells (foreclosure records) */
  .editable-cell {
    position: relative;
    cursor: text !important;
    border: 1px dashed transparent;
    padding: 2px 4px;
    border-radius: 4px;
    transition: border-color 0.15s, background 0.15s;
  }
  .editable-cell:hover {
    border-color: var(--accent);
    background: rgba(124,92,252,0.06);
  }
  .editable-cell::after {
    content: "\270E";
    position: absolute;
    right: 2px;
    top: 2px;
    font-size: 0.65rem;
    color: var(--accent-light);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .editable-cell:hover::after { opacity: 0.7; }
  .editable-cell.editing {
    border-color: var(--accent);
    background: rgba(124,92,252,0.1);
  }
  .editable-cell input {
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    font-size: 0.78rem;
    padding: 3px 6px;
    border-radius: 3px;
    width: 100%;
    outline: none;
  }
  .editable-cell input:focus { border-color: var(--accent-light); }
  .edit-saved {
    animation: editFlash 0.6s ease;
  }
  @keyframes editFlash {
    0% { background: rgba(34,197,94,0.25); }
    100% { background: transparent; }
  }
  /* Undo button */
  .btn-undo {
    background: rgba(239,68,68,0.15);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
    font-size: 0.75rem;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-undo:hover:not(:disabled) {
    background: rgba(239,68,68,0.25);
    border-color: var(--red);
  }
  .btn-undo:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .undo-info {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: 4px;
  }

  /* Row checkboxes */
  .row-cb, .hdr-cb {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  tbody tr.selected { background: rgba(124,92,252,0.08); }
  tbody tr.selected:hover { background: rgba(124,92,252,0.14); }
  tbody tr td:not(:first-child) { cursor: pointer; }

  /* Detail Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.65);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .modal-header h2 {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
    word-break: break-word;
  }
  .modal-header .cat-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    flex-shrink: 0;
  }
  .modal-close:hover { color: var(--text); }
  .modal-score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
  }
  .modal-score {
    font-size: 1.5rem;
    font-weight: 800;
  }
  .modal-score-bar {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .modal-score-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .modal-flags { display: flex; flex-wrap: wrap; gap: 4px; }
  .modal-section {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
  }
  .modal-section:last-child { border-bottom: none; }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .modal-field-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }
  .modal-field-value {
    font-size: 0.85rem;
    font-weight: 600;
    word-break: break-word;
  }
  .modal-field-value a { color: var(--accent-light); text-decoration: none; font-size: 0.78rem; }
  .modal-field-value a:hover { text-decoration: underline; }
  .modal-addr-block {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 4px;
  }
  .modal-addr-block .addr-line {
    font-size: 0.9rem;
    font-weight: 700;
  }
  .modal-addr-block .addr-city {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    padding: 16px 24px;
  }
  .pagination button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pagination button:hover { border-color: var(--accent); }
  .pagination button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .page-info { font-size: 0.75rem; color: var(--text-muted); }

  /* Responsive */
  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .header { padding: 12px 16px; }
    .filters { padding: 8px 16px; }
    .table-wrap { padding: 0 8px 16px; }
    .search-input { width: 100%; }
    .bar-label { width: 80px; font-size: 0.65rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Harris County <span>Motivated Sellers</span></h1>
  <div class="header-meta" id="meta"></div>
</div>

<div class="stats" id="stats"></div>

<div class="charts-row" id="chartsRow">
  <div class="chart-card">
    <h3>Leads by Category</h3>
    <div class="bar-chart" id="catChart"></div>
  </div>
  <div class="chart-card">
    <h3>Score Distribution</h3>
    <div class="score-dist" id="scoreChart"></div>
    <div class="score-labels"><span>30</span><span>50</span><span>70</span><span>100</span></div>
  </div>
</div>

<div class="filters" id="filtersBar">
  <select id="typeFilter"><option value="">All Types</option></select>
  <div class="score-range">
    <input type="number" class="score-input" id="scoreMin" placeholder="Min" min="0" max="100">
    <span>–</span>
    <input type="number" class="score-input" id="scoreMax" placeholder="Max" min="0" max="100">
  </div>
  <select id="flagFilter"><option value="">All Flags</option></select>
  <select id="addrFilter">
    <option value="">All</option>
    <option value="with">With Address</option>
    <option value="without">Without Address</option>
  </select>
  <select id="confFilter">
    <option value="">All Confidence</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
    <option value="none">None</option>
  </select>
  <select id="sourceFilter">
    <option value="">All Sources</option>
    <option value="clerk">Clerk Records</option>
    <option value="foreclosure">Foreclosures</option>
  </select>
  <select id="batchFilter">
    <option value="">All Batches</option>
  </select>
  <select id="saleMonthFilter"><option value="">All Sale Months</option></select>
  <span style="font-size:0.72rem;color:var(--text-muted);">Filed:</span>
  <input type="date" id="filedFrom" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:0.75rem;outline:none;width:125px" title="Filed from date">
  <span style="font-size:0.72rem;color:var(--text-muted);">to</span>
  <input type="date" id="filedTo" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:0.75rem;outline:none;width:125px" title="Filed to date">
  <input type="text" class="search-input" id="searchInput" placeholder="Search owner, legal, doc#...">
  <button class="btn" onclick="resetFilters()">Reset</button>
  <div class="export-group">
    <button class="btn btn-accent" onclick="exportCSV('all')">Export All</button>
    <button class="btn btn-green" id="exportSelBtn" onclick="exportCSV('selected')" disabled>Export Selected <span class="selected-count" id="selCount"></span></button>
    <button class="btn-undo" id="undoBtn" onclick="undoLastEdit()" disabled>&#8630; Undo</button><span class="undo-info" id="undoInfo"></span>
  </div>
  <span id="activeFilter"></span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
    <span style="font-size:0.72rem;color:var(--text-muted);">Show:</span>
    <select id="perpageSelect" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:0.75rem;outline:none;width:68px">
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="150">150</option>
      <option value="all">All</option>
    </select>
    <span class="showing-label" id="showingLabel"></span>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="pagination" id="pagination"></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
let DATA = null;
let FRCL_DATA = null;  // foreclosure records
let filtered = [];
let sortCol = "score";
let sortAsc = false;
let currentPage = 1;
let cardFilter = null;    // active stat-card filter
let sourceFilter = "";    // "probate", "foreclosure", or "" (all)
let perPage = 50;
const selectedRows = new Set();  // track selected doc_nums

// ── Manual Edits (localStorage persistence) ──────────────────────
// Keyed by doc_num → { owner: "...", prop_address: "...", prop_city: "...", ... }
let manualEdits = {};
try {
  const stored = localStorage.getItem("harris_leads_edits");
  if (stored) manualEdits = JSON.parse(stored);
} catch(e) { manualEdits = {}; }

function saveEditsToStorage() {
  try { localStorage.setItem("harris_leads_edits", JSON.stringify(manualEdits)); } catch(e) {}
}

// ── Undo History ──────────────────────────────────────────────────
// Each entry: { docNum, field, oldVal, newVal, timestamp }
// oldVal is an object for address fields: { address, city, state, zip }
let undoStack = [];
try {
  const stored = localStorage.getItem("harris_leads_undo");
  if (stored) undoStack = JSON.parse(stored);
} catch(e) { undoStack = []; }

function saveUndoToStorage() {
  // Keep last 50 undos max
  if (undoStack.length > 50) undoStack = undoStack.slice(-50);
  try { localStorage.setItem("harris_leads_undo", JSON.stringify(undoStack)); } catch(e) {}
}

function pushUndo(docNum, field, oldVal, newVal) {
  undoStack.push({ docNum, field, oldVal, newVal, ts: Date.now() });
  saveUndoToStorage();
  updateUndoUI();
}

function updateUndoUI() {
  const btn = document.getElementById("undoBtn");
  const info = document.getElementById("undoInfo");
  if (!btn) return;
  if (undoStack.length === 0) {
    btn.disabled = true;
    if (info) info.textContent = "";
  } else {
    btn.disabled = false;
    const last = undoStack[undoStack.length - 1];
    const fieldLabels = { owner: "Owner", co_borrower: "Co-Borrower", prop_address: "Prop Addr", mail_address: "Mail Addr", amount: "Amount", legal: "Legal" };
    if (info) info.textContent = `${fieldLabels[last.field] || last.field} on ${last.docNum}`;
  }
}

function undoLastEdit() {
  if (undoStack.length === 0) return;
  const entry = undoStack.pop();
  saveUndoToStorage();

  const rec = DATA.records.find(r => r.doc_num === entry.docNum);
  if (!rec) { updateUndoUI(); return; }

  // Restore the old value
  if (entry.field === "prop_address" || entry.field === "mail_address") {
    const prefix = entry.field === "prop_address" ? "prop" : "mail";
    const old = entry.oldVal || {};
    rec[prefix + "_address"] = old.address || "";
    rec[prefix + "_city"] = old.city || "";
    rec[prefix + "_state"] = old.state || "";
    rec[prefix + "_zip"] = old.zip || "";
    // Update manualEdits
    if (manualEdits[entry.docNum]) {
      if (old.address || old.city || old.state || old.zip) {
        manualEdits[entry.docNum][prefix + "_address"] = old.address || "";
        manualEdits[entry.docNum][prefix + "_city"] = old.city || "";
        manualEdits[entry.docNum][prefix + "_state"] = old.state || "";
        manualEdits[entry.docNum][prefix + "_zip"] = old.zip || "";
      } else {
        delete manualEdits[entry.docNum][prefix + "_address"];
        delete manualEdits[entry.docNum][prefix + "_city"];
        delete manualEdits[entry.docNum][prefix + "_state"];
        delete manualEdits[entry.docNum][prefix + "_zip"];
      }
    }
  } else {
    rec[entry.field] = entry.oldVal || "";
    if (manualEdits[entry.docNum]) {
      if (entry.oldVal) {
        manualEdits[entry.docNum][entry.field] = entry.oldVal;
      } else {
        delete manualEdits[entry.docNum][entry.field];
      }
      // Clean up empty edit objects
      if (Object.keys(manualEdits[entry.docNum]).length === 0) {
        delete manualEdits[entry.docNum];
      }
    }
  }

  saveEditsToStorage();
  updateUndoUI();
  renderTable();
  renderPagination();
}

function applyManualEdits(records) {
  records.forEach(r => {
    const edits = manualEdits[r.doc_num];
    if (edits) {
      if (edits.owner) r.owner = edits.owner;
      if (edits.co_borrower) r.co_borrower = edits.co_borrower;
      if (edits.legal) r.legal = edits.legal;
      if (edits.prop_address) r.prop_address = edits.prop_address;
      if (edits.prop_city) r.prop_city = edits.prop_city;
      if (edits.prop_state) r.prop_state = edits.prop_state;
      if (edits.prop_zip) r.prop_zip = edits.prop_zip;
      if (edits.mail_address) r.mail_address = edits.mail_address;
      if (edits.mail_city) r.mail_city = edits.mail_city;
      if (edits.mail_state) r.mail_state = edits.mail_state;
      if (edits.mail_zip) r.mail_zip = edits.mail_zip;
      if (edits.amount) r.amount = edits.amount;
    }
  });
}

function startEdit(docNum, field, cellEl) {
  if (cellEl.classList.contains("editing")) return;
  cellEl.classList.add("editing");

  const rec = DATA.records.find(r => r.doc_num === docNum);
  if (!rec) return;

  let currentVal = "";
  if (field === "owner") {
    currentVal = rec.owner || "";
  } else if (field === "co_borrower") {
    currentVal = rec.co_borrower || "";
  } else if (field === "prop_address") {
    currentVal = [rec.prop_address, rec.prop_city, rec.prop_state, rec.prop_zip].filter(Boolean).join(", ");
  } else if (field === "mail_address") {
    currentVal = [rec.mail_address, rec.mail_city, rec.mail_state, rec.mail_zip].filter(Boolean).join(", ");
  } else if (field === "amount") {
    currentVal = rec.amount || "";
  } else if (field === "legal") {
    currentVal = rec.legal || "";
  }

  const placeholders = {
    owner: "Enter owner name…",
    co_borrower: "Enter co-borrower name…",
    prop_address: "Enter address, city, ST zip…",
    mail_address: "Enter address, city, ST zip…",
    amount: "Enter amount (e.g. $250,000)…",
    legal: "Enter legal description…"
  };

  const input = document.createElement("input");
  input.type = "text";
  input.value = currentVal;
  input.placeholder = placeholders[field] || "Enter value…";

  cellEl.innerHTML = "";
  cellEl.appendChild(input);
  input.focus();
  input.select();

  function commitEdit() {
    const val = input.value.trim();
    cellEl.classList.remove("editing");

    // Skip if nothing changed
    if (val === currentVal) {
      cellEl.innerHTML = currentVal || '<span style="color:var(--text-muted)">--</span>';
      if (field === "prop_address" || field === "mail_address") {
        const pfx = field === "prop_address" ? "prop" : "mail";
        const disp = [rec[pfx+"_address"], rec[pfx+"_city"], rec[pfx+"_state"], rec[pfx+"_zip"]].filter(Boolean).join(", ");
        cellEl.innerHTML = disp || '<span style="color:var(--text-muted)">--</span>';
      }
      return;
    }

    if (!manualEdits[docNum]) manualEdits[docNum] = {};

    if (field === "owner" || field === "co_borrower" || field === "legal") {
      pushUndo(docNum, field, currentVal, val);
      rec[field] = val;
      manualEdits[docNum][field] = val;
      cellEl.innerHTML = val || '<span style="color:var(--text-muted)">--</span>';
    } else if (field === "prop_address" || field === "mail_address") {
      // Snapshot old address components for undo
      const prefix = field === "prop_address" ? "prop" : "mail";
      pushUndo(docNum, field, {
        address: rec[prefix + "_address"] || "",
        city: rec[prefix + "_city"] || "",
        state: rec[prefix + "_state"] || "",
        zip: rec[prefix + "_zip"] || ""
      }, val);
      // Parse "address, city, ST zip" format
      const parts = val.split(",").map(s => s.trim());
      if (parts.length >= 2) {
        rec[prefix + "_address"] = parts[0];
        const lastPart = parts[parts.length - 1];
        const stZip = lastPart.match(/^([A-Za-z]{2})\s+(\d{5}(?:-\d{4})?)$/);
        if (stZip) {
          rec[prefix + "_state"] = stZip[1].toUpperCase();
          rec[prefix + "_zip"] = stZip[2];
          rec[prefix + "_city"] = parts.length >= 3 ? parts.slice(1, -1).join(", ") : "";
        } else {
          rec[prefix + "_city"] = parts.slice(1).join(", ");
        }
      } else {
        rec[prefix + "_address"] = val;
      }
      manualEdits[docNum][prefix + "_address"] = rec[prefix + "_address"] || "";
      manualEdits[docNum][prefix + "_city"] = rec[prefix + "_city"] || "";
      manualEdits[docNum][prefix + "_state"] = rec[prefix + "_state"] || "";
      manualEdits[docNum][prefix + "_zip"] = rec[prefix + "_zip"] || "";

      const display = [rec[prefix + "_address"], rec[prefix + "_city"], rec[prefix + "_state"], rec[prefix + "_zip"]].filter(Boolean).join(", ");
      cellEl.innerHTML = display || '<span style="color:var(--text-muted)">--</span>';
    } else if (field === "amount") {
      pushUndo(docNum, field, currentVal, val);
      rec.amount = val;
      manualEdits[docNum].amount = val;
      cellEl.innerHTML = val || '<span style="color:var(--text-muted)">--</span>';
    }

    saveEditsToStorage();
    cellEl.classList.add("edit-saved");
    setTimeout(() => cellEl.classList.remove("edit-saved"), 700);
  }

  input.addEventListener("blur", commitEdit);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); input.blur(); }
    if (e.key === "Escape") { e.preventDefault(); cellEl.classList.remove("editing"); renderTable(); }
  });
}

// ── Load Data ──────────────────────────────────────────────────────
async function loadData() {
  const resp = await fetch("records.json");
  DATA = await resp.json();

  // Mark all main records as source "clerk"
  DATA.records.forEach(r => { r._source = "clerk"; });

  // Try loading foreclosure records (may not exist yet)
  try {
    const fResp = await fetch("foreclosures.json");
    if (fResp.ok) {
      FRCL_DATA = await fResp.json();
      // Normalize foreclosure records into the same shape as main scraper records
      (FRCL_DATA.records || []).forEach(fr => {
        fr._source = "foreclosure";
        fr.cat = "FRCL";
        fr.cat_label = "Foreclosure Posting";
        fr.doc_type = "FRCL";
        fr.score = fr.score || 80;  // default high score for foreclosures
        fr.filed = fr.file_date || "";
        // Map grantor to owner (the person being foreclosed on IS the owner/contact)
        fr.owner = fr.grantor || fr.grantor_name || "";
        fr.co_borrower = fr.co_borrower || "";
        fr.grantor_name = fr.grantor || fr.grantor_name || "";
        // Map doc_id to doc_num so it shows in the Doc # column
        fr.doc_num = fr.doc_id || fr.doc_num || "";
        // Map legal_description to legal
        fr.legal = fr.legal_description || fr.legal || "";
        // Map property_address → prop_address (scraper vs dashboard field names)
        fr.prop_address = fr.property_address || fr.prop_address || "";
        fr.prop_city = fr.property_city || fr.prop_city || "";
        fr.prop_state = fr.property_state || fr.prop_state || "";
        fr.prop_zip = fr.property_zip || fr.prop_zip || "";
        fr.flags = fr.flags || ["Pre-foreclosure / trustee sale"];
        fr.match_confidence = fr.match_confidence || "none";
        // Batch tagging — records without batch_id are from pre-batch runs
        if (!fr.batch_id) {
          fr.batch_id = "B0";
          fr.batch_label = "Batch 0 — Pre-batch records";
        }
      });
      // Apply any manual edits from localStorage
      applyManualEdits(FRCL_DATA.records || []);
      // Merge into main DATA
      DATA.records = DATA.records.concat(FRCL_DATA.records || []);
      DATA.total = DATA.records.length;
    }
  } catch(e) { /* foreclosures.json not yet available */ }

  let metaHtml = `Updated: ${new Date(DATA.fetched_at).toLocaleString()}<br>${DATA.date_range.from} to ${DATA.date_range.to}`;
  if (FRCL_DATA) {
    metaHtml += `<br>Foreclosures: ${FRCL_DATA.total || 0} postings`;
  }
  document.getElementById("meta").innerHTML = metaHtml;

  buildStats();
  buildCharts();
  populateFilters();
  applyFilters();
}

// ── Stat Cards ─────────────────────────────────────────────────────
function buildStats() {
  const cats = {};
  DATA.records.forEach(r => { cats[r.cat] = (cats[r.cat] || 0) + 1; });

  const withAddr = DATA.records.filter(r => r.prop_address && r.prop_address.trim()).length;
  const pct = DATA.total ? Math.round(withAddr / DATA.total * 100) : 0;

  let html = `
    <div class="stat-card total" data-filter="all" onclick="toggleCardFilter('all')">
      <div class="value">${DATA.total.toLocaleString()}</div>
      <div class="label">Total Leads</div>
    </div>
    <div class="stat-card addr" data-filter="addr" onclick="toggleCardFilter('addr')">
      <div class="value">${withAddr.toLocaleString()}</div>
      <div class="label">With Address</div>
      <div class="pct">${pct}%</div>
    </div>`;

  // Top categories as cards
  const catOrder = ["FRCL","LP","NOFC","TAXLIEN","LIEN","JUD","LEVY","PROBATE","BNKRCY","REL"];
  const catLabels = {};
  DATA.records.forEach(r => { catLabels[r.cat] = r.cat_label; });

  catOrder.forEach(c => {
    if (cats[c]) {
      html += `
        <div class="stat-card" data-filter="cat:${c}" onclick="toggleCardFilter('cat:${c}')">
          <div class="value" style="color:${CAT_COLORS[c] || '#7c5cfc'}">${cats[c]}</div>
          <div class="label">${catLabels[c] || c}</div>
        </div>`;
    }
  });

  document.getElementById("stats").innerHTML = html;
}

function toggleCardFilter(filter) {
  if (cardFilter === filter) {
    cardFilter = null;
  } else {
    cardFilter = filter;
  }
  // Highlight active card
  document.querySelectorAll(".stat-card").forEach(el => {
    el.classList.toggle("active", el.dataset.filter === cardFilter);
  });
  currentPage = 1;
  applyFilters();
}

// ── Charts ─────────────────────────────────────────────────────────
function buildCharts() {
  // Category bar chart
  const cats = {};
  const catLabels = {};
  DATA.records.forEach(r => {
    cats[r.cat] = (cats[r.cat] || 0) + 1;
    catLabels[r.cat] = r.cat_label;
  });
  const maxCat = Math.max(...Object.values(cats));
  const sortedCats = Object.entries(cats).sort((a, b) => b[1] - a[1]);

  let barHtml = "";
  sortedCats.forEach(([cat, count]) => {
    if (cat === "REL") return;  // skip releases from chart
    const pct = (count / maxCat * 100).toFixed(0);
    const color = CAT_COLORS[cat] || "#7c5cfc";
    const shortLabel = (catLabels[cat] || cat).replace(/ \/ /g, "/").substring(0, 20);
    barHtml += `
      <div class="bar-row">
        <div class="bar-label" title="${catLabels[cat]}">${shortLabel}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${count > 5 ? count : ''}</div></div>
        <div class="bar-count">${count}</div>
      </div>`;
  });
  document.getElementById("catChart").innerHTML = barHtml;

  // Score distribution
  const buckets = {};
  for (let i = 30; i <= 100; i += 5) buckets[i] = 0;
  DATA.records.forEach(r => {
    const b = Math.floor(r.score / 5) * 5;
    const key = Math.max(30, Math.min(100, b));
    buckets[key] = (buckets[key] || 0) + 1;
  });
  const maxBucket = Math.max(...Object.values(buckets), 1);
  let scoreHtml = "";
  Object.entries(buckets).forEach(([score, count]) => {
    const h = Math.max(2, (count / maxBucket * 100));
    const color = score >= 70 ? "var(--green)" : score >= 50 ? "var(--orange)" : "var(--accent)";
    scoreHtml += `<div class="score-bar" style="height:${h}%;background:${color}"><div class="tooltip">${score}-${parseInt(score)+4}: ${count}</div></div>`;
  });
  document.getElementById("scoreChart").innerHTML = scoreHtml;
}

// ── Filters ────────────────────────────────────────────────────────
function populateFilters() {
  const types = [...new Set(DATA.records.map(r => r.doc_type))].sort();
  const sel = document.getElementById("typeFilter");
  types.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });

  const flags = new Set();
  DATA.records.forEach(r => (r.flags || []).forEach(f => flags.add(f)));
  const fsel = document.getElementById("flagFilter");
  [...flags].sort().forEach(f => {
    const opt = document.createElement("option");
    opt.value = f; opt.textContent = f;
    fsel.appendChild(opt);
  });

  // Populate sale month filter from sale_date field (auto-populates as new months are scraped)
  const saleMonths = new Map();
  const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  DATA.records.forEach(r => {
    if (r.sale_date) {
      const d = new Date(r.sale_date);
      if (!isNaN(d)) {
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        if (!saleMonths.has(key)) saleMonths.set(key, 0);
        saleMonths.set(key, saleMonths.get(key) + 1);
      }
    }
  });
  const smSel = document.getElementById("saleMonthFilter");
  [...saleMonths.entries()].sort((a,b) => a[0].localeCompare(b[0])).forEach(([key, count]) => {
    const [y, m] = key.split("-");
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = `${monthNames[parseInt(m)-1]} ${y} (${count})`;
    smSel.appendChild(opt);
  });

  // Per-page selector
  document.getElementById("perpageSelect").addEventListener("change", function() {
    perPage = this.value === "all" ? Infinity : parseInt(this.value);
    currentPage = 1;
    applyFilters();
  });

  // Live filtering
  document.getElementById("searchInput").addEventListener("input", () => { currentPage = 1; applyFilters(); });
  document.getElementById("typeFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("scoreMin").addEventListener("input", () => { currentPage = 1; applyFilters(); });
  document.getElementById("scoreMax").addEventListener("input", () => { currentPage = 1; applyFilters(); });
  document.getElementById("flagFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("addrFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("confFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("sourceFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("batchFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("saleMonthFilter").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("filedFrom").addEventListener("change", () => { currentPage = 1; applyFilters(); });
  document.getElementById("filedTo").addEventListener("change", () => { currentPage = 1; applyFilters(); });

  // Populate batch filter dropdown from foreclosure records
  const batchMap = new Map();  // batch_id → { label, count }
  DATA.records.forEach(r => {
    if (r.batch_id) {
      if (!batchMap.has(r.batch_id)) {
        batchMap.set(r.batch_id, { label: r.batch_label || r.batch_id, count: 0 });
      }
      batchMap.get(r.batch_id).count++;
    }
  });
  const bsel = document.getElementById("batchFilter");
  // Sort batches by batch number (B1, B2, B3...)
  const sortedBatches = [...batchMap.entries()].sort((a, b) => {
    const numA = parseInt(a[0].replace("B", "")) || 0;
    const numB = parseInt(b[0].replace("B", "")) || 0;
    return numB - numA;  // newest first
  });
  sortedBatches.forEach(([bid, info]) => {
    const opt = document.createElement("option");
    opt.value = bid;
    opt.textContent = `${info.label} (${info.count})`;
    bsel.appendChild(opt);
  });
}

function getFiltered() {
  const q     = document.getElementById("searchInput").value.toLowerCase();
  const type  = document.getElementById("typeFilter").value;
  const sMin  = parseInt(document.getElementById("scoreMin").value);
  const sMax  = parseInt(document.getElementById("scoreMax").value);
  const minScore = isNaN(sMin) ? 0 : sMin;
  const maxScore = isNaN(sMax) ? 100 : sMax;
  const flag  = document.getElementById("flagFilter").value;
  const addr  = document.getElementById("addrFilter").value;
  const conf  = document.getElementById("confFilter").value;
  const src   = document.getElementById("sourceFilter").value;
  const batch = document.getElementById("batchFilter").value;
  const saleMonth = document.getElementById("saleMonthFilter").value;
  const filedFrom = document.getElementById("filedFrom").value;
  const filedTo   = document.getElementById("filedTo").value;

  return DATA.records.filter(r => {
    if (src && (r._source || "clerk") !== src) return false;
    if (batch && (r.batch_id || "") !== batch) return false;
    // Sale month filter (by sale_date)
    if (saleMonth && r.sale_date) {
      const d = new Date(r.sale_date);
      if (!isNaN(d)) {
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        if (key !== saleMonth) return false;
      } else return false;
    } else if (saleMonth && !r.sale_date) return false;
    // Filed date range filter
    if (filedFrom && r.filed && r.filed < filedFrom) return false;
    if (filedTo && r.filed && r.filed > filedTo) return false;
    // Card filter
    if (cardFilter) {
      if (cardFilter === "addr") {
        if (!r.prop_address || !r.prop_address.trim()) return false;
      } else if (cardFilter.startsWith("cat:")) {
        if (r.cat !== cardFilter.slice(4)) return false;
      }
      // "all" = no filter
    }
    if (type && r.doc_type !== type) return false;
    if (r.score < minScore || r.score > maxScore) return false;
    if (flag && !(r.flags || []).includes(flag)) return false;
    if (addr === "with" && (!r.prop_address || !r.prop_address.trim())) return false;
    if (addr === "without" && r.prop_address && r.prop_address.trim()) return false;
    if (conf && (r.match_confidence || "none") !== conf) return false;
    if (q) {
      const hay = [r.owner, r.grantor_name, r.grantee_names, r.legal, r.doc_num, r.cat_label, r.prop_address, r.mail_address]
        .join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function applyFilters() {
  filtered = getFiltered();
  sortData();
  renderTable();
  renderPagination();

  // Active filter tag
  let tag = "";
  if (cardFilter && cardFilter !== "all") {
    const label = cardFilter === "addr" ? "With Address" : cardFilter.replace("cat:", "");
    tag = `<span class="filter-tag">${label} <span class="x" onclick="toggleCardFilter('${cardFilter}')">&times;</span></span>`;
  }
  document.getElementById("activeFilter").innerHTML = tag;
  document.getElementById("showingLabel").textContent = `Showing ${filtered.length} of ${DATA.total}`;
}

function resetFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("typeFilter").value = "";
  document.getElementById("scoreMin").value = "";
  document.getElementById("scoreMax").value = "";
  document.getElementById("flagFilter").value = "";
  document.getElementById("addrFilter").value = "";
  document.getElementById("confFilter").value = "";
  document.getElementById("sourceFilter").value = "";
  document.getElementById("batchFilter").value = "";
  document.getElementById("saleMonthFilter").value = "";
  document.getElementById("filedFrom").value = "";
  document.getElementById("filedTo").value = "";

  selectedRows.clear();
  updateSelectionUI();
  document.querySelectorAll(".stat-card").forEach(el => el.classList.remove("active"));
  currentPage = 1;
  applyFilters();
}

// ── Sort ───────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = col === "filed"; }
  sortData();
  renderTable();
}

function sortData() {
  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === "score") { va = va || 0; vb = vb || 0; }
    else if (sortCol === "flags") { va = (va||[]).length; vb = (vb||[]).length; }
    else { va = (va || "").toString().toLowerCase(); vb = (vb || "").toString().toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

// ── Table Render ───────────────────────────────────────────────────
function renderTable() {
  // Header with checkbox
  const effectivePP = perPage === Infinity ? filtered.length : perPage;
  const pageData = filtered.slice((currentPage - 1) * effectivePP, (currentPage - 1) * effectivePP + effectivePP);
  const allPageSelected = pageData.length > 0 && pageData.every(r => selectedRows.has(r.doc_num));

  let thead = `<tr><th style="width:32px"><input type="checkbox" class="hdr-cb" ${allPageSelected ? 'checked' : ''} onchange="togglePageAll(this.checked)"></th>`;
  COLS.forEach(c => {
    const arrow = sortCol === c.key ? (sortAsc ? " &#9650;" : " &#9660;") : "";
    thead += `<th style="width:${c.w}" onclick="sortBy('${c.key}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  });
  thead += "</tr>";
  document.getElementById("thead").innerHTML = thead;

  // Body (paginated)
  let html = "";
  pageData.forEach(r => {
    const scoreCls = r.score >= 70 ? "score-high" : r.score >= 50 ? "score-med" : "score-low";
    const isSelected = selectedRows.has(r.doc_num);

    let flagsHtml = "";
    (r.flags || []).forEach(f => {
      const cls = f === "New this week" ? "fresh" : DISTRESS_FLAGS.has(f) ? "distress" : "info";
      flagsHtml += `<span class="flag-pill ${cls}">${f}</span>`;
    });

    const propAddr = [r.prop_address, r.prop_city, r.prop_state, r.prop_zip].filter(Boolean).join(", ");
    const mailAddr = [r.mail_address, r.mail_city, r.mail_state, r.mail_zip].filter(Boolean).join(", ");

    const rowIdx = (currentPage - 1) * perPage + filtered.indexOf(r);
    const grantorCol = (r.cat === "PROBATE" || r.cat === "FRCL") ? (r.grantor_name || '<span style="color:var(--text-muted)">--</span>') : '<span style="color:var(--text-muted)">--</span>';

    html += `<tr class="${isSelected ? 'selected' : ''}" data-idx="${rowIdx}">
      <td><input type="checkbox" class="row-cb" ${isSelected ? 'checked' : ''} onchange="toggleRow('${r.doc_num}', this.checked)"></td>
      <td class="score-cell" onclick="openModal(${rowIdx})"><span class="score-pill ${scoreCls}">${r.score}</span></td>
      <td onclick="openModal(${rowIdx})">${r.filed || ""}</td>
      <td onclick="openModal(${rowIdx})">${r.sale_date || '<span style="color:var(--text-muted)">--</span>'}</td>
      <td onclick="openModal(${rowIdx})"><span class="type-badge">${r.doc_type}</span></td>
      <td onclick="openModal(${rowIdx})">${r.cat_label}</td>
      ${r._source === "foreclosure"
        ? `<td class="owner-cell editable-cell" ondblclick="startEdit('${r.doc_num}','owner',this)" title="Double-click to edit">${r.owner || '<span style=\"color:var(--text-muted)\">--</span>'}</td>`
        : `<td class="owner-cell" onclick="openModal(${rowIdx})">${r.owner || ""}</td>`}
      ${r._source === "foreclosure"
        ? `<td class="owner-cell editable-cell" ondblclick="startEdit('${r.doc_num}','co_borrower',this)" title="Double-click to edit">${r.co_borrower || '<span style=\"color:var(--text-muted)\">--</span>'}</td>`
        : `<td class="owner-cell" onclick="openModal(${rowIdx})">${r.co_borrower || '<span style="color:var(--text-muted)">--</span>'}</td>`}
      <td class="owner-cell" onclick="openModal(${rowIdx})">${grantorCol}</td>
      <td onclick="openModal(${rowIdx})">${flagsHtml}</td>
      ${r._source === "foreclosure"
        ? `<td class="editable-cell" ondblclick="startEdit('${r.doc_num}','legal',this)" title="Double-click to edit">${r.legal || '<span style=\"color:var(--text-muted)\">--</span>'}</td>`
        : `<td onclick="openModal(${rowIdx})">${r.legal || ""}</td>`}
      ${r._source === "foreclosure"
        ? `<td class="addr-cell editable-cell" ondblclick="startEdit('${r.doc_num}','prop_address',this)" title="Double-click to edit">${propAddr || '<span style=\"color:var(--text-muted)\">--</span>'}</td>`
        : `<td class="addr-cell" onclick="openModal(${rowIdx})">${propAddr || '<span style="color:var(--text-muted)">--</span>'}</td>`}
      ${r._source === "foreclosure"
        ? `<td class="addr-cell editable-cell" ondblclick="startEdit('${r.doc_num}','mail_address',this)" title="Double-click to edit">${mailAddr || '<span style=\"color:var(--text-muted)\">--</span>'}</td>`
        : `<td class="addr-cell" onclick="openModal(${rowIdx})">${mailAddr || '<span style="color:var(--text-muted)">--</span>'}</td>`}
      ${r._source === "foreclosure"
        ? `<td class="editable-cell" ondblclick="startEdit('${r.doc_num}','amount',this)" title="Double-click to edit" style="font-size:0.78rem">${r.amount || '<span style=\"color:var(--text-muted)\">--</span>'}</td>`
        : `<td onclick="openModal(${rowIdx})" style="font-size:0.78rem">${r.amount || '<span style="color:var(--text-muted)">--</span>'}</td>`}
      <td onclick="openModal(${rowIdx})"><span class="conf-pill conf-${r.match_confidence || 'none'}">${r.match_confidence || 'none'}</span></td>
      <td style="font-size:0.7rem" onclick="openModal(${rowIdx})">${r.doc_num}</td>
      <td style="font-size:0.7rem">${r.clerk_url ? '<a href="' + r.clerk_url + '" target="_blank" rel="noopener">Clerk</a>' : ''}${r.hcad_url ? ' <a href="' + r.hcad_url + '" target="_blank" rel="noopener" style="color:var(--green)">HCAD</a>' : ''}</td>
    </tr>`;
  });
  document.getElementById("tbody").innerHTML = html || '<tr><td colspan="17" style="text-align:center;padding:32px;color:var(--text-muted)">No records match your filters</td></tr>';
}

// ── Row Selection ─────────────────────────────────────────────────
function toggleRow(docNum, checked) {
  if (checked) selectedRows.add(docNum);
  else selectedRows.delete(docNum);
  updateSelectionUI();
  // Update the row highlight without full re-render
  const rows = document.querySelectorAll("tbody tr");
  rows.forEach(tr => {
    const cb = tr.querySelector(".row-cb");
    if (cb) tr.classList.toggle("selected", cb.checked);
  });
  // Update header checkbox
  const ePP2 = perPage === Infinity ? filtered.length : perPage;
  const pageData = filtered.slice((currentPage - 1) * ePP2, (currentPage - 1) * ePP2 + ePP2);
  const hdrCb = document.querySelector(".hdr-cb");
  if (hdrCb) hdrCb.checked = pageData.length > 0 && pageData.every(r => selectedRows.has(r.doc_num));
}

function togglePageAll(checked) {
  const ePP3 = perPage === Infinity ? filtered.length : perPage;
  const pageData = filtered.slice((currentPage - 1) * ePP3, (currentPage - 1) * ePP3 + ePP3);
  pageData.forEach(r => {
    if (checked) selectedRows.add(r.doc_num);
    else selectedRows.delete(r.doc_num);
  });
  updateSelectionUI();
  renderTable();
}

function updateSelectionUI() {
  const count = selectedRows.size;
  const btn = document.getElementById("exportSelBtn");
  const badge = document.getElementById("selCount");
  btn.disabled = count === 0;
  badge.textContent = count > 0 ? `(${count})` : "";
}

// ── Pagination ─────────────────────────────────────────────────────
function renderPagination() {
  const ePP = perPage === Infinity ? filtered.length : perPage;
  const totalPages = Math.max(1, Math.ceil(filtered.length / ePP));
  if (totalPages <= 1) { document.getElementById("pagination").innerHTML = ""; return; }

  let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">&laquo; Prev</button>`;
  const start = Math.max(1, currentPage - 3);
  const end = Math.min(totalPages, currentPage + 3);
  if (start > 1) html += `<button onclick="goPage(1)">1</button><span class="page-info">...</span>`;
  for (let i = start; i <= end; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < totalPages) html += `<span class="page-info">...</span><button onclick="goPage(${totalPages})">${totalPages}</button>`;
  html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next &raquo;</button>`;
  html += `<span class="page-info" style="margin-left:8px">Page ${currentPage} of ${totalPages}</span>`;
  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
  renderPagination();
  document.querySelector(".table-wrap").scrollIntoView({behavior: "smooth"});
}

// ── Name Splitting ────────────────────────────────────────────────
// Suffixes that stay with last name
const NAME_SUFFIXES = new Set(["sr","jr","ii","iii","iv","v","esq","md","phd","dds","dvm"]);

function splitName(fullName) {
  if (!fullName) return { first: "", middle: "", last: "" };
  // Strip leading "by " prefix (common in foreclosure grantor fields)
  let name = fullName.replace(/^by\s+/i, "").trim();
  if (!name) return { first: "", middle: "", last: "" };

  // Split into parts, handling commas for suffixes like ", Sr" or ", Jr"
  // First check if there's a suffix after a comma
  let suffix = "";
  const commaMatch = name.match(/^(.+?),\s*(Sr|Jr|II|III|IV|V|Esq|MD|PhD|DDS|DVM)\.?$/i);
  if (commaMatch) {
    name = commaMatch[1].trim();
    suffix = ", " + commaMatch[2];
  }

  const parts = name.split(/\s+/).filter(Boolean);

  if (parts.length === 0) return { first: "", middle: "", last: "" };
  if (parts.length === 1) return { first: toTitleCase(parts[0]), middle: "", last: "" };

  // Check if last word is a suffix without comma (e.g. "John Smith Jr")
  if (parts.length >= 3 && NAME_SUFFIXES.has(parts[parts.length - 1].toLowerCase().replace(/\.$/,""))) {
    suffix = ", " + parts.pop();
  }

  if (parts.length === 2) {
    return { first: toTitleCase(parts[0]), middle: "", last: toTitleCase(parts[1]) + suffix };
  }

  // 3+ parts: first word = first, last word = last, everything in between = middle
  const first = toTitleCase(parts[0]);
  const last = toTitleCase(parts[parts.length - 1]) + suffix;
  const middle = parts.slice(1, -1).map(toTitleCase).join(" ");
  return { first, middle, last };
}

function toTitleCase(s) {
  if (!s) return "";
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

// ── CSV Export ─────────────────────────────────────────────────────
function exportCSV(mode) {
  let rows;
  if (mode === "selected") {
    rows = getFiltered().filter(r => selectedRows.has(r.doc_num));
    if (rows.length === 0) return;
  } else {
    rows = getFiltered();
  }
  const headers = [
    "Score","Filed","Sale Date","Date Scraped","Type","Category",
    "Owner First Name","Owner Middle Name","Owner Last Name",
    "Co-Borrower First Name","Co-Borrower Middle Name","Co-Borrower Last Name",
    "Grantor First Name","Grantor Middle Name","Grantor Last Name",
    "Grantee (Heirs)",
    "Property Address","Property City","Property State","Property Zip",
    "Mail Address","Mail City","Mail State","Mail Zip",
    "Flags","Legal Description","Amount",
    "Match Confidence","Doc #","Batch","Source","Clerk URL","HCAD URL"
  ];
  let csv = headers.join(",") + "\n";
  rows.forEach(r => {
    const owner = splitName(r.owner);
    const coBorrower = splitName(r.co_borrower);
    const grantor = splitName(r.grantor_name);
    csv += [
      r.score, r.filed, r.sale_date||"", r.date_scraped||"",
      r.doc_type, `"${(r.cat_label||'').replace(/"/g,'""')}"`,
      `"${owner.first}"`, `"${owner.middle}"`, `"${owner.last}"`,
      `"${coBorrower.first}"`, `"${coBorrower.middle}"`, `"${coBorrower.last}"`,
      `"${grantor.first}"`, `"${grantor.middle}"`, `"${grantor.last}"`,
      `"${(r.grantee_names||'').replace(/"/g,'""')}"`,
      `"${(r.prop_address||'').replace(/"/g,'""')}"`, r.prop_city||"", r.prop_state||"", r.prop_zip||"",
      `"${(r.mail_address||'').replace(/"/g,'""')}"`, r.mail_city||"", r.mail_state||"", r.mail_zip||"",
      `"${(r.flags||[]).join('; ')}"`,
      `"${(r.legal||'').replace(/"/g,'""')}"`,
      `"${(r.amount||'').replace(/"/g,'""')}"`,
      r.match_confidence||"none", r.doc_num, r.batch_id||"", r._source||"clerk", r.clerk_url||"", r.hcad_url||""
    ].join(",") + "\n";
  });
  // Smart filename based on active filters
  const fParts = [];
  const _src = document.getElementById("sourceFilter").value;
  const _sm = document.getElementById("saleMonthFilter").value;
  const _batch = document.getElementById("batchFilter").value;
  const _type = document.getElementById("typeFilter").value;
  const _ff = document.getElementById("filedFrom").value;
  const _ft = document.getElementById("filedTo").value;
  if (_src) fParts.push(_src);
  if (_sm) fParts.push("sale-" + _sm);
  if (_batch) fParts.push(_batch);
  if (_type) fParts.push(_type.toLowerCase());
  if (_ff || _ft) fParts.push("filed-" + (_ff||"start") + "-to-" + (_ft||"end"));
  if (cardFilter && cardFilter !== "all") fParts.push(cardFilter === "addr" ? "with-addr" : cardFilter.replace("cat:","").toLowerCase());
  if (mode === "selected") fParts.push("selected-" + rows.length);
  const datePart = new Date().toISOString().slice(0,10);
  let filename = "harris_leads";
  if (fParts.length > 0) filename += "_" + fParts.join("_");
  filename += "_" + datePart + ".csv";
  filename = filename.replace(/[^a-zA-Z0-9._-]/g, "_").replace(/_+/g, "_");
  const blob = new Blob([csv], {type: "text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// ── Detail Modal ──────────────────────────────────────────────────

    flagsHtml += `<span class="flag-pill ${cls}">${f}</span>`;

    <div class="modal-section">
      <div class="modal-grid">
        <div>
          <div class="modal-field-label">Owner / Grantor</div>
          <div class="modal-field-value">${r.owner || r.grantor_name || "--"}</div>
        </div>
        <div>
          <div class="modal-field-label">Grantee</div>
          <div class="modal-field-value">${r.grantee_names || "--"}</div>
        </div>
      </div>

function closeModal() {

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
