<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Harris Leads</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #23273a;
    --border: #2d3148;
    --text: #e4e6f0;
    --text-muted: #8b8fa3;
    --accent: #7c5cfc;
    --accent-light: #9b82fc;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 6px;
    text-align: center;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    color: var(--text-muted);
    font-size: 0.82rem;
    text-align: center;
    margin-bottom: 24px;
  }
  form { display: flex; flex-direction: column; gap: 12px; }
  label {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: -4px;
  }
  input[type="password"] {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-size: 0.92rem;
    outline: none;
  }
  input[type="password"]:focus { border-color: var(--accent); }
  button {
    padding: 11px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 6px;
  }
  button:hover:not(:disabled) { background: var(--accent-light); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg {
    font-size: 0.82rem;
    padding: 10px 12px;
    border-radius: 8px;
    text-align: center;
    margin-top: 4px;
    min-height: 20px;
  }
  .msg.error {
    color: var(--red);
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
  }
  .msg.success {
    color: var(--green);
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
  }
  .msg.info {
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 16px;
  }
  .hint a {
    color: var(--accent-light);
    text-decoration: none;
  }
  .hint a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <h1>Reset <span>Password</span></h1>
  <p class="subtitle">Set a new password for your Harris Leads account.</p>

  <div id="loadingState" class="msg info">Verifying reset link...</div>

  <form id="resetForm" style="display:none">
    <label for="newPassword">New password</label>
    <input type="password" id="newPassword" autocomplete="new-password" minlength="8" required placeholder="Minimum 8 characters">

    <label for="confirmPassword">Confirm new password</label>
    <input type="password" id="confirmPassword" autocomplete="new-password" minlength="8" required placeholder="Type it again">

    <div id="formMsg" class="msg" style="display:none"></div>

    <button type="submit" id="submitBtn">Set new password</button>
  </form>

  <div id="errorState" style="display:none">
    <div class="msg error" id="errorMsg"></div>
    <p class="hint">
      <a href="index.html">&larr; Back to dashboard</a>
      &nbsp;·&nbsp;
      <a href="#" id="askResendLink">Request a new reset email</a>
    </p>
  </div>

  <div id="successState" style="display:none">
    <div class="msg success">Password updated. Redirecting...</div>
  </div>

  <p class="hint" id="bottomHint">
    <a href="index.html">&larr; Back to dashboard</a>
  </p>
</div>

<script>
const SUPABASE_URL = "https://oqkcmysnhgorjkinfamu.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_XfR5NTuo1LYF8p73_cqQ7w_Ug4LDl3_";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

const loadingState = document.getElementById("loadingState");
const resetForm = document.getElementById("resetForm");
const errorState = document.getElementById("errorState");
const errorMsg = document.getElementById("errorMsg");
const successState = document.getElementById("successState");
const formMsg = document.getElementById("formMsg");
const submitBtn = document.getElementById("submitBtn");
const bottomHint = document.getElementById("bottomHint");

function showError(message) {
  loadingState.style.display = "none";
  resetForm.style.display = "none";
  successState.style.display = "none";
  bottomHint.style.display = "none";
  errorState.style.display = "block";
  errorMsg.textContent = message;
}

function showForm() {
  loadingState.style.display = "none";
  errorState.style.display = "none";
  successState.style.display = "none";
  resetForm.style.display = "flex";
  document.getElementById("newPassword").focus();
}

function showSuccess() {
  loadingState.style.display = "none";
  resetForm.style.display = "none";
  errorState.style.display = "none";
  bottomHint.style.display = "none";
  successState.style.display = "block";
}

// Parse error params from BOTH the URL hash (legacy implicit flow) and
// query string (Supabase's verify endpoint puts errors in either spot
// depending on how the link was clicked).
function parseUrlErrors() {
  const candidates = [];
  if (window.location.hash) {
    candidates.push(window.location.hash.startsWith("#")
      ? window.location.hash.substring(1) : window.location.hash);
  }
  if (window.location.search) {
    candidates.push(window.location.search.startsWith("?")
      ? window.location.search.substring(1) : window.location.search);
  }
  for (const raw of candidates) {
    const params = new URLSearchParams(raw);
    const errCode = params.get("error_code");
    if (errCode || params.get("error")) {
      const errDesc = params.get("error_description");
      let msg = errDesc ? decodeURIComponent(errDesc.replace(/\+/g, " ")) : "Unknown error";
      if (errCode === "otp_expired") {
        msg = "This reset link has expired. Reset links are valid for 1 hour. Please request a new one.";
      } else if (errCode === "access_denied") {
        msg = "This reset link is invalid or has already been used. Please request a new one.";
      }
      return msg;
    }
  }
  return null;
}

async function init() {
  // 1. Check for explicit errors in URL first (hash or query)
  const urlErr = parseUrlErrors();
  if (urlErr) {
    showError(urlErr);
    return;
  }

  // 2. PKCE-style flow — token_hash + type=recovery as query params.
  //    Supabase's modern email template format:
  //      {{ .SiteURL }}/reset-password.html?token_hash={{ .TokenHash }}&type=recovery
  //    We exchange the token_hash for a session via verifyOtp().
  const url = new URL(window.location.href);
  const tokenHash = url.searchParams.get("token_hash");
  const otpType = url.searchParams.get("type");

  if (tokenHash && otpType === "recovery") {
    try {
      const { error } = await sb.auth.verifyOtp({ token_hash: tokenHash, type: "recovery" });
      if (error) {
        showError("This reset link is invalid or expired: " + error.message);
        return;
      }
      // Session created — clear the query string so reload doesn't re-verify
      window.history.replaceState({}, document.title, window.location.pathname);
      showForm();
      return;
    } catch (e) {
      showError("Failed to verify reset link: " + (e.message || e));
      return;
    }
  }

  // 3. Implicit flow fallback — Supabase JS auto-detects access_token in
  //    URL hash and fires PASSWORD_RECOVERY. Used when email template
  //    points at {{ .ConfirmationURL }} (Supabase's default).
  let recoveryDetected = false;
  sb.auth.onAuthStateChange((event, session) => {
    if (event === "PASSWORD_RECOVERY") {
      recoveryDetected = true;
      showForm();
    }
  });

  // 4. Also check existing session — covers direct navigation while
  //    already signed in (rare but valid)
  const { data: { session } } = await sb.auth.getSession();

  // 5. Wait briefly for the implicit-flow event to fire. If neither
  //    path produced a session in 1.5s, the link is bad.
  setTimeout(() => {
    if (recoveryDetected) return;
    if (session) {
      showForm();
    } else {
      showError("No valid reset link detected. Please request a password reset email and click the link in it.");
    }
  }, 1500);
}

resetForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  formMsg.style.display = "none";
  formMsg.className = "msg";

  const newPwd = document.getElementById("newPassword").value;
  const confirmPwd = document.getElementById("confirmPassword").value;

  if (newPwd.length < 8) {
    formMsg.style.display = "block";
    formMsg.className = "msg error";
    formMsg.textContent = "Password must be at least 8 characters.";
    return;
  }
  if (newPwd !== confirmPwd) {
    formMsg.style.display = "block";
    formMsg.className = "msg error";
    formMsg.textContent = "Passwords do not match.";
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "Saving...";

  const { error } = await sb.auth.updateUser({ password: newPwd });
  if (error) {
    submitBtn.disabled = false;
    submitBtn.textContent = "Set new password";
    formMsg.style.display = "block";
    formMsg.className = "msg error";
    formMsg.textContent = "Failed to update password: " + error.message;
    return;
  }

  showSuccess();
  // Redirect after a short delay so the VA sees the success message
  setTimeout(() => { window.location.href = "index.html"; }, 1800);
});

document.getElementById("askResendLink").addEventListener("click", (e) => {
  e.preventDefault();
  alert("Ask Nelson to resend a password recovery email from the Supabase admin panel.");
});

init();
</script>
</body>
</html>
