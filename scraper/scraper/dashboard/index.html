<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harris County Motivated Seller Leads</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--border:#2d3148;--accent:#6c63ff;--accent2:#ff6584;--text:#e2e8f0;--muted:#64748b;--green:#22d3a5;--yellow:#fbbf24;--red:#f87171}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:1.3rem;font-weight:700;color:#fff}
  header h1 span{color:var(--accent)}
  .meta{font-size:.78rem;color:var(--muted);margin-left:auto}
  .stats{display:flex;gap:12px;padding:18px 28px;flex-wrap:wrap}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;min-width:130px}
  .stat-card .num{font-size:1.8rem;font-weight:700;color:var(--accent)}
  .stat-card .lbl{font-size:.72rem;color:var(--muted);margin-top:2px}
  .controls{padding:0 28px 14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .controls input,.controls select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:.85rem;outline:none}
  .controls input:focus,.controls select:focus{border-color:var(--accent)}
  .controls label{font-size:.8rem;color:var(--muted)}
  .btn{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:.85rem}
  .btn:hover{opacity:.85}
  .btn.outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-size:.8rem}
  thead th{background:#13161f;color:var(--muted);text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;cursor:pointer;white-space:nowrap;user-select:none}
  thead th:hover{color:var(--text)}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
  tbody tr:hover{background:#1e2235}
  tbody td{padding:8px 12px;vertical-align:middle}
  .table-wrap{overflow-x:auto;padding:0 28px 40px}
  .score-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-weight:600;font-size:.75rem}
  .score-high{background:#22d3a522;color:var(--green)}
  .score-mid{background:#fbbf2422;color:var(--yellow)}
  .score-low{background:#f8717122;color:var(--red)}
  .flag-pill{display:inline-block;background:#2d3148;color:#a5b4fc;font-size:.65rem;padding:2px 7px;border-radius:12px;margin:2px 2px 0 0}
  .doc-type{background:#6c63ff22;color:#a5b4fc;font-size:.7rem;padding:2px 7px;border-radius:6px;font-weight:600}
  a.clerk-link{color:var(--accent);text-decoration:none;font-size:.75rem}
  a.clerk-link:hover{text-decoration:underline}
  .no-data{text-align:center;color:var(--muted);padding:60px;font-size:1rem}
  .spinner{display:none;width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:60px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  #exportBtn{margin-left:auto}
</style>
</head>
<body>
<header>
  <h1>🏠 Harris County <span>Motivated Sellers</span></h1>
  <div class="meta" id="metaInfo">Loading…</div>
</header>

<div class="stats" id="statsRow"></div>

<div class="controls">
  <label>Search</label>
  <input type="text" id="searchInput" placeholder="Owner, address, doc#…" style="width:220px"/>
  <label>Type</label>
  <select id="typeFilter"><option value="">All Types</option></select>
  <label>Min Score</label>
  <input type="number" id="minScore" placeholder="0" style="width:70px" min="0" max="100"/>
  <label>Has Address</label>
  <select id="addrFilter">
    <option value="">All</option>
    <option value="yes">Yes</option>
    <option value="no">No</option>
  </select>
  <button class="btn outline" onclick="resetFilters()">Reset</button>
  <button class="btn" id="exportBtn" onclick="exportCSV()">⬇ Export CSV</button>
</div>

<div class="table-wrap">
  <div class="spinner" id="spinner"></div>
  <div id="noData" class="no-data" style="display:none">No records match your filters.</div>
  <table id="leadTable">
    <thead>
      <tr>
        <th onclick="sortBy('score')">Score ↕</th>
        <th onclick="sortBy('filed')">Filed ↕</th>
        <th onclick="sortBy('doc_type')">Type</th>
        <th onclick="sortBy('cat_label')">Category</th>
        <th onclick="sortBy('owner')">Owner / Grantor</th>
        <th>Flags</th>
        <th onclick="sortBy('prop_address')">Property Address</th>
        <th>Mail Address</th>
        <th onclick="sortBy('amount')">Amount</th>
        <th>Doc #</th>
        <th>Link</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let allRecords = [];
let sortKey = 'score';
let sortDir = -1;

async function loadData() {
  document.getElementById('spinner').style.display = 'block';
  try {
    const r = await fetch('records.json?t=' + Date.now());
    const data = await r.json();
    allRecords = data.records || [];

    // Meta
    const from = data.date_range?.from || '—';
    const to   = data.date_range?.to   || '—';
    const fetched = data.fetched_at ? new Date(data.fetched_at).toLocaleString() : '—';
    document.getElementById('metaInfo').textContent =
      `Updated: ${fetched} | Range: ${from} → ${to}`;

    // Stats
    renderStats(data);

    // Populate type filter
    const types = [...new Set(allRecords.map(r => r.doc_type))].sort();
    const tf = document.getElementById('typeFilter');
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      tf.appendChild(o);
    });

    render();
  } catch(e) {
    document.getElementById('noData').style.display = 'block';
    document.getElementById('noData').textContent = 'Error loading records.json: ' + e.message;
  } finally {
    document.getElementById('spinner').style.display = 'none';
  }
}

function renderStats(data) {
  const cats = {};
  (data.records||[]).forEach(r => { cats[r.cat_label] = (cats[r.cat_label]||0)+1; });
  const topCats = Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,4);
  let html = `
    <div class="stat-card"><div class="num">${data.total||0}</div><div class="lbl">Total Leads</div></div>
    <div class="stat-card"><div class="num">${data.with_address||0}</div><div class="lbl">With Address</div></div>
  `;
  topCats.forEach(([k,v])=>{
    html += `<div class="stat-card"><div class="num">${v}</div><div class="lbl">${k}</div></div>`;
  });
  document.getElementById('statsRow').innerHTML = html;
}

function getFiltered() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const min  = parseInt(document.getElementById('minScore').value)||0;
  const addr = document.getElementById('addrFilter').value;
  return allRecords.filter(r => {
    if(type && r.doc_type !== type) return false;
    if(r.score < min) return false;
    if(addr === 'yes' && !r.prop_address) return false;
    if(addr === 'no'  &&  r.prop_address) return false;
    if(q) {
      const hay = [r.owner,r.prop_address,r.mail_address,r.doc_num,r.cat_label,r.doc_type]
        .join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function sortBy(key) {
  if(sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = -1; }
  render();
}

function render() {
  let recs = getFiltered();
  recs.sort((a,b) => {
    let av = a[sortKey]||'', bv = b[sortKey]||'';
    if(sortKey === 'score' || sortKey === 'amount') {
      av = parseFloat(String(av).replace(/[^0-9.]/g,''))||0;
      bv = parseFloat(String(bv).replace(/[^0-9.]/g,''))||0;
    }
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });

  const tbody = document.getElementById('tableBody');
  const noData = document.getElementById('noData');
  if(!recs.length) { tbody.innerHTML=''; noData.style.display='block'; return; }
  noData.style.display='none';

  tbody.innerHTML = recs.map(r => {
    const sc = r.score>=70?'score-high':r.score>=45?'score-mid':'score-low';
    const flags = (r.flags||[]).map(f=>`<span class="flag-pill">${f}</span>`).join('');
    const propAddr = [r.prop_address, r.prop_city, r.prop_state, r.prop_zip].filter(Boolean).join(', ');
    const mailAddr = [r.mail_address, r.mail_city, r.mail_state, r.mail_zip].filter(Boolean).join(', ');
    const link = r.clerk_url
      ? `<a class="clerk-link" href="${r.clerk_url}" target="_blank">View ↗</a>` : '—';
    return `<tr>
      <td><span class="score-badge ${sc}">${r.score}</span></td>
      <td>${r.filed||'—'}</td>
      <td><span class="doc-type">${r.doc_type}</span></td>
      <td>${r.cat_label||'—'}</td>
      <td>${r.owner||'—'}</td>
      <td>${flags||'—'}</td>
      <td>${propAddr||'—'}</td>
      <td>${mailAddr||'—'}</td>
      <td>${r.amount||'—'}</td>
      <td style="font-size:.7rem;color:var(--muted)">${r.doc_num||'—'}</td>
      <td>${link}</td>
    </tr>`;
  }).join('');
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('typeFilter').value  = '';
  document.getElementById('minScore').value    = '';
  document.getElementById('addrFilter').value  = '';
  render();
}

function exportCSV() {
  const recs = getFiltered();
  const cols = ['score','filed','doc_type','cat_label','owner','grantee','prop_address',
    'prop_city','prop_zip','mail_address','mail_city','mail_zip','amount','doc_num',
    'flags','clerk_url'];
  const lines = [cols.join(',')];
  recs.forEach(r => {
    lines.push(cols.map(c => {
      let v = c==='flags' ? (r.flags||[]).join('; ') : (r[c]||'');
      v = String(v).replace(/"/g,'""');
      return `"${v}"`;
    }).join(','));
  });
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `harris_leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

['searchInput','typeFilter','minScore','addrFilter'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

loadData();
</script>
</body>
</html>
